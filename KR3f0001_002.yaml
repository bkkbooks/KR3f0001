body:
  text: 周髀算經卷下漢趙君卿注北周漢中郡守前司隸臣甄鸞重述唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑臣釋明毛晉挍凡日月運行四極之道運周也極至也謂外衡也日月周行四方至外衡而還故曰四極也極下者其地高人所居六萬里滂沱四隤而下遊北極從外衡主極下乃高六萬里而言人所居蓋復盡外衡滂四隤而下如覆槃也天之中央亦高四旁六萬里四旁猶四極也隨地穹窿而高如蓋笠故日光外所照徑八十一萬里周二百四十三萬里日至外衡而還出其光十六萬七千里故云照故日運行處極北北方日中南方夜半日在極東東方日中西方夜半日在極南南方日中北方夜半日在極西西方日中東方夜半凡此四方者天地四極四和四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所會隂陽之所和然則百物阜安草木蕃庶故曰四和晝夜易處南方為晝北方為夜加時相反南方日中北方夜半然其隂陽所終冬至所極皆若一也隂陽之數齊冬夏之節同寒暑之氣均長短之晷等周回無差運變不二天象蓋笠地法覆槃見乃謂之象形乃謂之法在上故準蓋在下故擬槃象法義同蓋槃形等互文異器以别尊卑仰象俯法名號殊矣天離地八萬里然其隆高相從其相去八萬里冬至之日雖在外衡常出極下地上二萬里天地隆高高於外衡六萬里冬至之日雖在外衡其相望為平地直常出地北極下地上二萬里言日月不相障蔽故能揚光於晝納明於夜故日兆月日者陽之精譬猶火光月者隂之精譬猶水光水則含影故月光生於日之所照魄生於日之所蔽當日即光盈就日即眀盡月稟日光而成形兆故云日兆月也月光乃出故成明月待日然後能舒其光以成其眀星辰乃得行列靈憲曰衆星被曜因水火轉光故能成其行列是故秋分以往到冬至三光之精微以成其道遠日從中衡往至外衡其徑日遠以其相遠故光微不言從冬至到春分者俱在中衡之外其同可知此天地隂陽之性自然也自然如此故曰性也欲知北極樞璿璣四極極中不動動者璿璣也言北極璿璣周旋四至極至也常以夏至夜半時北極南遊所極遊在樞南之所至冬至夜半時北遊所極遊在樞北之所至冬至日加酉之時西遊所極遊在樞西之所至日加卯之時東遊所極遊在樞東之所至此北極璿璣四遊北極遊常近冬至而言夏至夜半者夏至夜半極見冬至夜半極不見也正北極樞璿璣之中正北天之中極處璿璣之中天心之正故曰璿璣也正極之所遊冬至日加酉之時立八尺表以繩繫表顚希望北極中大星引繩致地而識之顚首希仰致至也識之者所望大星表首及繩至地參相直而識之也又到旦明日加卯之時復引繩希望之首及繩致地而識其兩端相去二尺三寸日加卯酉之時望至地之相去也故東西極二萬三千里影寸千里故為東西所致之里數也其兩端相去正東西以繩至地所謂兩端相直為東西之正也中折之以指表正南北所識兩端之中與表為南北之正加此時者皆以漏揆度之此東西南北之時冬至日加卯酉者北極之正東西日不見矣以漏度之者一日一夜百刻從夜半至日中從日中至夜半無冬夏常各五十刻中分之得二十五刻加極卯酉之時揆亦度也其繩致地所識去表丈三寸故天之中去周十萬三千里北極東西之時與天中齊故以所望表句為天中去周之里數何以知其南北極之時也以冬至夜半北遊所極北過天中萬一千五百里以夏至南遊所極不及天中萬一千五百里此皆以繩繫表顚而希望之北極至地所識丈一尺四寸半故去周十一萬四千五百里過天中萬一千五百里其南極至地所識九尺一寸半故去周九萬一千五百里不及天中萬一千五百里此璿璣四極南北過不及之法東西南北之正句以表為股以影為句影言正句者四方之影皆正而定也璿璣徑二萬三千里周六萬九千里此陽絶隂彰故不生萬物春秋分謂之隂陽之中而日光所照適至璿璣之徑為陽絶隂彰故萬物不復生也其術曰立正句定之正四方之法也以日始出立表而識其晷日入復識其晷晷之兩端相直者正東西也中折之指表者正南北也極下不生萬物何以知之以何法知之也冬至之日去夏至十一萬九千里萬物盡死夏至之日去北極十一萬九千里是以知極下不生萬物北極左右夏有不釋之冰水凍不解是以推之夏至之日外衡之下為冬矣萬物當死此日遠近為冬夏非隂陽之氣爽或疑焉春分秋分日在中衡春分以往日益北五萬九千五百里而夏至秋分以往日益南五萬九千五百里而冬至并冬至夏至相去十一萬九千里冬至以往日益北近中衡夏至以往日益南近中衡中衡去周七萬五千五百里影七尺五寸五分中衡左右冬有不死之草夏長之類此欲以內衡之外外衡之內常為夏也然其修廣爽未之前聞此陽彰隂微故萬物不死五穀一歲再熟近日陽多農再熟凡北極之左右物有朝生暮獲冬生之類獲疑作穫謂葶藶薺麥冬生之類北極之下從春分至秋分為晝從秋分至春分為夜物有朝生暮獲者亦有春芻而秋熟然其所育皆是周地冬生之類薺麥之屬言左右者不在璿璣二萬三千里之內也此陽微隂彰故無夏長之類立二十八宿以周天曆度之法以用也列二十八宿之度用周天術曰倍正南方倍猶背也正南方者二極之正南北也以正句定之正句之法日出入識其晷晷兩端相直者正東西中折之以指表正南北即平地徑二十一步周六十三步令其平矩以水正如定水之平故曰平矩以水正也則位徑一百二十一尺七寸五分因而三之為三百六十五尺四分尺之一徑一百二十一尺七寸五分周三百六十五尺二寸五分者四分之一而或言一百二十六尺舉其全數以應周天三百六十五度四分度之一審定分之無令有纎微所分平地周一尺為一度二寸五分為四分度之一其令審定不欲使有細小之差也纎微細分也臣鸞曰求一百二十一尺七寸五分因而三之為三百六十五度四分度之一法列徑一百二十一尺七寸五分以三乘得三百六十五尺二寸五分二寸五分者即四分之一此即周天三百六十五度四分度之一分度以定則正督經緯而四分之一合各九十一度十六分度之五南北為經東西為緯督亦通正周天四分之一又以四乘分母為法除之臣鸞曰求分度以定四分之一合各九十一度十六分度之五法列周天三百六十五度以四分度之一而通分內子一得一千四百六十一為實更以四乘分母得十六為法除之得九十一不盡五即是各九十一度十六分度之五也於是圓定而正分所圓為天度又四分之皆定而正則立表正南北之中央以繩繫顛希望牽牛中央星之中引繩至經緯之交以望之星與表繩參相直也則復候須女之星先至者復候須女中則當以繩望之如復以表繩希望須女先至定中須女之先至者又復如上引繩至經緯之交以望之即以一遊儀希望牽牛中央星出中正表西幾何度遊儀亦表也遊儀移望星為正知星出中正之表西幾何度故曰遊儀各如遊儀所至之尺為度數所遊分圓周一尺應天一度故以遊儀所至尺數為度遊在於八尺之上故知牽牛八度須女中而望牽牛遊在八尺之上故牽牛為八度其次星放此以盡二十八宿度則定矣皆如此上法定立周度者周天之度各以其所先至遊儀度上二十八宿不以一星為體皆以先至之星為正之度車輻引繩就中央之正以為轂則正矣以經緯之交為轂以圓度為輻知一宿得幾何度則引繩如輻湊轂為正望星定度皆以方為正南知二十八宿為幾何度然後環分而布之也日所以入亦以周定之亦同望星之周欲知日之出入出入二十八宿東西南北面之宿列置各應其方立表望之知日出入何宿從出入徑幾何度即以三百六十五度四分度之一而各置二十八宿以二十八宿列置地所圓周之度使四面之宿各應其方以東井夜半中牽牛之初臨子之中東井牽牛相對之宿也東井臨午則牽牛臨於子也東井出中正表西三十度十六分度之七而臨未之中牽牛初亦當臨丑之中分周天之度為十二位而十二辰各當其一所應十二月從午至未三十度十六分度之七未與丑相對而東井牽牛之所居分之法巳陳於上矣臣鸞曰求東井出中正表西三十度十六分度之七法先通周天得一千四百六十一為實以位法十二乘周天分母四得四十八為法除實得三十度不盡二十一更副置法實等數平於三約不盡二十一得七約法四十八得十六即位三十度一十六分度之七於是天與地協協合也置東井牽牛使居丑未相對則天之列宿與地所為圖周相應合得之矣乃以置周二十八宿從東井牽牛所居以置十二位焉置以定乃復置周度之中央立正表置周度之中央者經緯之交也以冬至夏至之日以望日始出也立一遊儀於度上以望中央表之晷從日所出度上立一遊儀皆望中表之晷所以然者當矅不復當日得以視之也晷參正則日所出之宿度遊儀與中央表及晷參相直遊儀之下即所出合宿度日入放此此日出法求之牽牛去北極百一十五度千六百九十五里二十一步千四百六十一分步之八百一十九牽牛冬至日所在之宿於外衡者與極相去之度數術曰置外衡去北極樞二十三萬八千里除璿璣萬一千五百里北極常近牽牛為樞過極萬一千五百里此求去極故以除之其不除者二十二萬六千五百里以為實以三百乘之里為步以周天分一千四百六十一乘步為分內衡之度以周天分為法法有分故以周天乘實齊同之得九百九十二億七千四百九十五萬以內衡一度數千九百五十四里二百四十七步千四百六十一分步之九百三十三以為法如上乘里為步步為分通分內子得八億五千六百八十萬實如法得一度以八億五千六百八十萬為一度法不滿法求里步上求度故以此次求里次求步約之合三百得一以為實上以三百乘里為步而求里故以三百約餘分為里之實以千四百六十一分為法得一里里步皆以周天之分為母求度當齊同法實等故乘以散之度已定當次求里故還為法不滿法者三之如法得百步上以三百約之為里之實此當以三百乘之為步之實而言三之者不欲轉法便以一位為百實故從一位命為百也不滿法者上十之如法得十步上不用三百乘故此十之便以一位為十實故從一位命為十不滿法者又上十之如法得一步又復上之者便以一位為一實故從一位命為一不滿法者以法命之位盡於一步故以法命其餘為殘分次放此次婁與角及東井皆如此也臣鸞曰求牽牛星去極法先列衡去極樞二十三萬八千里減極去樞心一萬一千五百里餘二十二萬六千五百里以三百乘里得六千七百九十五萬步又以周天分一千四百六十一乘之得九百九十二億七千四百九十五萬步為實更副置內衡一度數一千九百五十四里二百四十七步一千四百六十一分步之九百三十三亦以三百乘一千九百五十四里為步內二百四十七步得五十八萬六千四百四十七步又以周天分母千四百六十一乘步內子九百三十三得八億五千六百八十萬為法以除實得一百一十五度不盡七億四千二百九十五萬去下法不用更以三百約餘分七億四千二百九十五萬得二百四十七萬六千五百為實更以周天分千四百六十一除之得一千六百九十五里不盡一百五以三百乘之得三萬一千五百復以前法除之得二十一步不盡八百一十九即牽牛去北極一百一十五度千六百九十五里二十一步千四百六十一分步之八百一十九婁與角去北極九十一度六百一十里二百六十四步千四百六十一分步之千二百九十六婁春分日所在之宿也角秋分日所在之宿也為中衡也術曰置中衡去北極樞十七萬八千五百里以為實不言加除者婁與角準北極在樞兩旁正與樞齊以婁角無差故便以去樞之數為實如上乘里為步步為分得七百八十二億三千六百五十五萬以內衡一度數為法實如法得一度不滿法者求里步不滿法者以法命之臣鸞曰求婁與角去極法列中衡去極樞十七萬八千五百里以三百乘之得五千三百五十五萬步又以周天分千四百六十一分乘之得七百八十二億三千六百五十五萬為實以內衡一度數千九百五十四里二百四十七步千四百六十一分步之九百三十三亦以三百乘里內步二百四十七得五十八萬六千四百四十七步又以分母千四百六十一分乘之內子得八億五千六百八十萬為法以除實得九十一度不盡二億六千七百七十五萬以三百約之得八十九萬二千五百下法不用以周天分千四百六十一除之得六百一十里不盡千二百九十以三百乘之得三十八萬七千如前法除之得二百六十四步不盡一千二百九十六即是婁與角去極九十一度六百一十里二百六十四步千四百六十一分步之千二百九十六東井去北極六十六度千四百八十一里一百五十五步千四百六十一分步之千二百四十五東井夏至日所在之宿為內衡術曰置內衡去北極樞十一萬九千里加璿璣萬一千五百里北極遊常近東井為樞不及極萬一千五百里此求去極故加之得十三萬五百里以為實如上乘里為步步為分得五百七十一億九千八百一十五萬分以內衡一度數為法實如法得一度不滿法者求里步不滿法者以法命之臣鸞曰求東井去極法列內衡去極樞十一萬九千里加璿璣萬一千五百里得十三萬五百里以三百乘里為步復以分母千四百六十一乘之得五百七十一億九千八百一十五萬為實通分內衡一度數為步步為分得八億五千六百八十萬為法以除實得六十六度不盡六億四千九百三十五萬以三百約之得二百一十六萬四千五百下法不用更以周天千四百六十一為法除之得千四百八十一里不盡七百五十九以三百乘之得二十二萬七千七百復以周天分除之得一百五十五步不盡一千二百四十五即是東井去北極六十六度千四百八十一里一百五十五步千四百六十一分步之一千二百四十五凡八節二十四氣氣損益九寸九分六分分之一冬至晷長一丈三尺五寸夏至晷長一尺六寸問次節損益寸數長短各幾何冬至晷長丈三尺五寸小寒丈二尺五寸小分五大寒丈一尺五寸一分小分四立春丈五寸二分小分三雨水九尺五寸三分小分二啓蟄八尺五寸四分小分一春分七尺五寸五分清明六尺五寸五分小分五榖雨五尺五寸六分小分四立夏四尺五寸七分小分三小滿三尺五寸八分小分二芒種二尺五寸九分小分一夏至一尺六寸小暑二尺五寸九分小分一大暑三尺五寸八分小分二立秋四尺五寸七分小分三處暑五尺五寸六分小分四白露六尺五寸五分小分五秋分七尺五寸五分寒露八尺五寸四分小分一霜降九尺五寸三分小分二立冬丈五寸二分小分三小雪丈一尺五寸一分小分四大雪丈二尺五寸小分五凡為八節二十四氣二至者寒暑之極二分者隂陽之和四立者生長收藏之始是為八節節三氣三而八之故為二十四氣損益九寸六分六分分之一損者減也破一分為六分然後減之益者加也以小分滿六得一從分冬至夏至為損益之始冬至晷長極當反短故為損之始夏至晷短極當反長故為益之始此爽之新術術曰置冬至晷以夏至晷減之餘為實以十二為法十二者半歲十二氣也為法者一節損益之法實如法得一寸不滿法者十之以法除之得一分求分故十之也不滿法者以法命之法與餘分皆半之也舊晷之術於理未當謂春秋分者隂陽晷等各七尺五寸五分故中衡去周七萬五千五百里按春分之影七尺五寸七百二十三分秋分之影七尺四寸二百六十二分差一寸四百六十一分以此準之是為不等冬至至小寒多半日之影夏至至小暑少半日之影芒種至夏至多二日之影大雪至冬至多三日之影又半歲一百八十二日八分日之五而此用四分日之二率故一日得七百三十分寸之四百七十六非也節候不正十五日有三十二分日之七以一日之率十五日為一節至令差錯不通尤甚易曰舊井無禽時舍也言法三十日實當改而舍之於是爽更為新術以一氣率之使言約法易上下相通周而復始除其紕繆臣鸞曰求二十四氣損益之法先置冬至影長丈三尺五寸以夏至影一尺六寸減之餘一丈一尺九寸上十之為實以半歲十二氣為法除之得九寸不盡十一復上十之如法而一得九分不盡二與法十二皆半之得六分之一即是氣損益法先置冬至影長丈三尺五寸以氣損益九寸九分六分分之一其破一分以為六分減其餘即是小寒影長丈二尺五寸小分五餘悉依此法求益法置夏至影一尺六寸以九寸九分六分分之一增之小分滿六從大分一即是小暑二尺五寸九分小分一次氣放此臣淳風等謹按此術本文趙君卿注求二十四氣影列損益九寸九分六分分之一以為定率檢勘術注有所未通又按宋書曆志所載何承天元嘉曆影冬至一丈三尺小寒一丈二尺四寸八分大寒一丈一尺三寸四分立春九尺九寸一分雨水八尺二寸八分啓蟄六尺七寸二分春分五尺三寸九分清明四尺二寸五分穀雨三尺二寸五分立夏二尺五寸小滿一尺九寸七分芒種一尺六寸九分夏至一尺五寸小暑一尺六寸九分大暑一尺九寸七分立秋二尺五寸處暑三尺三寸五分白露四尺二寸五分秋分五尺三寸九分寒露六尺七寸二分霜降八尺二寸八分立冬九尺九寸一分小雪一丈一尺三寸四分大雪一丈二尺四寸八分司馬彪續漢志所載四分曆影亦與此相近至如祖沖之大明曆影與何承天雖有小差皆是量天實數讐校三曆足驗君卿所立率虛誕且周髀本文外衡下於天中六萬里而二十四氣率乃是平遷所以知者按望影之法日近影短日遠影長又以高下言之日高影短日卑影長夏至之日最近北又最高其影尺有五寸自此以後曰行漸遠向南天體又漸向下以及冬至冬至之日最近南居於外衡日最近下故日影一丈三尺此當每氣差降有别不可均為一概設其升降之理今此文自冬至畢芒種自夏至畢于大雪均差每氣損九寸有奇是為天體正平無高卑之異而日但南北均行又無升降之殊即無內衡高於外衡六萬里自相矛楯又按尚書考靈曜所陳格上格下里數及鄭注升降逺近雖有成規亦未臻理實欲求至當皆依天體高下遠近修規以定差數自霜降畢於立春升降差多南北差少自雨水畢於寒露南北差多升降差少依此推步乃得其實既事涉渾儀與蓋天相反月後天十三度十九分度之七月後天者月東行也此見日月與天俱西南遊一日一夜天一周而月在昨宿之東故曰後天又曰章歲除章月加日周一日作率以一日所行為一度周天之日為天度術曰置章月二百三十五以章歲十九除之加日行一度得十三度十九分度之七此月一日行之數即後天之度及分臣鸞曰月後天十三度十九分度之七法列章月二百三十五以章歲十九除之得十二度加日行一度得十三度餘十九分度之七即月後天之度分小歲月不及故舍三百五十四度萬七千八百六十分度之六千六百一十二小歲者十二月為一歲一歲之月十二月則有餘十三月復不足而言大小歲通閠月焉不及故舍亦猶後天也假令十一月朔旦冬至日月俱起牽牛之初而月十二與日會此數月發牽牛所行之度也術曰置小歲三百五十四日九百四十分日之三百四十八小歲者除經歲十九分月之七以七乘周天分千四百六十一得萬二百二十七以減經歲之積分餘三十三萬三千一百八則小歲之積分也以九百四十分除之即得小歲之積日及分以月後天十三度十九分度之七乘之為實通分內子為二百五十四乘之者乘小歲積分也又以度分母乘日分母為法實如法得積後天四千七百三十七度萬七千八百六十分度之六千六百一十二以月後天分乘小歲積分得八千四百六十萬九千四百三十二則積後天分也以度分母十九乘日分母九百四十得萬七千八百六十除之即得以周天三百六十五度萬七千八百六十分度之四千四百六十五除之此猶四分之一也約之即得當於齊同故細言之通分內子為六百五十二萬三千三百六十五除積後天分得十二周天即去之其不足除者不足除者不及故舍之六百三十二萬九千五十二是也寅曰三百五十四度萬七千八百六十分度之六千六百一十二以萬七千八百六十除不及故舍之分得此分矣三百五十四度萬七千八百六十分度之六千六百一十二以萬七千八百六十除不及故舍之分得此分矣此月不及故舍之分度數他皆放此次至經月皆如此臣鸞曰求小歲月不及故舍法列經歲三百六十五日九百四十分日之二百三十五通分內子得三十四萬三千三百三十五是為經歲之積分以十九分月之七以七乘周天分一千四百六十一得萬二百二十七以減經歲積分不盡三十三萬三千一百八小歲積分也以九百四十除之得三百五十四日不盡三百四十八還通分內子復得本積分三十三萬三千一百八更置月後天十三度十九分度之七通分內子得二百五十四以乘本積分得積後天分八千四百六十萬九千四百三十二為實更列月後天分母十九以乘日分母九百四十得萬七千八百六十為法除之得積後天四千七百三十七度不盡六千六百一十二即是得四千七百三十七度萬七千八百六十分度之六千六百一十二還通分內子得本分八千四百六十萬九千四百三十二為實更列周天三百六十五度萬七千八百六十分度之四千四百六十五即通分內子得六百五十二萬三千三百六十五以除實得十二下法不用餘分即不及故舍之分六百三十二萬九千五十二更以日月分母相乘得萬七千八百六十為法除不及故舍之分六百三十二萬九千五十二得三百五十四度不盡六千六百一十二即不及故舍三百五十四度萬七千八百六十分度之六千六百一十二大歲月不及故舍十八度萬七千八百六十分度之萬一千六百二十八大歲者十三月為一歲術曰置大歲三百八十三日九百四十分日之八百四十七大歲者加經歲十九分月之十二以十二乘周天分千四百六十一得萬七千五百三十二以加經歲積分得三十六萬八百六十七則大歲之積分也以九百四十除之即得以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天五千一百三十二度萬七千八百六十分度之二千六百九十八此月後天分乘大歲積分得九千一百六十六萬二百一十八則積後天分也以周天除之除積後天分得十四周天即去之其不足除者不足除者三十三萬三千一百八是也此月不及故舍之分度數臣鸞曰求大歲月不及故舍法列經歲三百六十五日九百四十分日之二百三十五通分內子得經積分三十四萬三千三百三十五更以十九分月之十二乘周天分千四百六十一得一萬七千五百三十二以經歲積分加大歲積分得三十六萬八百六十七為實以九百四十除之得大歲三百八十三日九百四十分日之八百四十七還通分內子得本分三十六萬八百六十七更列月後天十三度十九分度之七通分內子得二百五十四以乘本積分得積後天分九千一百六十六萬二百一十八為實以萬七千八百六十為法除之得積後天度五千一百三十二不盡二千六百九十八即命分還通分內子得本積後天分九千一百六十六萬二百一十八為實以周天分六百五十二萬三千三百六十五為法除實得十四周天之數餘以日月分母萬七千八百六十除之得大歲不及故舍十八度不盡萬一千六百二十八即以命分也經歲月不及故舍百三十四度萬七千八百六十分度之萬一百五經常也即十二月十九分月之七也術曰置經歲三百六十五日九百四十分日之二百三十五經歲者通十二月十九分月之七為二百三十五乘周天千四百六十一得三十四萬三千三百三十五則經歲之積分又以周天分母四乘二百三十五得九百四十為法除之即得以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天四千八百八十二度萬七千八百六十分度之萬四千五百七十以月後天分乘經歲積分得八千七百二十萬七千九十則積後天之分以周天除之除積後天分得十三周天即去之其不足除者不足除者二百四十萬三千三百四十五是也此月不及故舍之分度數臣鸞曰求經歲月不及故舍法列十二月十九分月之七通分內子得二百三十五以乘周天分千四百六十一得三十四萬三千三百三十五即經歲分也以日分母四乘二百三十五得九百四十為法以除得經歲三百六十五日不盡二百三十五即命分還通分內子即得經歲分三十四萬三千三百三十五更列通月後天度分二百五十四以乘經歲分得積後天分八千七百二十萬七千九十為實更列萬七千八百六十除實得積後天度四千八百八十二不盡萬四千五百七十即命分還通分內子得本積後天分為實以周天分六百五十二萬三千三百六十五除實得十三周天即去之餘分二百四十萬三千三百四十五以萬七千八百六十除之得不及故舍百三十四度不盡萬一百五即以命分也小月不及故舍二十二度萬七千八百六十分度之七千七百五十五小月者二十九日為一月一月之二十九日則有餘三十日復不足而言大小者通其餘分術曰置小月二十九日小月者減經月之積分四百九十九餘二萬七千二百六十則小月之積也以九百四十除之即得以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天三百八十七度萬七千八百六十分度之萬二千二百二十以月後天乘小月積分得六百九十二萬四千四十則積後天之分也以周天分除之除積後天分得一周天即去之其不足除者不足除者四十萬六百七十五此月不及故舍之分度數臣鸞曰求小月不及故舍法置二十九日以九百四十乘之得二萬七千二百六十則小月之分也更列月後天十三度十九分度之七通分內子得二百五十四以乘小月分得六百九十二萬四千四十為實以萬七千八百六十為法除實得三百八十七度不盡萬二千二百二十以命分還通分內子得本實更列周天分六百五十二萬三千三百六十五除本實得一周天不盡四十萬六百七十五即不及故舍之分又以萬七千八百六十除不及故舍之分得二十二度不盡七千七百五十五即以命分大月不及故舍三十五度萬七千八百六十分度之萬四千三百三十五大月者三十日為一月術曰置大月三十日大月加經積分四百四十一得二萬八千二百則大月之積分也以九百四十除之即得以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天四百一度萬七千八百六十分度之九百四十以月後天分乘大月積分得七百一十六萬二千八百則積後天之分也以周天除之除積後天分得一周天即去之其不足除者不足除者六十三萬九千四百三十五是也此月不及故舍之分度數臣鸞曰求大月不及故舍法置三十日以九百四十乘之得二萬八千二百以後天分二百五十四乘之得七百一十六萬二千八百為實以萬七千八百六十為法以除實得四百一度不盡九百四十即以命分還通分內子得本實更以周天六百五十二萬三千三百六十五為法除本實得一周餘不足除積六十三萬九千四百三十五分以萬七千八百六十為法以除實得大月不及故舍三十五度不盡萬四千三百三十五即命分也經月不及故舍二十九度萬七千八百六十分度之九千四百八十一常月者一月日月與日合數術曰置經月二十九日九百四十分日之四百九十九經月者以十九乘周天分一千四百六十一得二萬七千七百五十九則經月之積以九百四十除之即得以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天三百九十四度萬七千八百六十分度之萬三千九百四十六以月後天分乘經月積分得七百五萬七百八十六則積後天之分以周天除之除積後天分得一周天即去之其不足除者不足除者五十二萬七千四百二十一是也此月不及故舍之分度數臣鸞曰求經月不及故舍法以十九乘周天分千四百六十一得二萬七千七百五十九即經月積分以九百四十除積分得經月二十九日九百四十分日之四百九十九還通分內子得本經月積分以後天分乘木積分得七百五萬七百八十六即後天之積分更以萬七千八百六十除之得積後天三百九十四度不盡萬三千九百四十六即以命分還通分內子得本後天積分為實以周天六百五十二萬三千三百六十五除之得一周餘分五十二萬七千四百二十一即不及故舍之分以一萬七千八百六十除之得經月不及故舍二十九度不盡九千四百八十一即以命分冬至晝極短日出辰而入申如上日之分入何宿法分十二辰於地所圓之周舍相去三十度十六分度之七子午居南北卯酉居東西日出入時立一遊儀以望中央表之晷遊儀之下即日出入陽照三不覆九陽日也覆猶遍也照三者南方三辰巳午未東西相當正南方日出入相當不覆三辰為正南方夏至晝極長日出寅而入戍陽照九不覆三不覆三者北方三辰亥子丑冬至日出入之三辰屬晝晝夜互見是出入三辰分為晝夜各半明矣考靈曜曰分周天為三十六頃頃有十度九十六分度之十四長日分於寅行二十四頃入於戍行十二頃短日分於辰行十二頃入於申行二十四頃此之謂也東西相當正北方出入相當不覆三辰為北方日出左而入右南北行聖人南面而治天下故以東為左西為右日冬至從南而北夏至從北而南故曰南北行故冬至從坎陽在子日出巽而入坤見日光少故曰寒冬至十一月斗建子位在北方故曰從坎坎亦北也陽氣所始起故曰在子巽東南坤西南日見少晷陽照三不覆九也夏至從離隂在午日出艮而入乾見日光多故曰暑夏至五月斗建午位在南方故曰從離離亦南也陰氣始生故曰在午艮東北乾西北日見多晷陽照九不覆三也日月失度而寒暑相姦考靈曜曰在璿璣玉衡以齊七政璿璣未中而星中是急急則日過其度月不及其宿璿璣中而星未中是舒舒則日不及其度月過其宿璿璣中而星中是調調則風雨時風雨時則草木蕃庶而百穀熟故書曰急常寒若舒常燠若急舒不調是失度寒暑不時即相姦往者詘來者信也故屈信相感從夏至南往日益短故曰詘從冬至北來日益長故曰信言來往相推詘信相感更衰代盛此天之常道易曰日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉此之謂也故冬至之後日右行夏至之後日左行左者往右者來冬至日出從辰來北故曰右行夏至日出從寅往南故曰左行故月與日合為一月從合至合則為一月日復日為一日從旦至旦則為一日也日復星為一歲冬至日出在牽牛從牽牛周牽牛則為一歲也外衡冬至日在牽牛內衡夏至日在東井六氣復返皆謂中氣中氣月中也言日月往來中氣各六傳曰先王之正時履端於始舉正於中歸餘於終謂中氣也隂陽之數日月之法謂隂陽之度數日月之法十九歲為一章章條也言閏餘盡為曆法章條也乾象曰辰為歲中以御朔之月而納焉朔為章中除朔為章月月差為閏臣鸞曰歲中除章中為章歲求餘法置中氣相去三十日十六分日之七通分內子得四百八十七又置從朔至朔一月之日二十九九百四十分日之四百九十九通之得二萬七千七百五十九二者法異當同之者以中氣分母十六乘朔分得四十四萬四千一百四十四變為中氣積分也以朔分母九百四十乘中氣分得四十五萬七千七百八十為朔日積分以少減多求等數平之得一千九百四十八為法除中氣積得二百二十八即章中也更以一千九百四十八除朔積分得二百三十五即章月也章月與章中差七即一章之閏更置二百二十八以歲中十二除之得十九為章歲也更置章月二百三十五以章歲十九除之得十二月十九分月之七即一年之月也四章為一蔀七十六歲蔀之言齊同日月之分為一蔀也一歲之月十二月十九分月之七通分內子得二百三十五一歲之日三百六十五日四分日之一通之得一千四百六十一分母不同則子不齊當互乘之以齊同之者以日分母四乘月分得九百四十即一蔀之月以月分母十九乘日分得二萬七千七百五十九即一蔀之日以日月分母相乘得七十六得一蔀之歲以一歲之月除蔀月得七十六歲又以一歲之日除蔀日亦得七十六歲矣月餘既終日分又盡衆殘齊合羣數畢滿故謂之蔀臣鸞曰求蔀法列章歲十九以四乘之得一蔀七十六歲求一蔀之月法十二月十九分月之七通分內子得二百三十五即月分也更列一歲三百六十五日四分日之一通分內子得一千四百六十一以日分母四乘月分得九百四十即一蔀之月以月分母十九乘日分得二萬七千七百五十九即一蔀之日以日分母四乘月分母十九得七十六即一蔀之歲更以月分母十九乘蔀月九百四十得萬七千八百六十為實以十二月十九分月之七通分內子得二百三十五為法以除實得七十六亦一蔀之歲也更列一蔀之日二萬七千七百五十九以分母四乘之得十一萬一千三十六為實以周天分千四百六十一除之得一蔀之歲七十六也二十蔀為一遂遂千五百二十歲遂者竟也言五行之德一終竟極日月辰終也乾鑿度曰至德之數先立金木水火土五凡各三百四歲五德運行日月開闢甲子為蔀首七十六歲次得癸卯蔀七十六歲次壬午蔀七十六歲次辛酉蔀七十六歲凡三百四歲木德也主春生次庚子蔀七十六歲次已卯蔀七十六歲次戊午蔀七十六歲次丁酉蔀七十六歲凡三百四歲金德也主秋成次丙子蔀七十六歲次乙卯蔀七十六歲次甲午蔀七十六歲次癸酉蔀七十六歲凡三百四歲火德也主夏長次壬子蔀七十六歲次辛卯蔀七十六歲次庚午蔀七十六歲次巳酉蔀七十六歲凡三百四歲水德也主冬藏次戊子蔀七十六歲次丁卯蔀七十六歲次丙午蔀七十六歲次乙酉蔀七十六歲凡三百四歲土德也主致養其德四正子午卯酉而朝四時焉凡一千五百二十歲終一紀復甲子故謂之遂也求五德日名之法置一蔀者七十六歲德四蔀因而四之為三百四歲以一歲三百六十五日四分日之一乘之為十一萬一千三十六以六十去之餘三十六命甲子算外得庚子金德也求次德加三十六滿六十去之命如前則次德日也求算蔀名置一章歲數以周天分乘之得二萬七千七百五十九以六十去之餘三十九命以甲子算外得癸卯蔀求蔀加三十九滿六十去之命如前得次蔀臣鸞曰求遂法列一蔀七十六歲以二十乘之得千五百二十歲即一遂之歲求五德金木水火土法列一蔀七十六歲以周天分千四百六十一乘之得十一萬一千三十六即以六十除之餘三十六命從甲子算外得庚子凡三百四歲主秋成金德也加三十六得七十二以六十除之餘十二命從甲子算外得丙子凡三百四歲火德主夏長次放此求蔀名列一章十九歲以周天分一千四百六十一歲乘之得二萬七千七百五十九以六十去之餘三十九命從甲子算外得癸卯蔀七十六歲復加三十九亦六十去之餘十八命亦起甲子算外次得壬午蔀次放此至甲子即止之三遂為一首首四千五百六十歲首始也言日月五星終而復始也考靈曜曰日月首甲子冬至日月五星俱起牽牛初日月合若璧五星如聯珠青龍甲寅攝提格並四千五百六十歲積及初故謂首也臣鸞曰求一首法列遂一千五百二十歲三之得一首四千五百六十歲也七首為一極極三萬一千九百二十歲生數皆終萬物復始極終也言日月星辰弦望晦朔寒暑推移萬物生育皆復始故謂之極臣鸞曰求極法先列一首四千五百六十以七乘之得一極三萬一千九百二十歲天以更元作紀曆元始作為七紀法天數更始復為法述之何以知天三百六十五度四分度之一而日行一度而月後天十三度十九分度之七二十九日九百四十分日之四百九十九為一月十二月十九分月之七為一歲非周髀本文蓋人問師之辭其欲知度之所分法術之所生周天除之除積後天分得一周即棄之其不足除者如合朔古者包犧神農制作為曆度元之始見三光未如其則三光日月星則法也日月列星未有分度列星之初列謂二十八宿也日主晝月主夜晝夜為一日日月俱起建星建六星在斗上也日月起建星謂十一月朔旦冬至也為曆術者度起牽牛前五度則建星其近也月度疾日度遲度日月所行之度也日月相逐於二十九日三十日間言日月二十九日則未合三十日復相過而日行天二十九度餘如九百四十分日之四百九十九未有定分未知餘分定幾何也於是三百六十五日南極影長明日反短以歲終日影長故知三百六十五日者三三百六十六日者一影四歲而後知差一日是為四歲共一日故歲得四分日之一故知一歲三百六十五日四分日之一歲終也月積後天十三周又與百三十四度餘經歲月後天之周及度求之餘者未知也言欲求之也無慮後天十三度十九分度之七未有定無慮者粗計也此巳得月後天數而言未有者求之意未有見故也於是日行天七十六周月行天千一十六周又合於建星月行一月則行過一周而與日合七十六歲九百四十周天所過復九百四十日七十六周并之得一千一十六為一月後天率分盡度終復還及初也臣鸞曰求於是日行天七十六周月行天千一十六周又合於建星法以九百四十周并七十六周得一千一十六周則日月氣朔合於建星置月行後天之數以日後天之數除之得十三度十九分度之七則月一日行天之度以日度行率除月行率一日得月度幾何置月行率一千一十六為實日行率七十六為法實如法而一法及餘分皆四約之與乾象同歸而殊塗義等而法異也復置七十六歲之積月置章歲之月二百三十五以四乘之得九百四十則蔀之積月也以七十六歲除之得十二月十九分月之七則一歲之月亦以四約法除分蔀歲除月與章歲除章月同也置周天度數以十二月十九分月之七除之得二十九日九百四十分日之四百九十九則一月日之數通周天四分日之一為千四百六十一通十二月十九分月之七為二百三十五分母不同則子不齊當互乘以同齊之以十九乘千四百六十一為二萬七千七百五十九以四乘二百三十五為九百四十乃以除之則月與日合之數臣鸞曰求日行一度法還置前一千一十六以七十六歲除之得十三度不盡二十八以求等平於四以四約餘得七約分得十九是十三度十九分度之七更列一章歲積月二百三十五以周天分母四乘之即一蔀月九百四十亦以七十六歲除之得一歲之十二月十九分月之七餘分及法並以四約更通周天得千四百六十一復通十二月十九分月之七得二百三十五分母不同互乘之以月分母十九乘日分得二萬七千七百五十九以日分母四乘月分得九百四十除二萬七千七百五十九得二十九日九百四十分日之四百九十九而月與日合此其數也
