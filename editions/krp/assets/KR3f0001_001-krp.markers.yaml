  - {type: variant, offset: 2207, length: 17940, content: 十二以法十八除之得四爲股也注云股實之矩以勾弦差爲廣勾弦并爲袤臣鸞曰股實之矩以勾弦差二爲廣勾弦并八爲袤注云而勾實方其裏減矩股之實于弦實開其餘即勾臣鸞曰勾實有九方在右圖裏以減矩股之實十六於弦實二十五餘九開之得三勾也注云陪勾在兩邉臣鸞曰各三也寅曰倍之得六注云爲從法開矩股之角即勾弦差加勾爲弦臣鸞曰加差二於勾三則弦五也注云以差除股實得勾弦并臣鸞曰以差二除股實十六得八勾三弦五并爲八也注云以并除股實亦得勾弦差臣鸞曰以并除股實十六得勾弦差二注云令并自乘與股實爲實臣鸞曰令并八自乘得六十四與股實十六加之得八十爲實注云倍并爲法臣鸞曰倍勾弦并八得十六爲法注云所得亦弦臣鸞曰除之得弦五也注云股實減并自乘如法爲勾臣鸞曰以股實十六減并自乘六十四餘四十八以法十六除之得三爲勾也注云兩差相乘倍而開之所得以股弦差增之爲勾臣鸞曰以股弦差一乘勾弦差二得二倍之爲四開之得二以股弦差一増之得三勾也注云以勾弦差增之爲股臣鸞曰以弦差二增之得四股也注云兩差增之爲弦臣鸞曰以股弦差一勾弦差二増之得五弦也注云倍弦實列勾股差實見弦實者以圖考之倍弦實滿外大方而多黃實黃實之多即勾股差實臣鸞曰倍弦實二十五得五十滿外大方七七四十九而多黃實黃實之多即勾股差實也注云以差實減之開其餘得外大方大方之面即勾股并臣鸞曰以差實一減五十餘四十九開之卽大方之面七也亦是勾股并也注云令并自乘倍弦實乃減之開其餘得中黃方黃方之面卽勾股差臣鸞曰并七自乘得四十九倍弦實二十五得五十以減之餘卽中黃方差實一也故開之卽勾股差一也注云以差減并而半之爲勾臣鸞曰以差一減并七餘六半之得三勾也注云加差於并而半之爲股臣鸞曰以差一加并七得八而半之得四股也注云其倍弦爲廣袤合臣鸞曰倍弦二十五爲五十爲廣袤合臣淳風等謹按列廣袤術宜云倍弦五得十爲廣袤合今鸞云倍弦二十五者錯也寅曰勾廣一袤九股廣二袤八注云而令勾股見者自乘爲其實四實以減之開其餘所得爲差臣鸞曰令自乘者以七七自乘得四十九四實大方勾股之中有四方一方之中有方十二四實有四十八減上四十九餘一也開之得一卽勾股差一臣淳風等謹按注意令自乘者十自乘得一百四實者大方廣袤之中有四方若據勾實而言一方之中有實九四實有三十六減上一百餘六十四開之得八卽廣袤差此是股弦差減股弦并餘數若據股實而言之一方之中有實十六四實有六十四減上一百餘三十六開之得六卽廣袤差此是勾股差減勾弦并餘數也鸞云令自乘者以七七自乘得四十九四實者大方勾股之中有四方一方之中有方十二四實者四十八減上四十九餘一也開之得一卽勾股差一者錯也寅曰大方之中有四弦實故四其勾實得三十六減之餘六十四開其餘得八爲勾之廣袤差四其股實得六十四減之餘三十六開得六爲股之廣袤差所謂廣袤差者勾廣一而袤九股廣二而袤入廣袤相減之餘也注云以差減合半其餘爲廣臣鸞曰以差一減合七餘六半之得三廣也臣淳風等謹按注意以差八六各減合十餘二四半之得一二一卽股弦差二卽勾弦差以差減弦卽各袤廣也鸞云以差一減合七餘六半之得三廣者錯也寅曰以勾之廣袤差八減廣袤合十餘二半之爲勾之廣以股袤差六減廣袤合十餘四半之爲股之廣二注皆未瑩注云減廣於弦卽所求也臣鸞曰以廣三減弦五卽所求差二也臣淳風等謹按注意以廣一二各減弦五卽所求股四勾三也鸞云以廣三減弦五卽所求差二者此錯也寅曰甄鸞述說終此周公曰大哉言數唐寅曰此經文也心逹數術之意故發大哉之數唐寅曰此趙注也請問用矩之道謂用表之宜測望之法商高日平矩以正繩以求繩之正定平懸之體將欲愼毫釐之差防千里之失偃矩以望高覆矩以測深臥矩以知遠言施用無方曲從其事術在九章環矩以爲圓合矩以爲方旣以追尋情理又可造製圓方言矩之於物無所不至方屬地圓屬天天圓地方物有圓方數有竒耦天動爲圓其數竒地靜爲方其數耦此配隂陽之義非實天地之體也天不可窮而見地不可盡而觀豈能定其圓方乎又曰北極之下高人所居六萬里滂沲四隤而下天之中央亦高四旁六萬里是爲形狀同歸而不殊塗隆高齊耽而易以陳故曰天似葢笠地法覆槃方數爲典以方出圓夫體方則度影正形圓則審實難蓋方者有常而圓者多變故當制法而理之理之法者半周半徑相乘則得方矣又可周徑相乘四而一又可徑自乘三之四而一又可周自乘十二而一故圓出於方典實也笠以寫天笠亦如葢其形正圓戴之所以象天寫猶象也言笠之體象天之形詩云何簑何笠此之義也天青黑地黃赤天數之爲笠也青黑爲表丹黃爲裏以象天地之位旣象其形又法其位言相方類不亦似乎是故知地者智知天者聖言天之高大地之廣遠自非聖智其孰能與於此乎智出於勾勾亦影也察勾之損益加物之高遠故曰智出於勾勾出於矩矩謂之表表不移亦爲勾爲勾將正故曰勾出於矩焉夫矩之於數其裁制萬物唯所爲耳言包含幾微轉通旋環也周公曰善哉善哉言明曉之意所謂問一事而萬事逹昔者榮方問於陳子榮方陳子是周公之後人非周􅙼之本文然此二人共相解釋後之學者謂之章句因從其類列於事下又欲尊而遠之故云昔者時世官號未之前聞曰今者竊聞夫子之道榮方問陳子能述商高之㫖明周公之道知日之高大日去地與圓徑之術光之所照日旁照之所及也一日所行日行天之度也遠近之數冬至夏至去人之遠近也人所望見人目之所極也四極之窮日光之所遠也列星之宿二十八宿之度也天地之廣袤袤長也東西南北謂之廣長夫子之道皆能知之其信有之乎而明察之故不昧不疑陳子曰然言可知也榮方曰方雖不省願夫子幸而說之欲以不省之情而觀大雅之法今若方者可教此道邪不能自料訪之賢者陳子曰然言可教也此皆算術之所及言周􅙼之法出於算術之妙也子之於算足以知此矣若誠累思之累重也言若誠能重累思之則逹至微之理於是榮方歸而思之數日不能得雖濳心馳思而才單智竭復見陳子曰方思之不能得敢請問之陳子曰思之未熟熟猶善也此亦望遠起高之術而子不能得則子之於數未能通類定高遠者立兩表望懸邈者施累矩言未能通類求勾股之意是智有所不及而神有所窮言不能通類是情智有所不及而神思有所窮滯夫道術言約而用博者智類之明夫道術聖人之所以極深而研幾唯深也故能通天下之志唯幾也故能成天下之務是以其言約其㫖遠故曰智類之明也問一類而萬事逹者謂之知道引而伸之觸類而長之天下之能事畢矣故謂之知道也今子所學欲知天地之數算數之術是用智矣而尚有所難是子之智類單算術所包尚以爲難是子智類單盡夫道術所以難通者旣學矣患其不博不能廣博旣博矣患其不習不能究習旣習矣患其不能知不能知類故同術相學術教同者則當學通類之意同事相觀事類同者觀其㫖趣之類此列士之愚智列猶别也言視其術鑒其學則愚智者别矣賢不肖之所分賢者逹於事物之理不肖者闇於照察之情至於役神馳思聦明殊别矣是故能類以合類此賢者業精習智之質也學其倫類觀其指歸唯賢智精習者能之也夫學同業而不能入神者此不肖無智而業不能精習俱學道術明不察不能以類合類而長之此心遊目蕩義不入神也是故算不能精習吾豈以道隱子哉固復熟思之凡教之道不憤不啓不悱不發憤而悱之然後啓發旣不精思又不學習故言吾無隱也爾固復熟思之舉一隅使及之以三也榮方復歸思之數日不能得復見陳子曰方思之以精熟矣智有所不及而神有所窮知不能得願終請說之自知不敏避席而請說之陳子曰復坐吾語汝於是榮方復坐而請陳子說之曰夏至南萬六千里冬至南十三萬五千里日中立竿測影臣鸞曰南戴日下立八尺表表影千里而差一寸是則天上一寸地下千里今夏至影有一尺六寸故其萬六千里冬至影一丈三尺五寸則知其十三萬五千里此一者天道之數言天道數一悉以如此周􅙼長八尺夏至之日晷一尺六寸晷影也此數望之從周城之南千里也而周官測影尺有六寸盖出周城南千里也記云神州之土方五千里雖差一寸不出畿地之分先王知之實故建王國􅙼者股也正晷者勾也以􅙼爲股以影爲勾股定然後可以度日之高遠正晷者日中之時節也正南千里勾一尺五寸正北千里勾一尺七寸候其影使表相去二千里影差二寸將求日之高遠故先見其表影之率日益表南晷日益長候勾六尺候其影使長六尺者欲令勾股相應勾三股四弦五勾六股八弦十卽取竹空徑一寸長八尺捕影而視之空正掩日以徑寸之空視日之影􅙼長則大矩短則小正滿八尺也捕猶索也掩猶覆也而日應空之孔掩若重䂓更言八尺者舉其定也又曰近則大遠則小以影六尺爲正由此觀之率八十寸而得徑一寸以此爲日􅙼之率之爲六十寸以兩表相去二千里乘得十二萬里爲實以影差二寸爲法除之得日底地去表六萬里求從􅙼至日八萬里者先置表高八尺上十之爲八十寸以兩表相去二千里乘之得十六萬爲實以影差二寸爲法除之得從表端上至日八萬里也若求邪至日者以日下爲勾日高爲股勾股各自乘并而開方除之得邪至日從􅙼所旁至日所十萬里旁此古邪字求其數之術曰以表南至日下六萬里爲勾以日高八萬里爲股爲之求弦勾股各自乘并而開方除之即邪至日之所也臣鸞曰求從􅙼邪至日所法先置南至日底六萬里爲勾重張自乘得三十六億爲勾實更置日高八萬里爲股重張自乘得六十四億爲股實并勾股實得一百億爲弦實開方除之得從王城至日十萬里今有十萬里問徑幾何曰一千二百五十里八十寸而得徑一寸以一寸乘十萬里爲實八十寸爲法即得以率率之八十里得徑一里十萬里得徑千二百五十里法當以空徑爲勾率竹長爲股率日去人爲大股大股之勾即日徑也其術以勾率乘大股股率而一此以八十里爲法十萬里爲實實如法而一即得日徑故曰日晷徑千二百五十里臣鸞曰求以率八十里得徑一里十萬里得徑千二百五十里法先置竹孔徑一寸爲十里爲勾更置邪去曰十萬里爲股以勾十里乘股十萬里得一億爲實更置日去地八萬里爲法除實得日晷徑千二百五十里故云日晷徑也臣淳風等謹按夏至王城望日立兩表相去二千里表高八尺影去前表一尺五寸去後表一尺七寸舊術以前後影差二寸爲法以前影寸數乘表間爲實實如法得萬五千里爲日下去南表里又以表高八十寸乘表間爲實實如法得八萬里爲表上去日里仍以表寸爲日高影寸爲日下待日漸高候日影六尺用之爲勾以表爲股爲之求弦得十萬里爲邪表數目取管圓孔徑一寸長八尺望日滿筒以爲率長八十寸爲一邪去日十萬里日徑即千二百五十里以理推之法云天之處心高於外衡六萬里者此乃語與術違勾六尺股八尺弦十尺角隅正方自然之數盖依繩水之定施之於表矩然則天無别體用日以爲高下術旣隨乎而遷高下從何而出語術相違是爲大失又按二表下地依水平法定其高下若北表地高則以爲勾以間爲弦置其高數其影乘之其表除之所得益股爲定間若北表下者亦置所下以法乘除所得以減股爲定間又以高下之數與間相約爲地高遠之率求遠者影乘定間差法而一所得加表日之高也求邪去地者弦乘定間差法而一所得加弦日邪去地此三等至皆以日爲正求日下地高下者置戴日之遠近地高下率乘之如間率而一所得爲日下地高下形勢隆殺與表間同可依此率若形勢不等非代所知率日徑求日大小者徑率乘間如法而一得日徑此徑當即得不待影長六尺凡度日者先須定二矩水平者影南北立勾齊高四尺相去一丈以二弦候牽于勾上并率二則擬爲候影勾上立表弦下望日前一則上畔後一則下畔引則就影合與表日參直二至前後三四日間影不移處即是當以候表亦望人取一影亦可日徑影端表頭爲則然地有高下表望不同後六術乃窮其實第一後高前下術高爲勾表間爲弦後復影爲所求率表爲有所率以勾爲所有數所得益股爲定間第二後下術以其所下爲勾表間爲弦置其所下以影乘表除所得減股餘爲定間第三邪下術依其北高之率高其勾影合與地勢隆殺相似餘同平法假令􅙼邪下而南其邪亦同不須别望但弦短與勾股不得相應其南里數亦隨地勢不得校乎平則促若用此術但得南望若北望者即用勾照南下之術當北高之地第四邪上術依其後下之率下其勾影此謂廻望北極以爲高逺者望去取差亦同南望此術弦長亦與勾股不得相應唯得北望不得南望若南望者即用勾影北高之術第五平術不論高下周􅙼度日用此平術故東西南北四望皆通遠近一差不須别術第六術者是外衡其徑云四十七萬六千里半之得二十三萬八千里者是外衡去天心之處心高於外衡六萬里爲率南行二十三萬八千里下校六萬里約之得南行一百一十九里下校三十里一百一十九歩差下三十歩則三十歩大强差下十歩以此爲准則不合有平地地旣平而用術尤乖理驗且自古論晷影差變毎有不同今略其梗槩取其推歩之要尚書攷靈曜云日永影尺五寸日短一十三尺日正南千里而減一寸張衡靈憲云懸天之晷薄地之儀皆移千里而差一寸鄭玄註周禮云凡日影於地千里而差一寸王蕃姜岌因此爲說按前諸說是數並同其言更出書非直有此以事考量恐非實矣謹按宋元嘉十九年歳在壬午遣使徃交州度日影夏至之日影在表南三寸二分太康地理志交趾去洛陽一萬一千里陽城去洛陽一百八十里交趾西南望陽城洛陽在其東南較而言之令陽城去交趾近於洛陽去交趾一百八十里則交趾去陽城一萬八百二十里而影差尺有八寸二分是六百里而影差一寸也况復人路迂廻羊腸曲折方於鳥道所較彌多以事驗之又未盈五百里而差一寸眀矣千里之言固非實也何承天又云詔以土圭測影考校二至三日有餘從來積歳及交州所上驗其增減亦相符合此則影差之驗也周禮大司徒職曰夏至之影尺有五寸馬融以爲洛陽鄭玄以爲陽城尚書攷靈曜日永影一尺五寸鄭玄以爲陽城日短十三尺易緯通卦驗夏至影尺有四寸八分冬至一丈三尺劉向洪範傳夏至影一尺五寸八分是時漢都長安而向不言測影處所若在長安則非晷影之正也夏至影長一尺五寸八分冬至一丈三尺一寸四分向又云春秋分長七尺三寸六分此即緫是虗妄後漢曆志夏至影一尺五寸後漢洛陽冬至一丈三尺自梁天監巳前並同此數魏景𥘉夏至影一尺五寸魏𥘉都許昌與頴川相近後都洛陽又在地中之數但易緯因漢曆舊影似不别影之冬至一丈三尺晉姜岌影一尺五寸宋都建康在江表驗影之數遥取陽城冬至一丈三尺宋大明祖冲之曆夏至影一尺五寸宋都秣陵遥取影同前冬至一丈三尺後魏信都芳注周􅙼四術云按永平元年戊子是梁天監之七年也見洛陽測影又見公孫崇集諸朝士共觀祕書影同是夏至之日以八尺之表測日中影皆長一尺五寸八分雖無六尺近六寸梁武帝大同十年太史令虞鄺以九尺表於江左建康測夏至日中影長一尺三寸二分以八尺表測之影長一尺一寸七分强冬至一丈三尺七分八尺表影長一丈一尺六寸二分弱隋開皇元年冬至影長一丈二尺七寸二分開皇二年夏至影一尺四寸八分冬至長安測夏至洛陽測及王邵隋靈感志冬至一丈二尺七寸二分長安測也開皇四年夏至一尺四寸八分洛陽測也冬至一丈二尺八寸八分洛陽測也大唐正觀二年己五五月二十三日癸亥夏至中影一尺四寸六分長安測也十一月二十九丙寅冬至中影一丈二尺六寸三分長安測也按漢魏及隋所記夏至中影或長短齊其盈縮之中則夏至之影尺有五寸爲近定實矣以周官推之洛陽爲所交會則冬至一丈二尺五寸亦爲近矣按梁武帝都金陵云洛陽南北大較千里以尺表令其有九尺影則大同十年江左八尺表夏至中影長一尺一寸七分若是爲夏至八尺表千里而差一寸弱矣此推驗卽是夏至影差降升不同南北逺近數亦有異日高圖注趙君卿曰黃甲與黃乙其實正等以表高乘兩表相去爲黃甲之實以影差爲黃甲之廣而一所得則變得黃甲之袤上與日齊按圖當加表高今言八萬里者從表以上復加之青丙與青已其實亦等黃甲與青丙相連黃乙與青已相連其實亦等皆以影差爲廣臣鸞曰求日高法先置表高八尺爲八萬里爲袤以相兩表相去二千里爲廣乘袤八萬里得一億六千萬里爲黃甲之實以影差二寸爲二千里爲法除之得黃乙之袤八萬里卽上與日齊此言王城去天名曰甲日底地上至日名曰乙上天名青丙下地名青戊據影六尺王城上天南至日六萬里王城南至日底地亦六萬里是上下等數日夏至南萬六千里者立表八尺於王城影一尺六寸影寸千里故王城去夏至日底地萬六千里也法曰周􅙼長八尺勾之損益寸千里勾謂影也言懸天之影薄地之儀皆千里而差一寸故曰極者天廣袤也言極之遠近有定則天廣長可知今立表高八尺以望極其勾一丈三寸由此觀之則從周北十萬三千里而至極下謂冬至日加卯酉之時若春秋分之夜半極南兩旁與天中齊故以爲周去天中之數榮方曰周􅙼者何陳子曰古時天子治周古時天子謂周成王時以治周居王城故曰昔先王之經邑奄觀九隩靡地不營土圭測影不縮不盈當風雨之所交然後可以建王城此之謂也此數望之從周故曰周􅙼言周都河南爲四方之中故以爲望主也􅙼者表也用其行事故曰􅙼由此捕望故曰表影爲勾故曰勾股也日夏至南萬六千里日冬至南十三萬五千里日中無影以此觀之從南至夏至之日中十一萬九千里諸言極者斥天之中極去周十萬三千里亦謂極與天中齊時更加南萬六千里是也北至其夜半亦然日極在極北正等也凡徑二十三萬八千里并南北之數也此夏至日道之徑也其徑者圓中之直者也其周七十一萬四千里周匝也謂天戴日行其數以三乘徑臣鸞曰求夏至日道徑法列夏至日去天中心十一萬九千里夏至夜一日亦去天中心十一萬九千里并之得夏至日道徑二十三萬八千里三乘徑得周七十一萬四千里也從夏至之日中至冬至之日中十一萬九千里冬至日中去周十三萬五千里除夏至日中去周一萬六千里是也北至極下亦然則從極南至冬至之日中二十三萬八千里從極北至其夜半亦然凡徑四十七萬六千里此冬至日道徑也其周百四十二萬八千里從春秋分之日中北至極下十七萬八千五百里春秋之日影七尺五寸五分加望極之勾一丈三寸臣鸞曰求冬至日道徑法列夏至去冬至日中十一萬九千里從夏至日道北徑亦十一萬九千里併之得冬至日中北極下二十三萬八千里從極至夜半亦二十三萬八千里并之得冬至道徑四十七萬六千里以三乘徑卽冬至日道周一百四十二萬八千里從極下北至其夜半亦然凡徑三十五萬七千里周一百七萬一千里故日月之道常縁宿日道亦與宿正内衡之南外衡之北圓而成規以爲黃道二十八宿列焉日之行也一出一入或表或裏五月二十三分月之二十一道一交謂之合朔交會及月蝕相去之數故曰縁宿也日行黃道以宿爲正故曰宿正於中衡之數與黃道等臣鸞曰求春秋分日道法列春秋分日中北至極下十七萬八千五百里從北極北至其夜半亦然并之得春秋分日道徑三十五萬七千里以三乘徑卽日道周一百七萬一千里求黃道徑法列從北極南至夏至日中一十一萬九千里以從極北去冬至夜半二十三萬八千里并之得黃道三十五萬七千里從極南至冬至日北至夏至日夜半亦黃道徑也以三乘徑周得一百七萬一千里也南至夏至之日中北至冬至之夜半南至冬至之日中北至夏至之夜半亦徑三十五萬七千里周一百七萬一千里此皆黃道之數與中衡等春分之日夜分以至秋分之日夜分極下常有日光春秋分者晝夜等春分至秋分日内近極故日光照及也秋分之日夜分以至春分之日夜分極下常無日光秋分至春分日外遠極故日光照不及也故春秋分之日夜分之時日所照適至極隂陽之分等也冬至夏至者日道發歛之所生也至晝夜長短之所極發猶往也歛猶還也極終也春秋分者隂陽之修晝夜之象修長也言隂陽長短之等晝者陽夜者隂以明暗之差爲隂陽之象春分以至秋分晝之象北極下見日光也日永主物生故象晝也秋分至春分夜之象北極下不見日光也日短主物死故象夜也故春秋分之日中光之所照北極下夜半日光之所照亦南至極此日夜分之時也故曰日照四旁各十六萬七千里至極者謂璇璣之際爲陽絶隂障以日之時而日光有所不逮故知日旁照十六萬七千里不及天中一萬一千五百里也人望所見遠近宜如日光所照日近我一十六萬七千里之内及我我自見日故爲日出日遠我十六萬七千里之外日則不見我我亦不見日故爲日入是爲日與目見於十六萬七千里之中故曰逺近宜如日光之所照也從周所望見北過極六萬四千里自此以下諸言減者皆置日光之所照若人目之所見十六萬七千里以除之此除極至周十萬三千里臣鸞曰求從周所望見北過極六萬四千里法列人目所極十六萬七千里以王城周去極十萬三千里減之餘六萬四千里卽人望過極之數也南過冬至之日三萬二千里除冬至日中去周十三萬五千里臣鸞曰求冬至日中三萬二千里法列人目所極十六萬七千里以冬至日中去王城十三萬五千里減之餘卽過冬至日中三萬二千里也夏至之日中光南過冬至之日中光四萬八千里除冬至之日中相去十一萬九千里臣鸞曰求夏至日中光南過冬至日中光四萬八千里法列日高照十六萬七千里以冬夏至日中相去一十一萬九千里減之餘卽南過冬至之日中光四萬八千里南過人所望見一萬六千里夏至日中去周萬六千里臣鸞曰求夏至日中光南過人所望見萬六千里法列王城去夏至日中光南過人所望見萬六千里加日光所及十六萬七千里得十八萬三千里以人目所極十六萬七千里減之餘卽南過人目所望見一萬六千里也北過周十五萬一千里除周夏至之日中一萬六千里臣鸞曰求夏至日中光北過周十五萬一千里法列日光所及十六萬七千里以王城去夏至日中一萬六千里減之餘卽北過周十五萬一千里北過極四萬八千里除極去夏至之日十一萬九千里臣鸞曰求夏至日中光北過極四萬八千里法列日光所及十六萬七千里以北極去夏至夜半十一萬九千里減之餘卽北過極四萬八千里也冬至之夜半日光南不至人所見七千里倍日光所照里數以減冬至日道徑四十七萬六千里又除冬至日中去周十三萬五千里臣鸞曰求冬至夜半日光南不至人目所見七千里法列日光十六萬七千里倍之得三十三萬四千里以減冬至日道徑四十七萬六千里餘十四萬二千里復以冬至日中去周十三萬五千里減之餘即不至人目所見七千里不至極下七萬一千里從極至夜半除所照十六萬七千里臣鸞曰求冬至日光不至極下七萬一千里法列冬至夜半去極二十三萬八千里以日光一十六萬七千里減之餘卽不至極下七萬一千里夏至之日中與夜半日光九萬六千里過極相接倍日光所照以夏至日道徑減之餘卽相接之數臣鸞曰求夏至日中日光與夜半相接九萬六千里法列倍日光所照十六萬七千里得徑三十三萬四千里以夏至日過徑二十三萬八千里減之餘卽日光相接九萬六千里也冬至之日中與夜半日光不相及十四萬二千里不至極下七萬一千里倍日光所照以減冬至日道徑餘卽不相及之數半之卽各不至極下臣鸞曰求冬至日光與夜半日不及十四萬二千里不至極下七萬一千里法列冬至日道徑四十七萬六千里以倍日光所照三十三萬四千里減之餘卽日光不相及十四萬二千里半之卽不至極下七萬一千里也夏至之日正東西望直周東西日下至周五萬九千五百九十八里半求之術以夏至日道徑二十三萬八千里爲弦倍極去周十萬三千里得二十萬六千里爲股爲之求勾以股自乘減弦自乘其餘開方除之得勾一十一萬九千一百九十七里有竒半之各得周半數臣鸞曰求夏至日正東西去周法列夏至道徑二十三萬八千里爲弦自相乘得五百六十六億四千四百萬爲弦實更置極去周十萬三千里倍之爲二十萬六千里爲股重張自相乘得四百二十四億三千六百萬爲股實以減弦實餘一百四十二億八百萬卽勾實以開方除之得正東西去周一十一萬九千一百九十七里二十三萬八千三百九十五分里之七萬五千一百九十一半之卽周東西各五萬九千五百九十八里半經曰竒者分也若求分者倍分母得四十七萬六千七百九十卽一方得五萬九千五百九十八里半四十七萬六千七百九十分里之七萬五千一百九十一本經無所餘算之次因而演之也冬至之日正東西方不見日正東西方者周之卯酉日在十六萬七千里之外不見日以算求之日下至周二十一萬四千五百五十七里半求之術以冬至日道徑四十七萬六千里爲弦倍極之去周十萬三千里得二十萬六十里爲勾爲之求股勾自乘減弦之自乘其餘開方除之得四十二萬九千一百一十五里有竒半之各得東西數臣鸞曰求冬至正東西方不見日法列冬至日道徑四十七萬六千里爲弦重張相乘得二千二百六十五億七千六百萬里爲弦實更列極去周十萬三千里倍之得二十萬六千里爲勾重張相乘得四百二十四億三千六百萬以減弦實餘一千八百四十一億四十萬卽股實開方除之得周直東西四十二萬九千一百一十五里八十五萬八千二百三十一分里之三十一萬六千七百七十五半卽周一方去日二十一萬四千五百五十七里半亦倍分母得一百七十一萬六千四百六十二分里之三十一萬六千七百七十五凡此數者日道之發歛凡此上周徑之數者日道徃還之所至晝夜長短之所極冬至夏至觀律之數聽鐘之音觀律數之生聽鐘音之變知寒暑之極明代序之化也冬至晝夏至夜冬至晝夜日道徑半之得夏至晝夜日道徑法置冬至日道徑四十七萬六千半之得夏至日中去夏至夜半二十三萬八千里以四極之里也差數及日光所還觀之以差數之所及日光所還以此觀之則四極之窮也四極徑八十一萬里從極南至冬至日中二十三萬八千里又日光所照十六萬七千里凡徑四十萬五千里北至其夜半亦然故日徑八十一萬里八十一者陽數之終日之所極臣鸞曰求四極徑八十一萬里法列冬至日中去極二十三萬八千里復加冬至日光所極十六萬七千里得四十萬五千里北至其夜半亦然并南北卽是大徑八十一萬里周二百四十三萬里三乘徑卽周臣鸞曰以三乘八十一萬里得周二百四十三萬自此以外日所不及也從周至南日照處三十萬二千里半徑除周去極十萬三千里臣鸞曰求周南三十萬二千里法列半徑四十萬五千以王城去極十萬三千里減之餘卽周南至日照處三十萬二千里周北至日照處五十萬八千里半徑加周去極十萬三千里臣鸞曰求周去冬至夜半日北極照處五十萬八千里法列半道徑四十萬五千里加周夜半去極十萬三千里得冬至夜半北極照去周五十萬八千里東西各三十九萬一千六百八十三里半求之術以徑八十一萬里爲弦倍去周十萬三千里得二十萬六千里爲勾爲之求股得七十八萬三千三百六十七里有竒半之各得東西之數臣鸞曰求東西各三十九萬一千六百八十三里半法列徑八十一萬里重張自乘得六千五百六十一億爲弦實更置倍周去北極二十萬六千里爲勾重張自乘得四百二十四億三千六百萬以減弦實餘六千一百三十六億六千四百萬卽股實以開方除之得股七十八萬三千三百六十七里一百五十六萬六千七百三十五分里之十四萬三千三百一十一半之卽得去周三十九萬一千六百八十三里半分母亦倍之得三百一十三萬三千四百七十分里之十四萬三千三百一十一也周在天中南十萬三千里故東西矩中徑二萬六千六百三十二里有竒求矩中徑二萬六千六百三十二里有竒法列八十一萬里以周東西七十八萬三千三百六十七里有竒減之餘卽矩中徑之數臣鸞曰求矩中徑二萬六千六百三十二里有竒法列八十一萬里以周東西七十八萬三千三百六十七里有竒減之餘二萬六千六百三十三里取一里破爲一百五十六萬六千七百三十五分減一十四萬三千三百一十一餘一百四十二萬三千四百二十四卽徑東西矩二萬六千六百三十二里一百五十六萬六千七百三十五分里之一百四十二萬三千四百二十四周北五十萬八千里冬至日十三萬五千里冬至日道徑四十七萬六千里周一百四十二萬八千里日光四極當周東西各三十九萬一千六百八十三里有竒此方圓之法此言求圓於方之法萬物周事而圓方用焉大匠造制而䂓矩設焉或毁方而爲圓或破圓而爲方方中爲圓者謂之圓方圓中爲方者謂之方圓也七衡圖註趙君卿曰靑圖畫者天地合際人目所遠者也天至高地至卑非合也人目極觀而天地合也日入青圖畫内謂之日出出青圖畫外謂之日入青圖畫之内外皆天也北辰正居天中之央人所謂東西南北者非有常處各以日出之處爲東日中爲南日入爲西日没爲北北辰之下六月見日六月不見日從春分至秋分六月常見日從秋分至春分六月常不見日見日爲晝不見日爲夜所謂一歳者卽北辰之下一晝一夜黃圖畫者黃道也二十八宿列焉日月星辰躔焉使青圖在上不動貫其極而轉之卽交矣我之所在北辰之南非天地之中也我之卯酉非天地之卯酉内第一夏至日道也出第四春秋分日道也外第七冬至日道也皆隨黃道日冬至在牽牛春分在婁夏至在東井秋分在角冬至從南而北夏至從北而南終而復始也凡爲此圖以丈爲尺以尺爲寸以寸爲分分一千里凡用繒方八尺一寸今用繒方四尺五分分爲二千里方爲四極之圖盡七衡之意吕氏曰凡四海之内東西二萬八千里南北二萬六千里吕氏秦相吕不韋作吕氏春秋此之義在有始第一篇非周􅙼本文爾雅云九夷八狄七戎六蠻謂之四海言東西南北之數者將以明車轍馬跡之所至河圖括地象云而有君長之州九阻中國之文德及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形訓云禹使大章歩自東極至于西極孺亥歩自北極至于南極而數皆然或其廣濶將焉可歩矣亦後學之徒未之或知也夫言億者十萬曰億也凡爲日月運行之圓周春秋分冬夏至璿璣之運也七衡周而六間以當六月節六月爲百八十二日八分日之五節六月者從冬至至夏至日百八十二日八分日之五爲半歲六月節者謂中氣也不盡其日也此日周天通四分一之倍法四以除之卽得也臣鸞曰求七衡周而六間以當六月節六月爲一百八十二日八分日之五此爲半歲也列周天三百六十五日四分日之一通分内子得一千四百六十一爲實倍分母四爲八除實得半歲一百八十二日八分日之五也故日夏至在東井極内衡日冬至在牽牛極外衡也東井牽牛爲長短之限内外之極也衡復更終冬至冬至日從外衡還黃道一周年復於故衡終於冬至故曰一歲三百六十五日四分日之一一歲一内極一外極從冬至一内極及一外極度終於星月窮於次是爲一歲三十日十六分日之七月一外極一内極欲分一歲爲十二月一衡間當一月此舉中相去之日數以此言之月行二十九日九百四十分日之四百九十九則過周天一日而與月合宿論其入内外之極六歸粗通未心得也日光言内極月光言外極日陽從冬至起月隂從夏至起往來之始易曰日徃則月來月往則日來此之謂也此數置一百八十二日八分日之五通分内子五以六間乘分母以除之得三十以三約法得十六約餘得七臣鸞曰求三十日十六分日之七法列半歲一百八十二日八分日之五通分内子得一千四百六十一爲實以六間乘分母八得四十八除實得三十日不盡二十一更置法實求等數平於三即以約法得十六約餘得七即是從中氣相去三十日十六分日之七也是故衡之間萬九千八百三十三里三分里之一卽爲百歩此數夏至冬至相去十一萬九千里以六間除之得矣法與餘分皆半之臣鸞曰求一衡之間一萬九千八百三十三里三分里之一法置冬至夏至相去十一萬九千里以六間除之卽得法與餘分半之得也欲知次衡徑倍而增内衡之徑倍一衡間數以増内衡二之以增内衡徑二乘所倍一衡之間數以増内衡徑卽得三衡徑次衡放此次至皆如數内一衡徑二十三萬八千里周七十一萬四千里分爲三百六十五度四分度之一度得一千九百五十四里二百四十七歩千四百六十一分歩之九百三十三通周天四分之一爲法又以四乘衡周爲實實如法得一百歩不滿法者十之如法得十歩不滿法者十之如法得一歩不滿者以法命之至七衡皆如此臣鸞曰求内衡度法置夏至徑二十三萬八千里以三乘之得内外衡周七十一萬四千里以周天分母四乘内衡周得二百八十五萬六千里爲實以周天分一千四百六十一爲法除之得一千九百五十四里不盡一千二百六卽而三之爲三千六百十八以法除之得二百歩不盡六百九十六歩上十之如法而得四十歩不盡一千一百一十六復上十之如法而一得七歩不盡九百三十三卽是一千九百五十四里二百四十七歩一千四百六十一分歩之九百三十三次二衡徑二十七萬七千六百六十六里二百歩周八十三萬三千里分里爲度度得二千二百八十里百八十八歩千四百六十一分歩之千三百三十二通周天四分之一爲法四乘衡周爲實實如法得里數不滿者求歩數不盡者命分臣鸞曰求第二衡法列一衡間一萬九千八百三十三里少半里倍之得三萬九千六百六十六里太半里増內衡徑二十三萬八千里得第二衡徑二十七萬七千六百六十六里二百歩是三分里之二又以三乘之歩滿三百成一里得二衡周八十三萬三千里以周天分母四乘周得三百三十三萬二千爲實更置周天三百六十五度四分度之一通分内子得一千四百六十一爲法除之得二千二百八十里不盡九百二十以三百乘之得二十七萬六千復以前法除之得一百八十八歩不盡一千三百三十二卽是度得二千二百八十里一百八十八歩一千四百六十一分歩之一千三百三十二次三衡徑三十一萬七千三百三十三里一百歩周九十五萬二千里分爲度度得二千六百六里百三十歩千四百六十一分歩之二百七十通周天四分之一爲法四乘衡周爲實實如法得里數不滿法者求歩數不盡者命分臣鸞曰求第三衡法列倍一衡間得三萬九千六百六十六里三分里之二增第二衡徑二十七萬七千里六百六十六里二百歩卽三分里之二得第三衡徑三十一萬七千三百三十三里一百歩以三乘徑歩歩滿三百成里得周九十五萬二千里又以分母四乘周得三百八十萬八千爲實以周天分一千四百六十一爲法以除實得二千六百六里不盡六百三十四以三百乘之以法除之得一百三十歩不盡二百七十卽是度得二千六百六里一百三十歩一千四百六十一分歩之二百七十次四衡徑三十五萬七千里周一百七萬一千里分爲度度得二千九百三十二里七十一歩千四百一十分歩之六百六十九通周天四分之一爲法四乘衡周爲實實如法得里數不滿法者求歩數不盡者命分臣鸞曰求第四衡法列倍一衡間三萬九千六百六十六里三分里之二増第三衡徑三十一萬七千三百三十三里一百歩歩滿三百成里得徑三十五萬七千里以三乘之得周一百七萬一千里以分母乘之得四百二十八萬四千里爲實以周天分一千四百六十一除之得二千九百三十二里不盡三百四十八以三百乘之以法除之得七十一歩不盡六百六十九卽是度得二千九百三十二里七十一歩一千四百六十一分歩之六百六十九次五衡徑三十九萬六千六百六十六里二百歩周一百一十九萬里分爲度度得三千二百五十八里十二歩千四百六十一分歩之千六十八通周天四分之一爲法四乘衡周爲實實如法得里數不滿法者求歩數不盡者命分臣鸞曰求第五衡法列倍第一衡間三萬九千六百六十六里三分里之二増第四衡徑三十五萬七千里滿三百成里得第五衡徑三十九萬六千六百六十六里二百歩以三分乘徑得周一百一十九萬里又以分母四乘周得四百七十六萬爲實以周天分一千四百六十一爲法除之得三千二百五十八里不盡六十二以三百乘之以法除之得十二歩不盡一千六十八卽是度得三千二百五十八里十二歩一千四百六十一分歩之一千六十八次六衡徑四十三萬六千三百三十三里一百歩周一百三十萬九千里分爲度度得三千五百八十三里二百五十四歩千四百六十一分歩之六通周天四分之一爲法四乘衡周爲實實如法得一里不滿法者求歩不盡者命分臣鸞曰求第六衡法列倍第一衡間三萬九千六百六十六里三分里之二以増第五衡徑三十九萬六千六百六十六里一百歩又三乘徑得周一百三十萬九千里又以分母四乘周得五百二十三萬六千爲實以周天分一千四百六十一爲法除之得三千五百八十三里不盡一千二百三十七以三百乘之以法除之得二百五十四歩不盡六卽是度得三千五百八十三里二百五十四歩一千四百六十一分歩之六次七衡徑四十七萬六千里周一百四十二萬八千里分爲度得三千九百九里一百九十五歩千四百六十一分歩之四百五通周天四分之一爲法四乘衡周爲實實如法得里數不滿法者求歩數不盡者命分臣鸞曰求第七衡法列倍第一衡間三萬九千六百六十六里三分里之二増第六衡徑四十三萬六千三百三十三里一百歩得第七衡徑四十七萬六十里以三乘之得周一百四十二萬八千里以分母四乘之得五日七十一萬二千爲實以周天分一千四百六十一爲法除之得三千九百九里不盡九百五十一又以三百乘之所得以法一千四百六十一除之得一百九十五歩不盡四百五卽是度得三千九百九里一百九十五歩一千四百六十一分歩之四百五其次曰冬至所北照過北衡十六萬七千里冬至十一月日在牽牛徑在北方因其在北故言照過北衡爲徑八十一萬里倍所照増七衡徑周二百四十三萬里三乘倍増七衡周分爲三百六十五度四分度之一度得六千六百五十二里二百九十三歩千四百六十一分歩之三百二十七過此而徃者未之或知過八十一萬里之外或知者或疑其可知或疑其難知此言上聖不學而知之上聖者智無不至明無不見攷靈曜曰微式出冥唯審其形此之謂也故冬至日晷丈三尺五寸夏至日晷尺六寸冬至日晷長夏至日晷短日晷損益寸差千里故冬至夏至之日南北遊十一萬九千里四極徑八十一萬里周二百四十三萬里分爲度度得六千六百五十二里二百九十三歩千四百六十一分歩之三百二十七此度之相去也臣鸞曰求冬至日所北照十六萬七千里并南北日光得三十三萬四千里増冬至日道徑四十七萬六千里得八十一萬里三之得周二百四十三萬以周天分母四乘之得九百七十二萬里爲實以周天分一千四百六十一爲法除之得六千六百五十二里不盡一千四百二十八以三百乘之得四十三萬八千四百復以法除之得二百九十三歩不盡三百二十七卽是度得六千六百五十二里二百九十三歩一千四百六十一分歩之三百二十七其南北游日六百五十一里一百八十二歩一千四百六十一分歩之七百九十八術曰置十一萬九千里爲實以半歳一百八十二日八分日之五爲法半歳考從外衡去内衡以爲法除相去之數得一日所行也而通之通之者數不合齊以法等得相通入以八乘也得九十五萬二千爲實通十一萬九千里所得一千四百六十一爲法除之通百八十二日八分日之五也實如法得一里不滿法者三之如法得百歩一里三百歩當以三百乘而言之三之者不欲轉法便以一位爲百實故從一位命爲百不滿法者十之如法得十歩上下用三百乘故此十之便以位爲十實故從一位命爲十不滿法者十之如法得一歩復十之者但以一位爲實故從一位命爲一不滿法者以法命之位盡於一歩故以法命其餘分爲殘歩臣鸞曰求南北游法置冬至十一萬九千里以半歲日分母八乘之得九十五萬二千爲實通半歳一百八十二日八分日之五得一千四百六十一以除得六百五十一里不盡八百八十九以三百乘之得二十六萬六千七百復以法除之得一百八十二歩不盡七百九十八卽得日南北遊日六百五十一里一百八十二歩一千四百六十一分歩之七百九十八周􅙼算經卷上周􅙼音義假承務郞秘書省鈞考算經文字臣李籍撰序周􅙼步米切周􅙼算經者以九數勾股重差算日月周天行度遠近之數皆得於股表卽推步盖天之法也􅙼者股也以表爲股周天曆度本包犧氏立法其傳自周公受之於大夫商高周人志之故曰周􅙼趙君卿撰雛免切述也君卿趙爽字也不詳何代人恢苦回切大也廓落上枯郭切下歷各切晷儀居洧切日影也度量上達各切下録章切探賾上吐南切下上革切賾者含蓄含蓄者探之可及故易中有曰探𦣱索隱上色白切下於謹切隱者隱匿隱匿者索之可得故易曰索隱詭異上居委切下於冀切詭譎怪也渾天胡昆切渾天者言天地之體譬如鳥卵天包地外猶殼之褁黄也周旋無端其形渾渾然故曰渾天史官候臺所用銅儀則其法也立八尺圓體具天地之形以正黄道古察發歛以行日月以歩五緯精微深妙不代百易之道也官有其器而無其書蓋天居大切盖天之說即周􅙼是也其言天似蓋笠地似覆槃天地各中高外下北極之下爲天地之中其地最高而滂沱四隤三光隱映以爲晝夜天中高於外衡冬至日之所在六萬里北極下地二萬里天地隆高相從日去地常八萬里日麗天而平轉分冬夏之間日前行道爲七衡六間毎衡周徑里數各依算術用勾股重差推晷影極游以爲逺近之數皆得於表股者也故曰周􅙼又周􅙼家云天圓如張盖地方如棋局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西没譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左廻焉天形南高而北下日出高故見日入下故不見天之形如倚盖故極在人北是其證也極在天之中而今在人北所以知天之形如倚盖也靈憲詐建切靈憲張衡所述其說主於渾天重仞上直龍切下音刅八尺曰仞奥於到切迥戸頂切逺也卷上甄鸞上之人切下歷官切甄鸞北周司隷校尉重述上直龍切下時律切趙爽旣加注釋甄鸞又從而發明故曰重述善數色具切數算也包犧上蒲交切下虚宜切曆度徒箇切而度大各切量也勾股圓方圖勾古侯切股公土切圓徑一而周三方徑一而匝四伸圓之周而爲勾展方之匝而爲股共結一角邪適五乃圓方邪徑相通之率也勾股圓方圖盖以此設學者觀之思過半矣弦胡田切共結一角也率朔律切數相與也又音律竒耦上居宜切下烏口切矩俱雨切折之列切更相上古衡切下息羊切共盤上渠用切下蒲官切昏墊都念切下也書曰下民昏墊并卑政切勾股之差楚佳切不齊也勾股之差其數差一謂勾三股四也量均力仗切爲袤莫候切長也偃矩覆矩偃於憲切仰也覆敷目切俯也矩表也仰表所以望高俯表所以測深方属地殊玉切下同滂沲上普郎切下唐何切四隤徒回切列星之宿思救切二十八宿之度也禮記月令宿離不忒是也不省息井切省窹也不省言不窹也猶言不敏也累思魯水切累重也直能切才單德寒青戊極者竭憶切諸言極者斥天中極去周十萬三千里奄衣檢切覆也九隩於到切土可居也靡地母被切無也斥昌石切指也緣宿息救切二十八宿也蝕乘力切日月虧曰蝕稍小侵虧如蠧食草木之葉也適至施直切恰也發歛力冉切發徃歛還也璿璣上音璇下音機逮音迨及也有竒居宜切數之餘也易曰歸竒於扐冬至夏至觀律之數聽鍾之音律吕戍切聽陀定切此謂冬夏二至合八能之士以觀律之數而聽鐘音之清濁也晉律曆志曰隂陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷影侯鍾律權土炭效隂陽冬至陽氣應則灰除是故樂均清影長極黄鍾通土炭輕而衡仰夏至隂氣應則樂均濁影短極㽔賓通土炭重而衡低進退於先後五日之中八能各以候狀聞太史令封丄效則和否則占七衡圖何庚切七衡者七䂓也謂䂓爲衡者取其衡運則生䂓䂓者正圓之謂也內一衡徑二十三萬八千里次二衡徑二十七萬七千六百六十六里二百歩次三衡徑三十一萬七千三百三十三里一百歩次四衡徑三十五萬七千里次五衡徑三十九萬六千六百六十六里二百歩次六衡徑四十三萬六千三百三十三里一百歩次七衡徑四十七萬六千里即其徑而三之則各得其周也凡日月運行之圖周七衡周而六間一衡之間萬九千八百三十三里一百歩以六衡乘之即夏至冬至相去十一萬九千里也青圖畫者胡卦切界也俗作畫合際上胡閤切下子例切常處昌據切所也躔呈延切次也卯酉上莫飽切下以久切皆辰名也卯正東也酉正西也牽牛上輕烟切下如字率牛北方宿也冬至日在牽牛婁盧侯切婁西方宿也春分日在婁東井子郢切南方宿也夏至日在東井角記岳切東方宿也秋分日在角用繒慈陵切帛也呂氏兩舉切呂氏者呂氏春秋也呂不韋爲秦相國集當世儒士使著所聞爲十二紀八覽六論合十餘萬言備古今之事名爲呂氏春秋四海呼改切吕氏春秋曰几四海之内東西二萬八千里南北二萬六千里爾雅云九夷八狄七戎六蠻謂之四海言東西南北之數者将明車轍馬跡之所至河圖括地象亦云里數而有君長之州九阻中國之文德及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形訓云禹使大章歩自東極至于西極孺亥歩自北極至于南極而數皆然河圖括地象括音䀨河圖括地象緯書名也淮南子並如字漢淮南王安所著之書也大章音泰人名六間古閑切兩衡相去之間也粗通徂五切略也放此甫兩切效也下同卷下四和戶戈切調也四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所會隂陽之所和然則百物阜安草木蕃庻故曰四和阜安房缶切盛也蕃庻符袁切茂也易處夷益切交也蓋笠上居大切下音立覆槃上方六切下蒲官切離地力智切去也障蔽上之亮切隔也下必䄃切奄也日兆月直紹切日者陽之精譬猶火光月者隂之精譬猶水光月含影故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡月禀日光而成形兆故云日兆月也魄匹陌切月之明消也康誥曰惟三月哉生魄孔安國曰三月始生魄月十六日眀消而魄生楊子曰旣望則終魄於東亦此意也行列胡剛切極樞春朱切爾雅曰樞謂之棖郭璞云門戸扉樞也此言極樞者取其居中而臨制四方也繩繫古詣切結也表顛多年切頂也中折之列切屈也漏盧候切漏以銅受水刻節晝夜百刻晷漏中星畧例曰日行有南北晷漏有長短然二十四氣晷差遲疾不同勾股使然也直䂓中則差遲與勾股數齊則差急隨辰極高下所遇不同如黄道刻漏此乃數之淺者近代且猶未曉今推黄道去極與晷影漏刻昏距中星四術反覆相求消息同率施相爲中以合九股之變揆度上巨癸切下大各切釋施隻切散也朝生陟遥切旦也暮獲胡麥切穫胡郭切収也葶藶上音亭下音歷薺麥在禮切正勾上音政下音鈎無令離呈切使也纎微思廉切細也督音篤察也分度徒固切數也經緯上堅丁切下子貴切南北爲經東西爲緯圓定正音政則復扶富切又也須女如字星名也游儀如字游儀所以望星也眞觀中李淳風造四游儀元樞爲軸以連結玉衡游筩而貫約䂓矩又元樞北立北辰南距地軸旁轉於内玉衡在元樞之間而南北游仰以觀天之辰宿下以識器之晷度開元九年率府兵曹叅軍梁令瓉以木爲游儀一行是之乃奏黄道游儀古有其術而無其噐昔人潜思未能得今令瓉所爲日道月交皆自然契合於推步尤要請㫖更鑄以銅十年儀成車輻方六切所以實論而凑轂者也以圓度爲輻爲轂古禄切所以受輻也以經緯之交爲轂二十八宿息救切副置敷救切别也别置算也下同地恊檄頰切合也相應於證切叅正上倉含切下音正八節並如字二至者寒暑之極二分者隂陽之和四立者生長収藏之始是爲八節二十四氣並如字一歳凡八節節三氣三而入之故爲二十四氣氣損益九寸九分六分分之一並如字損者減也破一分爲六分然後減之益者加也加以小分滿六分得一從分冬至並如字至極也冬至夏至寒暑之極啓蟄直立切藏也易曰龍蛇之蟄以存身也左氏傳曰啓蟄而郊春分府文切分之言中也春分爲陽之中秋分爲隂之中芒種上莫郎切下之用切處暑昌據切所也時舎音捨不用也虚誕音但謾也一概古代切矛楯上莫浮切下食閏切矛所以勾楯所以蔽噐不同不相爲用凡言矛楯者况其所趣異也後天並如字月後天者月東行者也此見日月與天俱西南游一日一夜天一周而月在昨夜之東故曰後天故舎式夜切舎謂二十八宿之舎也積後天資昔切以月後天分看小歲積分則積後天分也大歲徒盖切大歳者十三月爲一歳也經歲堅丁切經常也經歳者通十二月十九分之七小月並如字小月者二十九日爲一月大月徒盖切大月者三十日爲一月經月堅丁切經月者以十九乘周天分則經月之積合朔上曷閤切下色角切覆九敷救切盖也下同當音當正南方音政三十六頭並如字考靈曜曰分周天爲三十六頭頭有十度九十六分之十四長日分於寅行二十四頭入於戌行十二頭短日分於辰行十二頭入於申行二十日頭北之謂也坎苦感切正北方之卦也巽蘇困切東南隅之卦也坤苦混切西南隅之卦也離吕支切正南方之卦也乾渠焉切西北隅之卦也艮古恨切東北隅之卦也章止良切條也十九歳爲一章言餘閏盡爲暦法章條也蔀薄口切蔀之言齊同日月之分也而又衆殘齊合羣數畢滿故謂之蔀四章爲一蔀凡七十六歳也遂徐醉切遂者終也言五行之德一終盡極日月辰終也二十蔀爲一遂凡千五百二十歳首始九切始也言日月五星終而復始也三遂爲一首凡四千五百六十歳也極如字終也言日月星辰弦望晦朔寒暑推移萬物生育終而復始故謂之極七首爲一極凡三萬一千九百二十歳也乾鑿度徒固切乾鑿度易緯書也周􅙼音義終附算學源流晉書律曆志黄帝紀三綱而闡書契乃使羲龢常儀占月車區占星氣伶倫造律吕大撓造甲子隷首作算數容成緫斯六術攷定氣象建行察發飮起消息正閏餘述而著焉謂之調歷漢書律曆志一曰律數二曰和聲三曰審度四曰嘉五曰權衡數者一十百千萬也所以算數事物順性命之理也其算法用竹徑一分長六寸二百七十一枚而成六觚爲一握度長短者不失毫釐量多少者不失圭撮權輕重者不失黍叅紀於一協於十長於百大於千衍於萬其法在算術乎附算法歌訣開平方法少人通起手先呼九數重百與萬同并百萬二三隔位一相從千同十萬和千萬三四連身九九終除盡虚加一倍回還折半復原宗, 