  - {type: variant, offset: 0, length: 2222, content: 周􅙼算經卷上南陵徐乃昌校勘經籍記漢趙君卿注北周漢中郡守前司隸臣甄鸞重述唐朝議大夫行大史令上輕車都尉臣李淳風等奉勑注釋明趙開美校昔者周公問於商高曰竊聞乎大夫善數也唐寅曰經文也周公姓姬名旦武王之弟商高周時賢大夫善算者也周公位居冡宰德則至高尚自卑巳以自牧下學而上逹況其凡乎唐寅曰此趙注也請問古者包犧立周天曆度包犧三皇之一始畫八卦以商高善數能通乎微妙逹乎無方無大不綜無幽不顯聞包犧立周天曆度運章蔀之法易曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地此之謂也夫天不可階而升地不可將尺寸而度邈乎懸廣無階可升蕩乎遐遠無度可量請問數從安出心昧其機請問其目商高曰數之法出於圓方圓徑一而周三方徑一而匝四伸圓之周而爲勾展方之匝而爲股共結一角邪適弦五政圓方邪徑相通之率故曰數之法出於圓方圓方者天地之形隂陽之數然則周公之所問天地也是以商高陳圓方之形以見其象因竒耦之數以制其法所謂言約㫖遠微妙幽通矣圓出於方方出於矩圓䂓之數理之以方方周匝也方正之物出之以矩矩廣長也矩出於九九八十一推圓方之率通廣長之數當須乘除以計之九九者乘除之原也故折矩故者申事之辭也將爲勾股之率故曰折矩也以爲勾廣三廣圓之周横者謂之廣勾亦廣廣短也股修四應方之匝從者謂之修股亦修修長也徑隅五自然相應之率徑直隅角也亦謂之弦旣方之外半其一矩勾股之法先知二數然後推一見勾股然後求弦先各自乘成其實實成勢化外乃變通故曰旣方其外或并勾股之實以求弦實之中乃求勾股之分并實不正等更相取與互有所得故曰半其一矩其術勾股各自乘三三如九四四一十六并爲弦自乘之實二十五減勾於弦爲股之實一十六減股於弦爲勾之實九環而共盤得成三四五盤讀如盤桓之盤言取而并減之積環屈而共盤之謂開方除之其一面故曰得成三四五也兩矩共長二十有五是謂積矩兩矩者勾股各自乘之實共長者并實之數將以施於萬事而此先陳其率也故禹之所以治天下者此數之所生也禹治洪水決流江河望山川之形定高下之勢除滔天之災釋昏蟄之厄使東注於海而無浸溺乃勾股之所由生也勾股圓方圖弦實二十五朱及黃朱實六黃實一勾股方圓圖注趙君卿曰勾股各自乘併之爲弦實開方除之即弦也案弦圖又可以勾股相乘爲朱實二倍之爲朱實四以勾股之差自相乘爲中黃實加差實亦成弦實以差實減弦實半其餘以差爲從法開方除之復得勾矣加差於勾即股凡并勾股之實即成弦實或矩於内或方於外形詭而量均體殊而數齊勾實之矩以股弦差爲廣股弦并爲袤而股實方其裏減矩勾之實於弦實開其餘即股倍股在兩邊爲從法開矩勾之角即股弦差加股爲弦以差除勾實得股弦并以并除勾實亦得股弦差令并自乘與勾實爲實倍并爲法所得亦弦勾實減并自乘如法爲股股實之矩以勾股差爲廣勾弦并爲袤而勾實方其裏減矩股之實於弦實開其餘即勾倍勾在兩邊爲從法開矩股之角即勾弦差加勾爲弦以差除股實得勾弦并以并除股實得勾弦差令并自乘與股實爲實倍并爲法所得亦弦股實減并自乘如法爲勾兩差相乘倍而開之所得以股弦差增之爲勾以勾弦差增之爲股兩差増之爲弦倍弦實列勾股差實見弦實者以圖考之倍弦實滿外大方而多黃實黃實之多即勾股差實以差實減之開其餘得外大方大方之面即勾股并也令并自乘倍弦實乃減之開其餘得中黃方黃方之面即勾股差以差減并而半之爲勾加差於并而半之爲股其倍弦爲廣袤合令勾股見者自乘爲其實四實以減之開其餘所得爲差以差減合半其餘爲廣減廣於弦即所求也觀其迭相䂓矩共爲反覆互與通分各有所得然則統叙羣倫弘紀衆理貫幽入微鈎深致逺故曰其裁制萬物唯所爲之也釋圓方勾股注按君卿注曰勾股各自乘并之爲弦實開方除之即弦臣鸞曰假令勾三自乘得九股四自乘得十六并之得二十五開方除之得五爲弦也寅曰五五二十五弦實四面之一也注云按弦圖又可以勾股相乘爲朱實二倍之爲朱實四以勾股之差自相乘爲中黃實寅曰勾股相乘其數一十二也臣鸞曰以勾弦差二倍之爲四自乘得一十六爲左圖中黃實也寅曰甄氏止注以勾股十二字之義臣淳風等謹按注云以勾股之差自乘爲中黃實鸞云倍勾弦差自乘者苟求異端雖合其數於率不通寅曰勾股之差其數一也自乘得一一如一注云加差實亦成弦實臣鸞曰加差實一并外矩青八得九并中黃十六得二十五亦成弦實也臣淳風等謹按注云加差實一亦成弦實鸞曰加差實并外矩及中黃者雖合其數於率不通寅曰加差實之一於前文所言朱實四之上朱實之四爲二十四加一爲弦實二十五也注云以差實減弦實半其餘以差爲從法開方除之復得勾矣臣鸞曰以差實九減弦實二十五餘十六半之得八以差一加之得九開之得勾三也臣淳風等謹按注宜云以差實一減弦實二十五餘二十四半之爲十二以差一從開方除之得勾三鸞云以差實九减弦實者雖合其數於率不通顧應祥曰以差實一減弦實二十五注云加差於勾即股臣鸞曰加差一於勾三得股四也注云凡并勾股之實即成弦實臣鸞曰勾實九股實十六并之得二十五也注云或矩於内或方於外形詭而量均體殊而數齊勾實之矩以股弦差爲廣股弦并爲袤臣鸞曰以股弦差一爲廣股四并弦五得九爲袤左圖外青也注云而股實方其裏臣鸞曰爲左圖中黃十六注云減矩勾之實於弦實開其餘即股臣鸞曰減矩勾之實九于弦實二十五餘一十六開之得四股也注云倍股在兩邊爲從法開矩勾之角即股弦差臣鸞曰倍股四得八在圖兩邊以爲從法開矩勾之角九得一也注云加股爲弦臣鸞曰加差一於股四則弦五也注云以差除勾實得股弦并臣鸞曰以差一除勾實九得九即股四弦五并爲九也注云以并除勾實亦得股弦差臣鸞曰以九除勾實九得股弦差一注云令并自乘與勾實爲實臣鸞曰令并股弦得九自乘爲八十一又與勾實九加之得九十爲實注云倍并爲法臣鸞曰倍股弦并九得十八者爲法注云所得亦弦臣鸞曰除之得五爲弦寅曰以法十八除實九十注云勾實減并自乘如法爲股臣鸞曰以勾實九減并自乘八十一餘, WYG: ''}
