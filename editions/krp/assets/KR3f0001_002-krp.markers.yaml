  - {type: variant, offset: 13729, length: 0, content: '', WYG: 巻下之三欽定四庫全書周髀算經音義唐李籍撰周髀序周髀歩米切周髀算經者以九數句股重差算日月周天行度逺近之數皆得於股表卽推歩盖天之法也髀者股也以表為股周天厯度本包犧氏立法其傳自周公受之於大夫商髙周人志之故曰周髀趙君卿撰雛免切述也君卿趙爽字也不詳何代人恢苦囘切大也廓落上枯郭切下厯各切晷儀居洧切日影也度量上達各切下錄章切探賾上吐南切卞士革切賾者含蓄含蓄者探之可及故易曰探賾索隱上色白切下於謹切隠者隠匿隠匿者索之可得故曰索隠詭異古委切莊子曰恢詭譎異渾天胡昆切渾天者言天地之體狀如鳥卯天包地外猶殻之褁黄也周旋無端其形渾渾然故曰渾天史官候臺所用銅儀則其法也立八尺圎體具天地之形以正黄道占察發歛以行日月以歩五緯精㣲深妙百代不易之道也官有其器而無其書盖天居大切益之之説即周髀是也其言天似盖笠地似覆槃天地各中髙外下北極之下為天地之中其地最髙而滂沱四潰三光隠映以為晝夜天中髙於外衡冬至日之所在六萬里北極下地髙于外衡下地亦六萬里外衡髙於北極下地二萬里天地隆髙相從日去地常八萬里日麗天而平轉分夏冬之間日前行道為七衡六間每衡周徑里數各依算術用句股重差推晷影極㳺以為逺近之數皆得于表股者也故曰周髀又周髀家云天圎如張盖地方如棊局天㫄轉如推磨而左行日月右行随天左轉故日月實東行而天牽之以西没譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不随磨以左迴焉天形南髙而北下日出髙故見日入下故不見天下之形如倚盖故極在人北是其證也極在天中而今在人北所以知天之形如倚盖也靈憲許建切靈憲張衡所述其説故曰渾天重仞上直龍切下音刃八尺曰仞奥於到切迥户頂切逺也周髀卷上甄鸞上之人切下厯官切甄鸞北周司𨽻校尉重述上直龍切下時律切趙爽既加注釋甄鸞又從而發明故曰重述善數色具切數算也包犧上蒲交切下虛宜切厯度徒箇切而度大各切量也勾股圎方圗勾古侯切股公土切圗徑一而周三方徑一而帀四伸圎之周而為勾展方之帀而為股共結一角而邪適五乃圎方邪徑相通之率也勾股圎方圖盖以此設學者觀之思過半矣弦胡田切共結一角也率朔律切數相與也又音律竒耦上居宜切下烏口切矩俱雨切折之列切更相上古衡切下息羊切共盤上渠用切下蒲官切昏墊都念切下也書曰下民昏墊并畀政切勾股之差楚佳切不齊也勾股之差其數差一謂勾三股四也量均力仗切為袤莫候切長也偃矩覆矩偃於憲切仰也覆敷目切俯也矩表也仰表所以望髙俯表所以測表方屬地殊玉切下同滂沱上普郎切下唐何切四隤徒回切列星之宿思救切二十八宿之度也禮記月令宿離不成是也不省息井切省寤也不省言不寤也猶言不敏也累思魯水切累重也直龍切才單徳寒切單盡也馳思相吏切慮也捕影蒲故切索也掩日衣檢切覆也表間古閑切隆殺所介切薄地補各切廹也姜岌逆及切晉人也交趾音止郡名也去洛陽一萬一千里路迂雲俱切逺也潁川庾頃切郡名祖沖之持中切沖之宋南徐州從事史撰綴術五卷秣陵音末郡名信都芳並如字善算者也撰器準三卷虞􅒠苦郭切梁太史令日髙圗並如字日髙圗者求日髙之法也求日髙法先置表八尺如八萬里為袤以兩表相去二千里為廣廣袤相乘得一億六千萬里為黄甲之實以影差二寸為二千里為法除之得黄乙之袤八萬里即上與日齊此設圗之意也黄甲古狎切兩表相去名曰甲黄乙億栗切日底地上至日名曰乙青丙補永切上天名青丙青戊莫候切下地名青戊極者竭憶切切諸言極者斥天中極去周十萬三千里奄衣檢切覆也九隩於到切土可居也靡地母被切無也斥昌石切指也縁宿息救切二十八宿也蝕乘力切日月虧曰蝕稍小侵虧如蟲食草木之葉也適至施直切恰也發歛力冉切發往歛還也璇璣上音旋下音機逮音迨及也有竒居宜切數之餘也易曰歸奇于扐冬至夏至觀律之數聽鐘之音律吕戌切聽陀定切此謂冬夏二至合八能之士以觀律之數而聽鐘音之清濁也晉律厯志曰隂陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷影候鐘律權土灰效隂陽冬至陽氣應則灰除是故樂均清影長極黄鐘通土炭輕而衡仰夏至隂氣應則樂均濁影極蕤賔通土炭炭重而衡低進退於先後五日之中八能各以候狀聞太史令封上效則和否則占七衡圗何庚切七衡者七規者謂規為衡者取其衡運則生規規者正圎之謂也内一衡徑二十三萬八千里次二衡徑二十七萬七千六百六十六里二百歩次三衡徑三十一萬七千三百三十三里一百歩次四衡徑三十五萬七千里次五衡徑三十九萬六千六百六十六里二百歩次六衡徑四十三萬六千三百三十三里一百歩次七衡徑四十七萬六千里即其徑而三之則各得其周也凡日月運行之圎周七衡周而六間一衡之間萬九千八百三十三里一百歩以六衡乘之即夏至冬至相去十一萬九千里也青圗畫者胡卦切界也俗作畫合際上胡閣切下子例切常處昌據切所也躔呈延切次也卯酉上莫飽切下以久切皆辰名也卯正東也酉正西也牽牛上輕烟切下如字牽牛北方宿也冬至日在牽牛婁盧侯切婁西方宿也春分日在婁東井子郢切南方宿也夏至日在東井角記岳切東方宿也秋分日在角用繒慈陵切帛也吕氏兩舉切吕氏者吕氏春秋也吕不韋為秦相國集當世儒世使著所聞為十二紀八覽六論合十餘萬言備古今之事名為吕氏春秋四海呼改切吕氏春秋曰凡四海之内東西二萬八千里南北二萬六千里爾雅云九􅆥八狄七戎六蠻謂之四海言東西南北之數者將明車轍馬迹之所至河圗括地象亦云里數而有君長之州九阻中國之文徳及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形至於南極而數皆然河圗括地象括音聒河圗括地象緯書名也淮南子並如字漢淮南王安所著之書也大章音㤗人名六間古閑切兩衡相去之間也六間古閑切兩衡相去之間也粗通徂五切畧也放此甫兩切效也下同周髀}
