  - {type: variant, offset: 13731, length: 0, content: '', WYG: 四和戸戈切調也四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所㑹隂陽之所和然則百物阜安草木蕃庶故曰四和阜安房缶切盛也蕃庶符袁切茂也易處夷益切交也葢笠上居大切下音立覆槃上方六切下蒲官切離地力智切去也障蔽上之亮切隔也下必袂切奄也日兆月直紹切日者陽之精譬猶火光月者隂之精譬猶水光月含影故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡月稟日光而成形兆故云日兆月也魄匹陌切月之明消也康誥曰惟三月哉生魄孔安國曰三月始生魄月十六日明消而魄生揚子曰旣望則}
