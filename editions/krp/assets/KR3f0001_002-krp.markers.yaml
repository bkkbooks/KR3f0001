  - {type: variant, offset: 13732, length: 0, content: '', WYG: 魄于東亦此意也行列胡剛切極樞春朱切爾雅曰樞謂之棖郭璞云門戸扉樞也此言極樞者取其居中而臨制四方也繩繫古詣切結也表顛多年切頂也中折之列切屈也漏盧侯切漏以銅受水刻節盡夜百刻晷漏中星略例曰日行有南北晷漏有長短然二十四氣晷差遲疾不同勾股使然也直規中則差遲與勾股數齊則差極隨辰極髙下所遇不同如黄道刻漏此乃數之淺者近代且猶未曉今推黄道去極與晷影漏刻昏距中星四術而反覆相求消息同率旋相為中以合九股之變揆度上巨癸切下大各切釋施隻切散也朝生陟遙切旦也暮獲胡麥切穫胡郭切收也葶藶上音亭下音厯薺麥在禮切正鉤上音政下音鉤無令離呈切使也纖微思亷切細也督音篤察也分度徒固切數也經緯上堅丁切下于貴切南北為經東西為緯圎定正音政則復扶復切又也須女如字星名也逰儀如字逰儀所以望星也貞觀中李淳風造四逰儀元樞為軸以連結玉衡逰筩而貫約規矩又元樞北立北辰南距地軸㫄轉于内玉衡在元樞之間而南北逰仰以觀天之辰宿下以識器之晷度開元九年率府兵曹參軍梁令瓚以木為逰儀一行是之乃奏黄道逰儀古有其術而無其器昔人潜思未能得令令瓚所為日道月交皆自然契合于推歩尤要請旨更鑄以銅十年儀成車輻方六切所以實輪而凑轂者也以圎度為輻為轂古禄切所以受輻也以經緯之交為轂二十八宿息救切副置敷救切别也别置算也下同地協檄頰切合也相應於證切參正上倉含切下音政八節竝如字二至者寒暑之極二分者隂陽之和四立者生長收蔵之始是為八節二十四氣竝如字一嵗凡八節節三氣三而八之故為二十四氣氣損益九寸九分六分分之一竝如字損者減也破一分為六分然後減之益者加也加以小分滿六分得一從分冬至並如字至極也冬至夏至寒暑之極驚蟄直立切蔵也易曰龍蛇之蟄以存身也左氏傳曰啟蟄而郊春分府文切分之言中也春分為陽之中秋分為隂之中􅉭種上莫郎切下之用切處暑昌據切所也時舎音捨不用也虛誕音但謾也一槩古代切矛盾上莫浮切下食閏切矛所以句盾所以蔽器不同不相為用凡言矛盾者况其所趣異也後天竝如字月後天者月東行者也此見日月與天俱西南逰一日一夜天一周而月在昨夜之東故曰後天故舎式夜切舎謂二十八宿之舎也積後天資昔切以月後天分看小嵗積分則積後天分也大嵗徒盖切大嵗者十三月為一嵗經嵗堅丁切經常也經嵗者通十二月十九分之七小月並如字小月者二十九日為一月大月徒盖切大月者三十日為一月經月堅丁切經月者以十九乘周天分則經月之積合朔上曷閣切下色角切覆九敷救切盖也下同當音璫正南方音政三十六頃並如字攷靈曜曰分周天為三十六頃頃有十度九十六分之十四長日分于寅分二十四頃入於戌行十二頃短日分于辰行十二頃入于申行二十四頃此之謂也坎苦感切正北方之卦也巽蘇困切東南隅之卦也坤苦昆切西南隅之卦也離吕支切正南方之卦也艮古恨切東北隅之卦也乾渠焉切西北隅之卦也章止良切章條也十九嵗為一章言餘閏盡為厯法章條也蔀薄口切蔀之言齊同日月之分也而又衆殘齊合羣數畢滿故謂之蔀四章為一蔀凡七十六嵗也遂徐醉切遂者終也言五行之徳一終盡極日月長終也二十蔀為一遂凡千五言二十嵗首始九切首始也言日月五星終而復始也三遂為一首凡四千五首六十嵗也極如字終也言日月星辰弦望晦朔寒暑推移萬物生育終而復始故謂之極七首為一極凡三萬一千九百二十嵗也乾鑿度徒固切乾鑿度易緯書也周髀算經音義}
