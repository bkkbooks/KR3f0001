body:
  text: 周􅙼算經序積學齋徐乃昌臧書周􅙼算經二卷古葢天之學也以勾股之法度天地之高厚推日月之運行而得其度數其書出於商周之間自周公受之於商高周人志之謂之周􅙼其所從來遠矣隋書經籍志有周􅙼一卷趙嬰註周􅙼一卷甄鸞重述而唐之藝文志天文類有趙嬰註周􅙼一卷甄鸞註周􅙼一卷其曆算類仍有李淳風註周􅙼算經二卷本此一書耳至於本朝崇文緫目與夫中興館閣書目皆有周􅙼算經二卷云趙君卿述甄鸞重述李淳風等註釋趙君卿名爽君卿其字也如是則在唐以前則有趙嬰之註而本朝以來則是趙爽之本所記不同意者趙嬰趙爽止是一人豈其字文相類轉寫之誤耶然亦當以隋唐之書爲正可也又崇文緫目及李籍周􅙼音義皆云趙君卿不詳何代人今以序文考之有曰渾天有靈憲之文葢天有周􅙼之法靈憲乃張衡之所作實後漢安順之世而甄鸞之重述者乃是解釋君卿之所註出於宇文周之世以此推之則君卿者其亦魏晉之間人乎若夫乘勾股朱黃之實立倍差減并之術以盡開方之妙百世之下莫之可易則君卿者誠算學之宗師也嘉定六年癸酉十一月一日丁卯冬至承議郎權知汀州軍州兼管内勸農事主管坑冶括蒼鮑澣之仲祺謹書周􅙼算經序夫高而大者莫大於天厚而廣者莫廣於地體恢洪而廓落形修廣而幽清可以玄象課其進退然而宏逹不可指掌也可以晷儀驗其長短然其巨闊不可度量也雖窮神知化不能極其妙探賾索隱不能盡其微是以詭異之說出則兩端之理生遂有渾天葢天兼而並之故能彌綸天地之道有以見天地之賾則渾天有靈憲之文葢天有周􅙼之法累代存之官司是掌所以欽若昊天恭授民時爽以暗蔽才學淺昧鄰高山之仰止慕景行之軌轍負薪餘日聊觀周􅙼其㫖約而遠其言曲而中將恐廢替濡滯不通使談天者無所取則輙依經爲圖誠冀頽毁重仞之墻披露堂室之奥庻博物君子時逈思焉周􅙼題辭始讀周􅙼輙駭其艱怪及再一尋討不過乘方圓參兩以生勾股遂至于算數所不可及葢亦因天地自然之數耳故其書稱榮方學于陳子至畢思騖神卒無所用其智乃知謂天葢高固可坐而定者不誣也然周􅙼率以表影一寸度爲千里按李淳風所引宋元嘉十九年測影干交州夏至日影在表南三寸二分共得一尺八寸二分洛去交一萬一千里是不及六百里一寸也觀此則日徑千二百五十里去地八萬里之說又有不可盡據者故蔡邕謂周􅙼術數具存驗天多所違失又云周􅙼者即葢天之說也是以王任仲據葢天之說以駮渾儀爲桓君山所屈則周􅙼之術可睹矣又淳風别引宋書歷志二十四表影與今宋書相較則互有不同近刻宋書爲友人姚叔祥所校稱善本因舉此叚問之叔祥云于時政以不得周􅙼故貽足下今日之問耳併識于此以竢刋定繡水沈士龍題周􅙼以周人志之乃稱周􅙼而虞喜則謂天之體轉四方地體卑不動天周其上故云周其解周字又一義也然周􅙼之說奪于渾天如楊子雲八難卒無有能破之者惟梁武帝于長春殿講義别儗天體全同周􅙼以排渾天之論其後遂不復顯凡以世乏善算遂令眞秘湮屈余讀魏書有􅋖人成公興傭賃宼謙之家爲其開舍南辣田謙之坐樹下算興時來看後謙之算七曜有所不了惘然自失興曰先生何爲不懌謙之曰我學算累年而近算周􅙼不合以此自媿且非汝所知何勞問也興曰先生試隨興語布之俄然便决謙之歎伏不測請師事之興後入嵩山石室尸解乃知周􅙼非僊眞有道算難遽合彼桓鄭蔡陸者恐未易以聲附子雲也武原胡震亨題周􅙼題辭
