front:
  text: 更列月後天一十三度一
  hash: sha256:e6322acf575f92df3c8f9321b6974e662d5841fd16016b65d6b586f09c5695ca
body:
  text: 十九分度之七通分内子得二百五十四以乘本分得積後天分九千一百六十六萬二百一十八為實以一萬七千八百六十為法除之得積後天度五千一百三十二不盡二千六百九十八即命分還通内子得本積後天分九千一百六十六萬二百一十八為實以周天分六百五十二萬三千三百六十五為法除實得十四周天之數餘以日月分母萬七千八百六十除之得大嵗不及故舍一十八度不盡一萬一千六百二十八即以命分也經嵗月不及故舍百三十四度萬七千八百六十分度之萬一百五案五各本訛作里今改正經常也即一十二月一十九分月之七也術曰置經嵗三百六十五日九百四十分日之二百三十五經嵗者通一十二月一十九分月之七為二百三十五乗周天千四百六十一得三十四萬三千三百三十五則經嵗之積分又以周天分母四乗二百三十五得九百四十為法除之即得以月後天十三度十九分度之七乗之為實又以度分母乘日分母為法實如法得積後天四千八百八十二度萬七千八百六十分度之萬四千五百七十以月後天分乗經嵗積分得八千七百二十萬七千九十則積後天之分以周天除之除積後天分得一十三周天即去之其不足除者不足除者二百四十萬三千三百四十五是也此月不及故舍之分度數臣鸞曰求經歳月不及故舍法列一十二月一十九分月之七通分内子得二百三十五以乗周天分一千四百六十一得三十四萬三千三百三十五即經嵗分也以日分母四乗二百三十五得九百四十為法以除得經嵗三百六十五日不盡二百三十五即命分還通分内子即復本嵗分三十四萬三千三百三十五更列通月後天度分二百五十内以乗經嵗分得積後天分八千七百二十萬七千九十為實更列萬七千八百六十除實得積後天度四千八百八十二不盡萬四千五百七十即命分還通分内子復本積後天分為實以周天分六百五十二萬三千三百六十五除實得一十三周天即去之餘分二百四十萬案二百各本訛作三百今改正三千三百四十五以一萬七千八百六十除之得不及故舍一百三十四度不盡一萬一百五即以命分也小月不及故舍二十二度萬七千八百六十分度之七千七百三十五小月者二十九日為一月一月之日案各本脫日字今補二十九日則有餘三十日復不足而言大小者通其餘分術曰置小月二十九日小月者減經月之積分四百九十九餘二萬七千二百六十則小月之積也以九百四十除之即得以月後天十三度十九分度之七乗之為實又以度分母乗日分母為法實如法得積後天三百八十七度萬七千八百六十分度之萬二千二百二十以月後天乗小月積分得六百九十二萬四千四十則積後天之分也以周天分除之除積後天分得一周天即去之其不足除者不足除者四十萬六百七十五此月不及故舍之分度數臣鸞曰求小月不及故舍法置二十九日以九百四十乗之得二萬七千二百六十則小月之分也更列月後天一十三度一十九分度之七通分内子得二百五十四以乗小月分得六百九十二萬四千四十為實以一萬七千八百六十為法除實得三百八十七度不盡一萬二千二百二十以命分還通分子得本實更列周天分六百五十二萬三千三百六十五除本實得一周天不盡四十萬六百七十五即不及故舍之分又以萬七千八百六十案七千各本訛作九千今改正除不及故舍之分得二十二度不盡七千七百三十五即以命分大月不及故舍三十五度萬七千八百六十分度之萬四千三百三十五大月者三十日為一月也術曰置大月三十日大月加經積分四百四十一得二萬八千二百則大月之積分也以九百四十除之即得以月後天十三度十九分度之七乗之為實又以度分母乗日分母為法實如法得積後天四百一度萬七千八百六十分度之九百四十以月後天分乗大月積分七百一十六萬二千八百則積後天之分也以周天除之除積後天分得一周天即去之其不足除者不足除者六十三萬九千四百三十五是也此月不及故舍之分度數臣鸞曰求大月不及故舍法置三十日以九百四十乘之得二萬八千二百以後天分二百五十四乗之得七百一十六萬二千八百為實以一萬七千八百六十為法以除實得四百一度不盡九百四十即以命分還通分内子復本實更以周天六百五十二萬三千三百六十五為法除本實得一周餘不足除積六十三萬九千四百三十五分以一萬七千八百六十為法以除實得大月不及故三千一百之度不盡萬四千三百一十五即命分也經月不及故舍二十九度萬七千八百六十分度之九十四百八十一經常也常月者一月月與日合數術曰置經月二十九日九百四十分日之四百九十九經月者以一十九乗周天分一千四百六十一得二萬七千七百五十九則經月之積以九百四十除之即得以月後天十三度十九分度之七乘之為實又以度分母乗日分母為法實如法得積後天三百九十四度萬七千八百六十分度之萬三千九百四十六以月後天分乗經月積分得七百五萬七百八十六則積後天之分以周天除之除積後天分得一周天即去之其不足除者不足除者五十二萬七千四百二十一是也此月不及故舍之分度數臣鸞曰求經月不及故舍法以一十九乗周天分一千四百六十一得二萬七千七百五十九即經月積分以九百四十除積分得經月二十九曰九百四十分日之四百九十九還通分内子得本經月積分以後天分乘本積分得七百五萬七百八千六即後天之積分更以一萬七千八百六十除之得積後天三百九十四度不盡一萬三千九百四十六即以命分還通分内子得本後天積分為實以周天六百五十二萬三千三百六十五除之得一周餘分五十二萬七千四百二十一即不及故舍之分以一萬七千八百六十除之得經月不及故舍二十九度不盡九千四百八十一即以命分周髀算經卷下之二欽定四庫全書周髀算經卷下之三漢趙君卿注周甄鸞重述唐李淳風注釋冬至晝極短日出辰而入申如上日之分入何宿法分十二辰于地所圖之周舍相去三十度一十六分度之七子午居南北卯酉居東西日出入時立一遊儀以望中央表之晷遊儀之下即日出入陽照三不覆九陽日也覆猶徧也照三者南三辰已午未東西相當正南方日出入相當不覆正辰正南方夏至晝極長日出寅而入戌陽照九不覆三不覆三者北方三辰亥子丑冬至日出入之三辰屬晝晝夜互見是出入三辰分為晝夜各半明矣攷靈曜曰分周天為三十六頃案頃各本訛作頭下同據隋書天文志梁大同十年改周一百八刻依尚書攷靈曜晝夜三十六頃之數因而三之可證字當為頃所謂頃刻是也今並改正頃有一十度九十六分度之十四長日分于寅行二十四頃入于戌行一十二頃短日分于辰行一十二頃入子申行二十四頃之謂也東西相當正北方出入相當不覆三辰為北方日出左而入右南方行聖人南靣而治天下故以東為左西為右日冬至從南而北夏至從北而南故冬至從坎陽在子日出巽而入坤見日光少故曰寒冬至十一月斗建子位在北方故曰從坎坎亦北也陽氣所始起故曰在子巽東西坤西南坤見少晷陽照三不覆九也夏至從離隂在午日出艮而入乾見日光多故曰暑夏至五月斗建午位在南方故曰離離亦南也隂氣始生故曰在午艮東北乾西北日見多晷陽照九不覆三也日月失度而寒暑相姦考靈曜曰在璇璣玉衡以齊七政璇璣未中而星中是急急則日過其度不及其宿璇璣玉衡中而星未中是舒舒則日不及其度夜月過其宿璇璣中而星中是周周則風雨時風雨時則草木蕃庶而百穀熟故書曰急常寒若舒常燠若急舒不調是失度寒暑不時即相姦往者詘來者信也故詘信相感從夏至南往日益短故曰詘從冬至北來日益長故曰信言來往相推詘信相感更衰代盛此天之常道易曰日往則月來月往則日來月相推推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者詘也來者信也詘信相感而利生焉此之謂也故冬至後後日右行夏至之後日左行左者往右者來冬至日出從辰來北故曰右行夏至日出從寅往南故曰左行故月與日合為一月從合至合則為一月日復日為一日從旦至旦則為一日也日復星為一嵗冬至日出在牽牛從牽牛周牽牛則為一嵗也外衡冬至日在牽牛内衡夏至日在東井六氣復返皆謂中氣中氣月中也言日月往來中氣各六傳曰先王之正時履端於始舉正於中歸餘於終謂中氣也隂陽之數日月之法謂隂陽之度數日月之法十九為為一章章條也言閏餘盡為法章條也乾象曰辰為嵗中以御朔之月而納焉朔為章中除朔為章月月差為閏臣鸞曰嵗中除章中為章嵗求餘法置中氣相去三十日十六分日之七通分内子得四百八十七又置從朔至朔一月之日二十九九百四十分日之四百九十九通之得二萬七千七百五十九二者法異當同之者以中氣分母得六乘朔分得四十四萬四千一百四十四變為中氣積分也以朔分母九百四十乘中氣分得四十五萬七千七百八十為朔日積分以少減多求等數平之得一千九百四十八為法除中氣積得二百二十八即章中也更以一千九百四十八除朔積分得二百三十五即章月也章月與章中差七即一章之閏更置二百二十八以嵗中一十二除之得一十九為章嵗也更置章月二百三十五以章嵗一十九除之得一十五月一十九分月之七即一年之月也四章為一蔀七十六嵗為蔀之言齊同日月之分為一蔀也一嵗之月十二月一十九分月之七通分内子得二百三十五一嵗之日三百六十五日四分日之一通之得一千四百六十一分母不同則子不齊當互乘之以齊同之者以日分母四乘月分得九百四十即一蔀之月以月分母一十九乘日分得二萬七千七百五十九即一蔀之日以日月分母相乘得七十六得一蔀之嵗以一嵗之月除蔀月得七十六嵗又以一嵗之日除蔀日亦得七十六嵗矣案嵗字各本訛在矣字下今改正月餘既終日分又盡衆殘齊合羣數畢滿故謂之蔀臣鸞曰求蔀法列章嵗一十九以四乘之得一蔀七十六嵗求一蔀之月法一十二月一十九分月之七通分内子得二百三十五即月分也更列一嵗三百六十五日四分日之一通分内子得一千四百六十一以日分母四乘月分得九百四十即一蔀之月以月分母一十九乘日分得二萬七千七百五十九即一蔀之日以日分母四乘月分母一十九得七十六即一蔀之嵗更以月分母一十九乘蔀月九百四十得一萬七千八百六十為寔以十二月一十九分月之七通分内子得二百三十五為法以除實得七十六亦以蔀之嵗也更列一蔀之日二萬七千七百五十九以分母四乘之得一十一萬一千三十六為寔以周天分千四百六十一除之得一蔀之嵗七十六也二十蔀為一遂遂千五百二十嵗遂者竟也言五行之得一終竟極日月辰終也乾鑿度曰至徳之數先立金木水火土五凡各三百四嵗五徳運行日月開闢甲子為蔀首七十六嵗次得癸夘蔀十六嵗次壬午蔀七十六嵗次辛酉蔀七十六嵗凡三百四嵗木徳也主春生次庚子蔀七十六嵗次己夘蔀七十六嵗次戊午蔀七十六嵗次丁酉蔀七十六嵗凡三百四嵗金徳也主秋成次丙子蔀七十六嵗次乙夘蔀七十六嵗次甲午蔀七十六嵗次癸酉蔀七十六嵗凡三百四嵗火徳也主夏長次壬子蔀七十六嵗次辛卯蔀七十六嵗次庚午蔀七十六嵗次己酉蔀七十六嵗凡三百四嵗水徳也主冬藏次戊子蔀七十六嵗次丁夘蔀七十六嵗次丙午蔀七十六嵗次乙酉蔀七十六嵗凡三百四嵗土徳也主致飬其得四正少字午夘酉而朝四時焉凡一千五百二十嵗終一紀復甲子故謂之遂也求五徳日名之法置一蔀者七十六嵗得四蔀因而四之為三百四嵗以一嵗三百六十五日四分日之一乘之為一十一萬一千三十六以六十去之餘三十六命甲子算外得庚子金徳也求次徳加三十六去之命如前則次徳日也求算部名置一章嵗數以周天分乘之得二萬七千七百五十九以六十六之餘三十九命以甲子算外得癸夘蔀求蔀加三十九滿六十去之命如前得次蔀臣鸞曰求遂法列一蔀七十六嵗以二十乘之得一千五百二十嵗即以遂之嵗求五徳金木水火土法列一蔀七十六嵗以周天分千四百六十一乘之得一十一萬一千三十六即以六十除之餘三十六命從甲子算外得庚子凡三百四嵗主秋成金徳也加三十六得七十二以六十除之餘一十二命從甲子算外得丙子凡四百四嵗火徳主夏長次放此求蔀名列一章一十九嵗以周天分一千四百六十一嵗乘之得二萬七千七百五十九以六十去之餘三十九命從甲子算外得癸夘蔀七十六嵗復加三十九亦六十去之餘一十八命亦起甲子算外次得壬午蔀次放此至甲子即止之三遂為一首首四千五百六十嵗首始也言日月五集終而復始也考靈曜曰日月首甲子冬至日月五星俱起牽牛初日月若合璧五星如聯珠青龍甲寅攝提格並四千五百六十嵗積及初故謂首也臣鸞曰求一首法列遂一千五百二十嵗三之得一首四千五百六十嵗也七首為一極極三萬一千九百二十嵗生數皆終萬物得始極終也言日月星辰弦望晦朔寒暑推移萬物生育皆復始故謂之極臣鸞曰求極法先列一首四千五百六十以七乘之得一極三萬一千九百二十嵗也天以更元作紀厯元始作為七紀法天數更始復為法述之何以知天三百六十五度四分度之一而日行一度案日各本訛作已今改正而月後天十三度十九分度之七二十九日九百四十分日之四百九十九為一月十二月十九分月之七為一嵗非周髀本文盖人問師之辭其欲知度之所分法術之所生耳周天除之除積後天分得一周即棄之其不足除者如合朔古者包犧神農制作為厯度元之始見三光未如其則三光日月星則法也日月列星未有分度列星之初案列各本訛作則今改正列謂二十八宿也日主晝月主夜晝夜為一日日月俱起建星建六星在斗上也日月起建星謂十一月朔旦冬至日也為厯術者度者牽牛前五度則建星其近也月度疾日度遲度日月所行之度也日月相逐於二十九日三十日間而日行天二十九度餘如九百四十分日之四百九十九未有定分未知餘分定㡬何也於是三百六十五日南極影長明日反短以嵗終日影反長知之三百六十五日者三三百六十六日者一影四嵗而後知差一日是為四嵗共一日故嵗得四分日之一故知一嵗三百六十五日四分日之一嵗終也月積後天十三周又與百三十四度餘經嵗月後天之周及度求之餘者未知也言欲求之也無慮後天十三度十九分度之七未有定無慮者粗計也此己得月後天數而言未有者求之意未有見故也於是日行天七十六周月行天千一十六周及合於建星月行一月則行過一周而與日合七十六嵗九百四十周天所過復九百四十日七十六周并之得一千一十六為一月後天率分盡度終復還及初也臣鸞曰求於是日行天七十六周月行天干一十六周案月各本訛作日今改正及合於建星法以九百四十周并七十六周得一千一十六周則日月氣朔合於建星置月行後天之數以日後天之數除之得十三度十九分度之七則月一日行天之度以日度行率除月行率一日得月度㡬何置月行率一千一十六為寔日行率七十六為法寔如法而一法及餘分皆四約之與乾象同歸而殊塗義等而法異也復置七十六嵗之積月置章嵗之月二百三十五以四乘之得九百四十則蔀之積月也以七十六嵗除之得十二月十九分月之七則一嵗之月亦以四約法除分蔀嵗除月與章嵗除章月同也置周天度數以十二月十九分月之七除之得二十九日九百四十分日之四百九十九則一月日之數通周天分分日之一為千四百六十一通十二月十九分月之七為二百三十五分母不同則子不齊當互乘以同齊之以十九乘千四百六十一為二萬七千七百五十九以四乘二百三十五為九百四十及以除之則月與日合之數臣鸞曰求日行一度法還置前一千一十六以七十六嵗除之得十三度不盡二十八以求等平於四以四約餘得七十分得一十九是一十三度一十九分度之七更列一章嵗積月二百三十五以周天分母四乘之即一蔀月九百四十亦以七十六嵗除之得一嵗之一十二月一十九分月之七餘分及法並以四約更通周天得千四百六十一復通一十二月一十九分月之七得二百三十五分母不同互乘之以月分母一十九乘日分得二萬七千七百五十九以日分母四乘月分得九百四十除寔二萬七千七百五十九得二十九日九百四十分日之四百九十九而月與日合此其數也周髀算經巻下之三欽定四庫全書周髀算經音義唐李籍撰周髀序周髀歩米切周髀算經者以九數句股重差算日月周天行度逺近之數皆得於股表卽推歩盖天之法也髀者股也以表為股周天厯度本包犧氏立法其傳自周公受之於大夫商髙周人志之故曰周髀趙君卿撰雛免切述也君卿趙爽字也不詳何代人恢苦囘切大也廓落上枯郭切下厯各切晷儀居洧切日影也度量上達各切下錄章切探賾上吐南切卞士革切賾者含蓄含蓄者探之可及故易曰探賾索隱上色白切下於謹切隠者隠匿隠匿者索之可得故曰索隠詭異古委切莊子曰恢詭譎異渾天胡昆切渾天者言天地之體狀如鳥卯天包地外猶殻之褁黄也周旋無端其形渾渾然故曰渾天史官候臺所用銅儀則其法也立八尺圎體具天地之形以正黄道占察發歛以行日月以歩五緯精㣲深妙百代不易之道也官有其器而無其書盖天居大切益之之説即周髀是也其言天似盖笠地似覆槃天地各中髙外下北極之下為天地之中其地最髙而滂沱四潰三光隠映以為晝夜天中髙於外衡冬至日之所在六萬里北極下地髙于外衡下地亦六萬里外衡髙於北極下地二萬里天地隆髙相從日去地常八萬里日麗天而平轉分夏冬之間日前行道為七衡六間每衡周徑里數各依算術用句股重差推晷影極㳺以為逺近之數皆得于表股者也故曰周髀又周髀家云天圎如張盖地方如棊局天㫄轉如推磨而左行日月右行随天左轉故日月實東行而天牽之以西没譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不随磨以左迴焉天形南髙而北下日出髙故見日入下故不見天下之形如倚盖故極在人北是其證也極在天中而今在人北所以知天之形如倚盖也靈憲許建切靈憲張衡所述其説故曰渾天重仞上直龍切下音刃八尺曰仞奥於到切迥户頂切逺也周髀卷上甄鸞上之人切下厯官切甄鸞北周司𨽻校尉重述上直龍切下時律切趙爽既加注釋甄鸞又從而發明故曰重述善數色具切數算也包犧上蒲交切下虛宜切厯度徒箇切而度大各切量也勾股圎方圗勾古侯切股公土切圗徑一而周三方徑一而帀四伸圎之周而為勾展方之帀而為股共結一角而邪適五乃圎方邪徑相通之率也勾股圎方圖盖以此設學者觀之思過半矣弦胡田切共結一角也率朔律切數相與也又音律竒耦上居宜切下烏口切矩俱雨切折之列切更相上古衡切下息羊切共盤上渠用切下蒲官切昏墊都念切下也書曰下民昏墊并畀政切勾股之差楚佳切不齊也勾股之差其數差一謂勾三股四也量均力仗切為袤莫候切長也偃矩覆矩偃於憲切仰也覆敷目切俯也矩表也仰表所以望髙俯表所以測表方屬地殊玉切下同滂沱上普郎切下唐何切四隤徒回切列星之宿思救切二十八宿之度也禮記月令宿離不成是也不省息井切省寤也不省言不寤也猶言不敏也累思魯水切累重也直龍切才單徳寒切單盡也馳思相吏切慮也捕影蒲故切索也掩日衣檢切覆也表間古閑切隆殺所介切薄地補各切廹也姜岌逆及切晉人也交趾音止郡名也去洛陽一萬一千里路迂雲俱切逺也潁川庾頃切郡名祖沖之持中切沖之宋南徐州從事史撰綴術五卷秣陵音末郡名信都芳並如字善算者也撰器準三卷虞􅒠苦郭切梁太史令日髙圗並如字日髙圗者求日髙之法也求日髙法先置表八尺如八萬里為袤以兩表相去二千里為廣廣袤相乘得一億六千萬里為黄甲之實以影差二寸為二千里為法除之得黄乙之袤八萬里即上與日齊此設圗之意也黄甲古狎切兩表相去名曰甲黄乙億栗切日底地上至日名曰乙青丙補永切上天名青丙青戊莫候切下地名青戊極者竭憶切切諸言極者斥天中極去周十萬三千里奄衣檢切覆也九隩於到切土可居也靡地母被切無也斥昌石切指也縁宿息救切二十八宿也蝕乘力切日月虧曰蝕稍小侵虧如蟲食草木之葉也適至施直切恰也發歛力冉切發往歛還也璇璣上音旋下音機逮音迨及也有竒居宜切數之餘也易曰歸奇于扐冬至夏至觀律之數聽鐘之音律吕戌切聽陀定切此謂冬夏二至合八能之士以觀律之數而聽鐘音之清濁也晉律厯志曰隂陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷影候鐘律權土灰效隂陽冬至陽氣應則灰除是故樂均清影長極黄鐘通土炭輕而衡仰夏至隂氣應則樂均濁影極蕤賔通土炭炭重而衡低進退於先後五日之中八能各以候狀聞太史令封上效則和否則占七衡圗何庚切七衡者七規者謂規為衡者取其衡運則生規規者正圎之謂也内一衡徑二十三萬八千里次二衡徑二十七萬七千六百六十六里二百歩次三衡徑三十一萬七千三百三十三里一百歩次四衡徑三十五萬七千里次五衡徑三十九萬六千六百六十六里二百歩次六衡徑四十三萬六千三百三十三里一百歩次七衡徑四十七萬六千里即其徑而三之則各得其周也凡日月運行之圎周七衡周而六間一衡之間萬九千八百三十三里一百歩以六衡乘之即夏至冬至相去十一萬九千里也青圗畫者胡卦切界也俗作畫合際上胡閣切下子例切常處昌據切所也躔呈延切次也卯酉上莫飽切下以久切皆辰名也卯正東也酉正西也牽牛上輕烟切下如字牽牛北方宿也冬至日在牽牛婁盧侯切婁西方宿也春分日在婁東井子郢切南方宿也夏至日在東井角記岳切東方宿也秋分日在角用繒慈陵切帛也吕氏兩舉切吕氏者吕氏春秋也吕不韋為秦相國集當世儒世使著所聞為十二紀八覽六論合十餘萬言備古今之事名為吕氏春秋四海呼改切吕氏春秋曰凡四海之内東西二萬八千里南北二萬六千里爾雅云九􅆥八狄七戎六蠻謂之四海言東西南北之數者將明車轍馬迹之所至河圗括地象亦云里數而有君長之州九阻中國之文徳及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形至於南極而數皆然河圗括地象括音聒河圗括地象緯書名也淮南子並如字漢淮南王安所著之書也大章音㤗人名六間古閑切兩衡相去之間也六間古閑切兩衡相去之間也粗通徂五切畧也放此甫兩切效也下同周髀卷下四和戸戈切調也四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所㑹隂陽之所和然則百物阜安草木蕃庶故曰四和阜安房缶切盛也蕃庶符袁切茂也易處夷益切交也葢笠上居大切下音立覆槃上方六切下蒲官切離地力智切去也障蔽上之亮切隔也下必袂切奄也日兆月直紹切日者陽之精譬猶火光月者隂之精譬猶水光月含影故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡月稟日光而成形兆故云日兆月也魄匹陌切月之明消也康誥曰惟三月哉生魄孔安國曰三月始生魄月十六日明消而魄生揚子曰旣望則終魄于東亦此意也行列胡剛切極樞春朱切爾雅曰樞謂之棖郭璞云門戸扉樞也此言極樞者取其居中而臨制四方也繩繫古詣切結也表顛多年切頂也中折之列切屈也漏盧侯切漏以銅受水刻節盡夜百刻晷漏中星略例曰日行有南北晷漏有長短然二十四氣晷差遲疾不同勾股使然也直規中則差遲與勾股數齊則差極隨辰極髙下所遇不同如黄道刻漏此乃數之淺者近代且猶未曉今推黄道去極與晷影漏刻昏距中星四術而反覆相求消息同率旋相為中以合九股之變揆度上巨癸切下大各切釋施隻切散也朝生陟遙切旦也暮獲胡麥切穫胡郭切收也葶藶上音亭下音厯薺麥在禮切正鉤上音政下音鉤無令離呈切使也纖微思亷切細也督音篤察也分度徒固切數也經緯上堅丁切下于貴切南北為經東西為緯圎定正音政則復扶復切又也須女如字星名也逰儀如字逰儀所以望星也貞觀中李淳風造四逰儀元樞為軸以連結玉衡逰筩而貫約規矩又元樞北立北辰南距地軸㫄轉于内玉衡在元樞之間而南北逰仰以觀天之辰宿下以識器之晷度開元九年率府兵曹參軍梁令瓚以木為逰儀一行是之乃奏黄道逰儀古有其術而無其器昔人潜思未能得令令瓚所為日道月交皆自然契合于推歩尤要請旨更鑄以銅十年儀成車輻方六切所以實輪而凑轂者也以圎度為輻為轂古禄切所以受輻也以經緯之交為轂二十八宿息救切副置敷救切别也别置算也下同地協檄頰切合也相應於證切參正上倉含切下音政八節竝如字二至者寒暑之極二分者隂陽之和四立者生長收蔵之始是為八節二十四氣竝如字一嵗凡八節節三氣三而八之故為二十四氣氣損益九寸九分六分分之一竝如字損者減也破一分為六分然後減之益者加也加以小分滿六分得一從分冬至並如字至極也冬至夏至寒暑之極驚蟄直立切蔵也易曰龍蛇之蟄以存身也左氏傳曰啟蟄而郊春分府文切分之言中也春分為陽之中秋分為隂之中􅉭種上莫郎切下之用切處暑昌據切所也時舎音捨不用也虛誕音但謾也一槩古代切矛盾上莫浮切下食閏切矛所以句盾所以蔽器不同不相為用凡言矛盾者况其所趣異也後天竝如字月後天者月東行者也此見日月與天俱西南逰一日一夜天一周而月在昨夜之東故曰後天故舎式夜切舎謂二十八宿之舎也積後天資昔切以月後天分看小嵗積分則積後天分也大嵗徒盖切大嵗者十三月為一嵗經嵗堅丁切經常也經嵗者通十二月十九分之七小月並如字小月者二十九日為一月大月徒盖切大月者三十日為一月經月堅丁切經月者以十九乘周天分則經月之積合朔上曷閣切下色角切覆九敷救切盖也下同當音璫正南方音政三十六頃並如字攷靈曜曰分周天為三十六頃頃有十度九十六分之十四長日分于寅分二十四頃入於戌行十二頃短日分于辰行十二頃入于申行二十四頃此之謂也坎苦感切正北方之卦也巽蘇困切東南隅之卦也坤苦昆切西南隅之卦也離吕支切正南方之卦也艮古恨切東北隅之卦也乾渠焉切西北隅之卦也章止良切章條也十九嵗為一章言餘閏盡為厯法章條也蔀薄口切蔀之言齊同日月之分也而又衆殘齊合羣數畢滿故謂之蔀四章為一蔀凡七十六嵗也遂徐醉切遂者終也言五行之徳一終盡極日月長終也二十蔀為一遂凡千五言二十嵗首始九切首始也言日月五星終而復始也三遂為一首凡四千五首六十嵗也極如字終也言日月星辰弦望晦朔寒暑推移萬物生育終而復始故謂之極七首為一極凡三萬一千九百二十嵗也乾鑿度徒固切乾鑿度易緯書也周髀算經音義
