body:
  text: 周髀算經卷上昔者周公問於商高曰竊聞乎大夫善數也請問古者包犧立周天曆度夫天不可階而升地不可將尺寸而度請問數安從出商高曰數之法出於圓方圓出於方方出於矩矩出於九九八十一故折矩以為勾廣三股修四徑隅五既方之外半其一矩環而共盤得成三四五兩矩共長二十有五是謂積矩故禹之所以治天下者此數之所生也周公曰大哉言數請問用矩之道商高曰平矩以正繩偃矩以望高覆矩以測深臥矩以知遠環矩以為圓合矩以為方方屬地圓屬天天圓地方方數為典以方出圓笠以寫天天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位是故知地者智知天者聖智出於勾勾出於矩夫矩之於數其裁制萬物唯所為耳周公曰善哉昔者榮方問於陳子曰今者竊聞夫子之道知日之高大光之所照一日所行遠近之數人所望見四極之窮列星之宿天地之廣袤夫子之道皆能知之其信有之乎陳子曰然榮方曰方雖不省願夫子幸而說之今若方者可教此道邪陳子曰然此皆算術之所及子之於算足以知此矣若誠累思之於是榮方歸而思之數日不能得復見陳子曰方思之不能得敢請問之陳子曰思之未熟此亦望遠起高之術而子不能得則子之於數未能通類是智有所不及而神有所窮夫道術言約而用博者智類之明問一類而以萬事達者謂之知道今子所學算數之術是用智矣而尚有所難是子之智類單夫道術所以難通者既學矣患其不博既博矣患其不習既習矣患其不能知故同術相學同事相觀此列士之愚智賢不肖之所分是故能類以合類此賢者業精習智之質也夫學同業而不能入神者此不肖無智而業不能精習是故算不能精習吾豈以道隱子哉固復熟思之榮方復歸思之數日不能得復見陳子曰方思之以精熟矣智有所不及而神有所窮知不能得願終請說之陳子曰復坐吾語汝於是榮方復坐而請陳子說之曰夏至南萬六千里冬至南十三萬五千里日中立竿無影此一者天道之數周髀長八尺夏至之日晷一尺六寸髀者股也正晷者勾也正南千里勾一尺五寸正北千里勾一尺七寸日益南晷益長候勾六尺即取竹空徑一寸長八尺捕影而視之空正掩日而日應空由此觀之率八十寸而得徑一寸故以勾為首以髀為股從髀至日下六萬里而髀無影從此以上至日則八萬里若求邪至日者以日下為勾日高為股勾股各自乘并而開方除之得邪至日從髀所衺至日所十萬里以率率之八十里得徑一里十萬里得徑千二百五十里故曰日徑千二百五十里法曰周髀長八尺勾之損益寸千里故曰極者天廣袤也今立表高八尺以望極其勾一丈三寸由此觀之則從周北十萬三千里而至極下榮方曰周髀者何陳子曰古時天子治周此數望之從周故曰周髀髀者表也日夏至南萬六千里日冬至南十三萬五千里日中無影以此觀之從極南至夏至之日中十一萬九千里北至其夜半亦然凡徑二十三萬八千里此夏至日道之徑也其周七十一萬四千里從夏至之日中至冬至之日中十一萬九千里北至極下亦然則從極南至冬至之日中二十三萬八千里從極北至其夜半亦然凡徑四十七萬六千里此冬至日道徑也其周百四十二萬八千里從春秋分之日中北至極下十七萬八千五百里從極下北至其夜半亦然凡徑三十五萬七千里周一百七萬一千里故曰月之道常緣宿日道亦與宿正南至夏至之日中北至冬至之夜半南至冬至之日中北至夏至之夜半亦徑三十五萬七千里周一百七萬一千里春分之日夜分以至秋分之日夜分極下常有日光秋分之日夜分以至春分之日夜分極下常無日光故春秋分之日夜分之時日所照適至極陰陽之分等也冬至夏至者日道發歛之所至晝夜長短之所極春秋分者陰陽之修晝夜之象晝者陽夜者陰春分以至秋分晝之象秋分以至春分夜之象故春秋分之日中光之所照北至極下夜半日光之所照亦南至極此日夜分之時也故曰日照四旁各十六萬七千里人望所見遠近宜如日光所照從周所望見北過極六萬四千里南過冬至之日中三萬二千里夏至之日中光南過冬至之日中四萬八千里南過人所望見一萬六千里北過周十五萬一千里北過極四萬八千里冬至之夜半日光南不至人目所見七千里不至極下七萬一千里夏至之日中與夜半日光九萬六千里過極相接冬至之日中與夜半日光不相及十四萬二千里不至極下七萬一千里夏至之日正東西望直周東西日下至周五萬九千五百九十八里半冬至之日正東西方不見日以算求之日下至周二十一萬四千五百五十七里半凡此數者日道之發歛冬至夏至觀律之數聽鐘之音冬至晝夏至夜差數所及日光所遝觀之四極徑八十一萬里周二百四十三萬里從周南至日照處三十萬二千里周北至日照處五十萬八千里東西各三十九萬一千六百八十三里半周在天中南十萬三千里故東西短中徑二萬六千六百三十二里有奇周北五十萬八千里冬至日十三萬五千里冬至日道徑四十七萬六千里周一百四十二萬八千里日光四極當周東西各三十九萬一千六百八十三里有奇此方圓之法萬物周事而圓方用焉大匠造制而規矩設焉或毀方而為圓或破圓而為方方中為圓者謂之圓方圓中為方者謂之方圓也凡為此圖以丈為尺以尺為寸以寸為分分一千里凡用繒方八尺一寸今用繒方四尺五分分為二千里呂氏曰凡四海之內東西二萬八千里南北二萬六千里凡為日月運行之圓周七衡周而六間以當六月節六月為百八十二日八分日之五故日夏至在東井極內衡日冬至在牽牛極外衡也衡復更終冬至故曰一歲三百六十五日四分日之一一歲一內極一外極三十日十六分日之七月一外極一內極是故一衡之間萬九千八百三十三里三分里之一即為百步欲知次衡徑倍而增內衡之徑二之以增內衡徑得三衡徑次衡放此內一衡徑二十三萬八千里周七十一萬四千里分為三百六十五度四分度之一度得一千九百五十四里二百四十七步千四百六十一分步之九百三十三次二衡徑二十七萬七千六百六十六里二百步周八十三萬三千里分里為度度得二千二百八十里百八十八步千四百六十一分步之千三百三十二次三衡徑三十一萬七千三百三十三里一百步周九十五萬二千里分為度度得二千六百六里百三十步千四百六十一分步之二百七十次四衡徑三十五萬七千里周一百七萬一千里分為度度得二千九百三十二里七十一步千四百一十分步之六百六十九次五衡徑三十九萬六千六百六十六里二百步周一百一十九萬里分為度度得三千二百五十八里十二步千四百六十一分步之千六十八次六衡徑四十三萬六千三百三十三里一百步周一百三十萬九千里分為度度得三千五百八十三里二百五十四步千四百六十一分步之六次七衡徑四十七萬六千里周一百四十二萬八千里分為度得三千九百九里一百九十五步千四百六十一分步之四百五其次日冬至所照過北衡十六萬七千里為徑八十一萬里周二百四十三萬里分為三百六十五度四分度之一度得六千六百五十二里二百九十三步千四百六十一分步之三百二十七過此而往者未之或知或知者或疑其可知或疑其難知此言上聖不學而知之故冬至日晷丈三尺五寸夏至日晷尺六寸冬至日晷長夏至日晷短日晷損益寸差千里故冬至夏至之日南北遊十一萬九千里四極徑八十一萬里周二百四十三萬里分為度度得六千六百五十二里二百九十三步千四百六十一分步之三百二十七此度之相去也其南北游日六百五十一里一百八十二步一千四百六十一分步之七百九十八術曰置十一萬九千里為實以半歲一百八十二日八分日之五為法而通之得九十五萬二千為實所得一千四百六十一為法除之實如法得一里不滿法者三之如法得百步不滿法者十之如法得十步不滿法者十之如法得一步不滿法者以法命之
