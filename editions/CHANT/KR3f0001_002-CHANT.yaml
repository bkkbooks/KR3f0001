body:
  text: 周髀算經卷下凡日月運行四極之道極下者其地高人所居六萬里滂沱四隤而下天之中央亦高四旁六萬里故日光外所照徑八十一萬里周二百四十三萬里故日運行處極北北方日中南方夜半日在極東東方日中西方夜半日在極南南方日中北方夜半日在極西西方日中東方夜半凡此四方者天地四極四和晝夜易處加時相反然其陰陽所終冬至所極皆若一也天象蓋笠地法覆槃天離地八萬里冬至之日雖在外衡常出極下地上二萬里故日兆月月光乃出故成明月星辰乃得行列是故秋分以往到冬至三光之精微以其道遠此天地陰陽之性自然也欲知北極樞璿璣四極常以夏至夜半時北極南游所極冬至夜半時北游所極冬至日加酉之時西游所極日加卯之時東游所極此北極璿璣四游正北極璿璣之中正北天之中正極之所游冬至日加酉之時立八尺表以繩繫表顛希望北極中大星引繩致地而識之又到旦明日加卯之時復引繩希望之首及繩致地而識其端相去二尺三寸故東西極二萬三千里其兩端相去正東西中折之以指表正南北加此時者皆以漏揆度之此東西南北之時其繩致地所識去表丈三寸故天之中去周十萬三千里何以知其南北極之時也以冬至夜半北游所極北過天中萬一千五百里以夏至南游所極不及天中萬一千五百里此皆以繩繫表顛而希望之北極至地所識丈一尺四寸半故去周十二萬四千五百里過天中萬一千五百里其南極至地所識九尺一寸半故去周九萬一千五百里不及天中萬一千五百里此璿璣四極南北過不及之法東西南北之正勾周去極十萬三千里日去人十六萬七千里夏至去周一萬六千里夏至日道徑二十三萬八千里周七十一萬四千里春秋分日道徑三十五萬七千里周一百七萬一千里冬至日道徑四十七萬六千里周一百四十二萬八千里日光四極八十一萬里周二百四十三萬里從周南三十萬二千里璿璣徑二萬三千里周六萬九千里此陽絕陰彰故不生萬物其術曰立正勾定之以日始出立表而識其晷日入復識其晷晷之兩端相直者正東西也中折之指表者正南北也極下不生萬物何以知之冬至之日去夏至十一萬九千里萬物盡死夏至之日去北極十一萬九千里是以知極下不生萬物北極左右夏有不釋之冰春分秋分日在中衡春分以往日益北五萬九千五百里而夏至秋分以往日益南五萬九千五百里而冬至中衡去周七萬五千五百里中衡左右冬有不死之草夏長之類此陽彰陰微故萬物不死五穀一歲再熟凡北極之左右物有朝生暮獲冬生之類立二十八宿以周天曆度之法術曰倍正南方以正勾定之即平地徑二十一步周六十三步令其平矩以水正則位徑一百二十一尺七寸五分因而三之為三百六十五尺四分尺之一以應周天三百六十五度四分度之一審定分之無令有纖微分度以定則正督經緯而四分之一合各九十一度十六分度之五於是圓定而正則立表正南北之中央以繩繫顛希望牽牛中央星之中則復望須女之星先至者如復以表繩希望須女先至定中即以一游儀希望牽牛中央星出中正表西幾何度各如游儀所至之尺為度數游在於八尺之上故知牽牛八度其次星放此以盡二十八宿度則定矣立周度者各以其所先至游儀度上車輻引繩就中央之正以為轂則正矣日所出入亦以周定之欲知日之出入即以三百六十五度四分度之一而各置二十八宿以東井夜半中牽牛之初臨子之中東井出中正表西三十度十六分度之七而臨未之中牽牛初亦當臨丑之中於是天與地恊乃以置周二十八宿置以定乃復置周度之中央立正表以冬至夏至之日以望日始出也立一游儀於度上以望中央表之晷晷參正則日所出之宿度日入放此牽牛去北極百一十五度千六百九十五里二十一步千四百六十一分步之八百一十九術曰置外衡去北極樞二十三萬八千里除璿璣萬一千五百里其不除者二十二萬六千五百里以為實以內衡一度數千九百五十四里二百四十七步千四百六十一分步之九百三十三以為法實如法得一度不滿法求里步約之合三百得一以為實以千四百六十一分為法得一里不滿法者三之如法得百步不滿法者又上十之如法得一步不滿法者以法命之次放此婁與角去北極九十一度六百一十里二百六十四步千四百六十一分步之千二百九十六術曰置中衡去北極樞十七萬八千五百里以為實以內衡一度數為法實如法得一度不滿法者求里步不滿法者以法命之東井去北極六十六度千四百八十一里一百五十五步千四百六十一分步之千二百四十五術曰置內衡去北極樞十一萬九千里加璿璣萬一千五百里得十三萬五百里以為實以內衡一度數為法實如法得一度不滿法者求里步不滿法者以法命之凡八節二十四氣氣損益九寸九分六分分之一冬至晷長一丈三尺五寸夏至晷長一尺六寸問次節損益寸數長短各幾何冬至晷長一丈三尺五寸小寒丈二尺五寸大寒丈一尺五寸一分立春丈五寸二分雨水九尺五寸三分啟蟄八尺五寸四分春分七尺五寸五分清明六尺五寸五分穀雨五尺五寸六分立夏四尺五寸七分小滿三尺五寸八分芒種二尺五寸九分夏至一尺六寸小暑二尺五寸九分大暑二尺五寸八分立秋四尺五寸七分處暑五尺五寸六分白露六尺五寸五分秋分七尺五寸五分寒露八尺五寸四分霜降九尺五寸三分立冬丈五寸二分小雪丈一尺五寸一分大雪丈二尺五寸凡為八節二十四氣氣損益九寸九分六分分之一冬至夏至為損益之始術曰置冬至晷以夏至晷減之餘為實以十二為法實如法得一寸不滿法者十之以法除之得一分不滿法者以法命之月後天十三度十九分度之七術曰置章月二百三十五以章歲十九除之加日行一度得十三度十九分度之七此月一日行之數即後天之度及分小歲月不及故舍三百五十四度萬七千八百六十分度之六千六百一十二術曰置小歲三百五十四日九百四十分日之三百四十八以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天四千七百三十七度萬七千八百六十分度之六千六百一十三以周天三百六十五度萬七千八百六十分度之四千四百六十五除之其不足除者三百五十四度萬七千八百六十分度之六千六百一十二此月不及故舍之分度數他皆放此大歲月不及故舍十八度萬七千八百六十分度之萬一千六百二十八術曰置大歲三百八十三日九百四十分日之八百四十七以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天五千一百三十二度萬七千八百六十分度之二千六百九十八以周天除之其不足除者此月不及故舍之分度數經歲月不及故舍百三十四度萬七千八百六十分度之萬一百里術曰置經歲三百六十五日九百四十分日之二百三十五以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天四千八百八十二度萬七千八百六十分度之萬四千五百七十以周天除之其不足除者此月不及故舍之分度數小月不及故舍二十二度萬七千八百六十分度之七千七百三十五術曰置小月二十九日以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天三百八十七度萬七千八百六十分度之萬二千二百二十以周天分除之其不足除者此月不及故舍之分度數大月不及故舍三十五度萬七千八百六十分度之萬四千三百三十五術曰置大月三十日以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天四百一度萬七千八百六十分度之九百四十以周天除之其不足除者此月不及故舍之分度數經月不及故舍二十九度萬七千八百六十分度之九千四百八十一術曰置經月二十九日九百四十分日之四百九十九以月後天十三度十九分度之七乘之為實又以度分母乘日分母為法實如法得積後天三百九十四度萬七千八百六十分度之萬三千九百四十六以周天除之其不足除者此月不及故舍之分度數冬至晝極短日出辰而入申陽照三不覆九東西相當正南方夏至晝極長日出寅而入戌陽照九不覆三東西相當正北方日出左而入右南北行故冬至從坎陽在子日出巽而入坤見日光少故曰寒夏至從離陰在午日出艮而入乾見日光多故曰暑日月失度而寒暑相姦往者詘來者信也故屈信相感故冬至之後日右行夏至之後日左行左者往右者來故月與日合為一月日復日為一日日復星為一歲外衡冬至內衡夏至六氣復返皆謂中氣陰陽之數日月之法十九歲為一章四章為一蔀七十六歲二十蔀為一遂遂千五百二十歲三遂為一首首四千五百六十歲七首為一極極三萬一千九百二十歲生數皆終萬物復始天以更元作紀曆何以知天三百六十五度四分度之一而日行一度而月後天十三度十九分度之七二十九日九百四十分日之四百九十九為一月十二月十九分月之七為一歲周天除之其不足除者如合朔古者包犧神農制作為曆度元之始見三光未知其則日月列星未有分度日主晝月主夜晝夜為一日日月俱起建星月度疾日度遲日月相逐於二十九日三十日間而日行天二十九度餘未有定分於是三百六十五日南極影長明日反短以歲終日影長故知三百六十五日者三三百六十六日者一故知一歲三百六十五日四分日之一歲終也月積後天十三周又與百三十四度餘無慮後天十三度十九分度之七未有定於是日行天七十六周月行天千一十六周又合於建星置月行後天之數以日後天之數除之得一十三度十九分度之七則月一日行天之度復置七十六歲之積月以七十六歲除之得十二月十九分月之七則一歲之月置周天度數以十二月十九分月之七除之得二十九日九百四十分日之四百九十九則一月日之數
