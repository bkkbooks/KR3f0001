body:
  text: 周髀算經卷上昔者周公問於商高曰竊聞乎大夫善數也周公姓姬名旦武王之弟商高周時賢大夫善算者也周公位居冡宰德則至聖尚卑唐寅曰此趙注也巳以自牧下學而上逹況其凡乎請問古者包犧立周天曆度包犧三皇之一始畫八卦以商高善數能通乎微妙逹乎無方無大不綜無幽不顯聞包犧立周天曆度建章蔀之法易曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地此之謂也夫天不可階而升地不可得尺寸而度邈乎懸廣無階可升蕩乎遐遠無度可量請問數從安出心昧其機請問其目商高曰數之法出於圓方圓徑一而周三方徑一而匝四伸圓之周而為句展方之匝而為股共結一角邪適弦五此圓方邪徑相通之率故曰數之法出於圓方圓方者天地之形陰陽之數然則周公之所問天地也是以商高陳圓方之形以見其象因奇耦之數以制其法所謂言約旨遠微妙幽通矣圓出於方方出於矩圓規之數理之以方方周匝也方正之物出之以矩矩廣長也矩出於九九八十一推圓方之率通廣長之數當須乘除以計之九九者乘除之原也故折矩故者申事之辭也將為句股之率故曰折矩也以為句廣三應圓之周橫者謂之廣句亦廣廣短也股修四應方之匝從者謂之修股亦修修長也徑隅五自然相應之率徑直隅角也亦謂之弦既方其外半之一矩句股之法先知二數然後推一見句股然後求弦先各自乘成其實實成勢化爾乃變通故曰既方其外或並句股之實以求弦弦實之中乃求句股之分並實不正等更相取與互有所得故曰半其一矩其術句股各自乘三三如九四四一十六並為弦自乘之實二十五減句於弦為股之實一十六減股於弦為句之實九環而共盤得成三四五盤讀如盤桓之盤言取其並減之積環屈而共盤之開方除之得其一面故曰得成三四五也兩矩共長二十有五是謂積矩兩矩者句股各自乘之實共長者並實之數將以施於萬事而此先陳其率也故禹之所以治天下者此數之所生也禹治洪水決流江河望山川之形定高下之勢除滔天之災釋昏墊之厄使東注於海而無浸逆乃句股之所由生也句股圓方圖句股各自乘並之為弦實開方除之即弦案弦圖又可以句股相乘為朱實二倍之為朱實四以句股之差自相乘為中黃實加差實一亦成弦實以差實減弦實半其餘以差為從法開方除之復得句矣加差於句即股凡並句股之實即成弦實或方於內或矩於外形詭而量均體殊而數齊句實之矩以股弦差為廣股弦並為袤而股實方其裏減矩句之實於弦實開其餘即股倍股在兩邊為從法開矩句之角即股弦差加股為弦以差除句實得股弦並以並除句實亦得股弦差令並自乘與句實為實倍並為法所得亦弦句實減並自乘如法為股股實之矩以句弦差為廣句弦並為袤而句實方其裏減矩股之實於弦實開其餘即句倍句在兩邉為從法開矩股之角即句弦差加句為弦以差除股實得句弦並以並除股實亦得句弦差令並自乘與股實為實倍并為法所得亦弦股實減並自乘如法為句兩差相乘倍而開之所得以股弦差增之為句以句弦差增之為股兩差增之為弦倍弦實列句股差實見並實者以圖考之倍弦實滿外大方而多黃實黃實之多即句股差實以差實減之開其餘得外大方大方之面即句股並也令並自乘倍弦實乃減之開其餘得中黃方黃方之面即句股差以差減並而半之為句加差於並而半之為股其倍弦為廣袤合令句股見者自乘為其實四實以減之開其餘所得為差以差減合半其餘為廣減廣於弦即所求也觀其迭相規矩共為返覆互與通分各有所得然則統敘羣倫宏紀衆宏理貫幽入微鉤深致逺故曰其裁制萬物唯所為之也臣鸞釋日按君卿注云句股各自乘並之為弦實開方除之即弦臣鸞日假令句三自乘得九股四自乘得十六並之得二十五開方除之得五為弦也注云按弦圖又可以句股相乘為朱實二倍之為朱實四以句股之差自相乘為中黃實臣鸞曰以句弦差二倍之為四自乘得十六為左圖中黃實也臣淳風等謹按注云以句股之差自乘為中黃實鸞云倍句弦差自乘者苟求異端雖合其數於率不通注云加差實一亦成弦實臣鸞日加差實一並外矩青八并外矩青八得九並中黃十六得二十五亦成弦實也臣淳風等謹按注云加差實一亦成弦實鸞云加差實並外矩及中黃者雖合其數於率不通注云以差實減弦實半其餘以差為從法開方除之復得句矣臣鸞曰以差實九減弦實二十五餘十六半之得八以差一加之得九開之得句三也臣淳風等謹按注宜云以差實一減弦實二十五餘二十四半之為十二以差一為從開方除之得句三鸞云以差實九減弦實者雖合其數於率不通注云加差於句即股臣鸞曰加差一於句三得股四也注云凡並句股之實即成弦實臣鸞曰句實九股實十六並之得二十五也注云或方內或矩於外形詭而量均體殊而數齊句實之矩以股弦差為廣股弦並為袤臣鸞曰以股弦差一為廣股四並弦五得九為袤左圖外青也注云而股實方其裏臣鸞曰為左圖中黃十六注云減矩句之實於弦實開其餘即股臣鸞曰減矩句之實九於弦實二十五餘一十六開之得四股也注云倍股在兩邊為從法開矩句之角即股弦差臣鸞曰倍股四得八在圖兩邊以為從法開矩句之角九得一也注云加股為弦臣鸞曰加差一於股四則弦五也注云以差除勾實得股弦並臣鸞曰以差一除句實九得九即股四弦五並為九也注云以並除句實亦得股弦差臣鸞曰以九除句實九得股弦差一注云令並自乘與句實為實臣鸞曰令並股弦得九自乘為八十一又與句實九加之得九十為實注云倍並為法臣鸞曰倍股弦並九得十八為法注云所得亦弦臣鸞曰除之得五為弦注云句實減並自乘如法為股臣鸞曰以句實九減並自乘八十一餘七十二以法十八除之得四為股也注云股實之矩以句弦差為廣句弦並為袤臣鸞曰股實之矩以句弦差二為廣句弦並八為袤注云而句實方其裏減矩股之實於弦實開其餘即句臣鸞曰句實有九方在右圖裏以減矩股之實十六於弦實二十五餘九開之得三勾也注云陪句在兩邉臣鸞曰各三也注云為從法開矩股之角即句弦差加句為弦臣鸞曰加差二於句三則弦五也注云以差除股實得句弦並臣鸞曰以差二除股實十六得八句三弦五並為八也注云以並除股實亦得句弦差臣鸞曰以並除股實十六得句弦差二注云令並自乘與股實為實臣鸞曰合並八自乘得六十四與股實十六加之得八十為實注云倍並為法臣鸞曰倍句弦並八得十六為法注云所得亦弦臣鸞曰除之得弦五也注云股實減並自乘如法為句臣鸞曰以股實十六減並自乘六十四餘四十八以法十六除之得三為句也注云兩差相乘倍而開之所得以股弦差增之為句臣鸞曰以股弦差一乘句弦差二得二倍之為四開之得二以股弦差一增之得三句也注云以句弦差增之為股臣鸞曰以句弦差二增之得四股也注云兩差增之為弦臣鸞曰以股弦差一句弦差二增之得五弦也注云倍弦實列句股差實見並實者以圖考之倍弦實滿外大方而多黃實黃實之多即句股差實臣鸞曰倍弦實二十五得五十滿外大方七七四十九而多黃實黃實之多即句股差實也注云以差實減之開其餘得外大方大方之面即句股並臣鸞曰以差實一減五十餘四十九開之即大方之面七也亦是句股並也注云令並自乘倍弦實乃減之開其餘得中黃方黃方之面即句股差臣鸞曰並七自乘得四十九倍弦實二十五得五十以減之餘即中黃方差實一也故開之即句股差一也注云以差減並而半之為句臣鸞曰以差一減並七餘六半之得三句也注云加差於並而半之為股臣鸞曰加差一於並七得八而半之得四股也注云其倍弦為廣袤合臣鸞曰倍弦二十五為五十為廣袤合臣淳風等謹按列廣袤術宜云倍弦五得十為廣袤合今鸞云倍弦二十五者錯也注云令句股見者自乘為其實四實以減之開其餘所得為差臣鸞曰令自乘者以七七自乘得四十九四實者大方句股之中有四方一方之中有方十二四實有四十八減上四十九餘一也開之得一即句股差一臣淳風等謹按注意令自乘者十自乘得一百四實者大方廣袤之中有四方若據句實而言一方之中有實九四實有三十六減上一百餘六十四開之得八即廣袤差此是股弦差減股弦並餘數若據股實而言之一方之中有實十六四實有六十四減上一百餘三十六開之得六即廣袤差此是句弦差減句弦並餘數也鸞云令自乘者以七七自乘得四十九四實者大方句股之中有四方一方之中有方十二四實有四十八減上四十九餘一也開之得一即句股差一者錯也注云以差減合半其餘為廣臣鸞曰以差一減合七餘六半之得三廣也臣淳風等謹按注意以差八六各減合十餘二四半之得一二一即股弦差二即句弦差以差減弦即各袤廣也鸞云以差一減合七餘六半之得三廣者錯也注云減廣於弦即所求也臣鸞曰以廣三減弦五即所求差二也臣淳風等謹按注意以廣一二各減弦五即所求股四句三也鸞云以廣三減弦五即所求差二者錯也周公曰大哉言數唐寅曰此經文也心逹數術之意故發大哉之數唐寅曰此趙注也請問用矩之道謂用表之宜測望之法商高日平矩以正繩以正繩以水繩之正定平懸之體將欲愼毫釐之差防千里之失偃矩以望高覆矩以測深臥矩以知遠言施用無方曲從其事術在九章環矩以為圓合矩以為方既以追尋情理又可造製圓方言矩之於物無所不至方屬地圓屬天天圓地方物有圓方數有奇耦天動為圓其數奇地靜為方其數耦此配陰陽之義非實天地之體也天不可窮而見地不可盡而觀豈能定其圓方乎又曰北極之下高人所居六萬里滂沱四隤而下天之中央亦高四旁六萬里是為形狀同歸而不殊途隆高齊軌而易以陳故曰天似蓋笠地法覆槃方數為典以方出圓夫體方則度影正形圓則審實難蓋方者有常而圓者多變故當制法而理之理之法者半周半徑相乘則得方矣又可周徑相乘四而一又可徑自乘三之四而一又可周自乘十二而一故日圓出於方典實也笠以寫天笠亦如蓋其形正圓戴之所以象天寫猶象也言笠之體象天之形詩云何簑何笠此之義也天青黑地黃赤天數之為笠也青黑為表丹黃為裏以象天地之位既象其形又法其位言相方類不亦似乎是故知地者智知天者聖言天之高大地之廣遠自非聖智其孰能與於此乎智出於句句亦影也察句之損益加物之高遠故曰智出於句句出於矩矩謂之表表不移亦為句為句將正故曰句出於矩焉夫矩之於數其裁制萬物唯所為耳言包含幾微轉通旋還也周公曰善哉善哉言明曉之意所謂問一事而萬事逹昔者榮方問於陳子榮方陳子是周公之後人非周髀之本文然此二人共相解釋後之學者謂為章句因從其類列於事下又欲尊而遠之故云昔者時世官號未之前聞曰今者竊聞夫子之道榮方聞陳子能述商高之旨明周公之道知日之高大日去地與圓徑之術光之所照日旁照之所及也一日所行日行天之度也遠近之數冬至夏至去人之遠近也人所望見人目之所極也四極之窮日光之所遠也列星之宿二十八宿之度也天地之廣袤袤長也東西南北謂之廣長夫子之道皆能知之其信有之乎而明察之故不昧不疑陳子曰然言可知也榮方曰方雖不省願夫子幸而説之欲以不省之情而觀大雅之法今若方者可教此道邪不能自料訪之賢者陳子曰然言可教也此皆算術之所及言周髀之法出於算術之妙也子之於算足以知此矣若誠纍思之纍重也言若誠能重纍思之則逹至微之理於是榮方歸而思之數日不能得雖濳心馳思而才單智竭復見陳子曰方思之不能得敢請問之陳子曰思之未熟熟猶善也此亦望遠起高之術而子不能得則子之於數未能通類定高遠者立兩表望懸邈者施纍矩言未能通類求句股之意是智有所不及而神所窮言不能通類是情智有所不及而神思有所窮滯夫道術言約而用博者智類之明夫道術聖人之所以極深而研幾唯深也故能通天下之志唯幾也故能成天下之務是以其言約其旨遠故曰智類之明也問一類而以萬事逹者謂之知道引而伸之觸類而長之天下之能事畢矣故謂之知道也今子所學欲知天地之數算數之術是用智矣而尚有所難是子之智類單算術所包尚以為難是子智類單盡夫道術所以難通者既學矣患其不博不能廣博既博矣患其不習不能究習既習矣患其不能知不能知類故同術相學術教同者則當學通類之意同事相觀事類同者觀其旨趣之類此列士之愚智列猶别也言觀其術鑒其學則愚智者别矣賢不肖之所分賢者逹於事物之理不肖者暗於照察之情至於役神馳思聰明殊别矣是故能類以合類此賢者業精習知之質也學其倫類觀其指歸唯賢智精習者能之也夫學同業而不能入神者此不肖無智而業不能精習俱學道術明智不察不能以類合類而長之此心遊目蕩義不入神也是故算不能精習吾豈以道隱子哉固復熟思之凡教之道不憤不啓不悱不發憤之悱之然後啓發既不精思又不學習故言吾無隱也爾固復熟思之舉一隅使反之以三也榮方復歸思之數日不能得復見陳子曰方思之以精熟矣智有所不及而神有所窮知不能得願終請説之自知不敏避席而請説之陳子曰復坐吾語汝於是榮方復坐而請陳子説之曰夏至南萬六千里冬至南十三萬五千里日中立竿無影臣鸞曰南戴日下立八尺表表影千里而差一寸是則天上一寸地下千里今夏至影有一尺六寸故知其萬六千里冬至影一丈三尺五寸則知其十三萬五千里此一者天道之數言天道數一悉以如此周髀長八尺夏至之日晷一尺六寸晷影也此數望之從周而周官測景尺有五寸蓋出周城南千里也記云神州之土方五千里雖差一寸不出畿地之分先四知之實故建王國髀者股也正晷者句也以影為句句股定然後可以度日之高遠正晷者日中之時節也正南千里句一尺五寸正北千里句一尺七寸候其影使表相去二千里影差二寸將求日之高遠故先見其表影之率日益南晷益長候句六尺候其影使長六尺者欲令句股相應句三股四弦五句六股八弦十即取竹空徑一寸長八尺捕影而神之空正掩日以徑寸之空神日之影髀長則大矩短則小正滿八尺也捕猶索也掩猶覆也而日應空掩若重規更言八尺者舉其定也又曰近則大遠則小以影六尺為正由此觀之率八十寸而得徑一寸以此為日髀之率故以句為首以髀為股首猶始也股猶末也句能制物之率股能制句之正欲以為總見之數立精理之本明可以周萬事智可以達無方所謂智出於句句出於矩也從髀至日下六萬里而髀為影從此以上至日則八萬里臣鸞日求從髀至日下六萬里者先置南表晷六尺上十之為六十寸以兩表相去二千里乘得十二萬里為實以影差二寸為法除之得日底地去表六萬里求從髀至日八萬里者先置表高八尺上十之為八十寸以兩表相去二千里乘之得十六萬為實以影差二寸為法除之得從表端上至日八萬里也若求邪至日者以日下為句日高為股句股各自乘並而開方除之得邪至日從髀所表至日所十萬里表此古邪字求其數之術曰以表南至日下六萬里為句以日高八萬里為股為之求弦句股各自乘並而開方除之即邪至日之所也臣鸞曰求從髀邪至日所法先置南至日底六萬里為句重張自乘得三十六億為句實更置日高八萬里為股重張自乘得六十四億為股實並句股實得一百億為弦實開方除之得從王城至日十萬里今有十萬里問徑幾何曰一千二百五十里八十寸而得徑一寸以一寸乘十萬里為實八十寸為法即得以率率之八十里得徑一里十萬里得徑千二百五十里法當以空徑為句率竹長為股率日去人為大股大股之句即日徑也其術以句率乘大股股率而一此以八十里為法十萬里為實實如法而一即得日徑故曰日徑千二百五十里臣鸞曰求以率八十里得徑一里十萬里得徑千二百五十里法先置竹孔徑一寸為千里作大句更置邪去曰十萬里為股以句千里乘股十萬里得一億為實更置日去地八萬里為法除實得日徑千二百五十里故云日徑也臣淳風等謹按夏至王城望日立兩表相去二千里表高八尺影去前表一尺五寸去後表一尺七寸舊術以前後影差二寸為法以前影寸數乘表間為實實如法得萬五千里為日下去南表里又以表高八十寸乘表間為實實如法得八萬里為表上去日里仍以表寸為日高影寸為日下待日漸高候日影六尺用之為句以表為股為之求弦得十萬里為邪表數目取管圓孔徑一寸長八尺望日滿筒以為率長八十寸為一邪去日十萬里日徑即千二百五十里以理推之法云天之處心高於外衡六萬里者此乃語與術違句六尺股八尺弦十尺角隅正方自然之數蓋依繩水之定施之於表矩然則天無别體用日以為高下術既隨乎而遷高下從何而出語術相違是為大失又按二表下地依水平法定其高下若北表地高則以為句以間為弦置其高數其影乘之其表除之所得益股為定間若北表下者亦置所下以法乘除所得以減股為定間又以高下之數與間相約為地高遠之率求遠者影乘定間差法而一所得加影日之遠也求高者表乘定間差法而一所得加表日之高也求邪去地者弦乘定間差法而一所得加弦日邪去地此三等至皆以日為正求日下地高下者置戴日之遠近地高下率乘之如間率而一所得為日下地高下形勢隆殺與表間同可依此率若形勢不等非代所知率日徑求日大小者徑率乘間如法而一得日徑此徑當即得不待影長六尺凡度日者先須定二矩水平者影南北立句齊高四尺相去二丈以二弦候牽於句上並率二則擬為候影句上立表弦下望日前一則上畔後一則下畔引則就影令與表日參直二至前後三四日間影不移處即是當以候表並望人取一影亦可日徑影端表頭為則然地有高下表望不同後六術乃窮其實第一後高前下術高為句表間為弦後復影為所求率表為所有率以句為所有數所得益股為定間第二後下術以其所下為句表間為弦置其所下以影乘表除所得減股餘為定間第三邪下術依其北高之率高其句影令與地勢隆殺相似餘同平法假令髀邪下而南其邪亦同不須别望但弦短與句股不得相應其南里數亦隨地勢不得校乎平則促若用此術但得南望若北望者既用句影南下之術當北高之地第四邪上術依其後下之率下其句影此謂回望北極以為高遠者望去取差亦同南望此術弦長亦與句股不得相應唯得北望不得南望若南望者即用句影北高之術第五平術不論高下周髀度日用此平術故東西南北四望皆通近遠一差不須别術第六術者是外衡其徑云四十七萬六千里半之得二十三萬八千里者是外衡去天心之處心高於外衡六萬里為率南行二十三萬八千里下校六萬里約之得南行一百一十九里下校三十里一百一十九步差下三十步則三十九步太半步差下十步以此為準則不合有平地地既不平而用術尤乖理驗且自古論晷影差變每有不同今略其梗概取其推步之要尚書考靈曜云日永影尺五寸日短一十三尺日正南千里而減一寸張衡靈憲云懸天之晷薄地之儀皆移千里而差一寸鄭玄注周禮云凡日影於地千里而差一寸王蕃薑岌因此為説按前諸説差數並同其言更出書非真有此以事考量恐非實矣謹案宋元嘉十九年歲在壬午遣使往交州度日影夏至之日影在表南三寸二分太康地理志交趾去洛陽一萬一千里陽城去洛陽一百八十里交趾西南望陽城洛陽在其東北較而言之今陽城去交趾近於洛陽去交趾一百八十里則交趾去陽城一萬八百二十里而影差尺有八寸二分是六百里而影差一寸也况復人路迂回羊腸曲折方於鳥道所較彌多以事驗之又未盈五百里而差一寸眀矣千里之言固非實也何承天又云詔以土圭測影考校二至差三日有餘從來積歲及交州所上檢其增減亦相符合此則影差之驗也周禮大司徒職曰夏至之影尺有五寸馬融以為洛陽鄭玄以為陽城尚書考靈曜日永影一尺五寸鄭玄以為陽城日短十三尺易緯通卦驗夏至影尺有四寸八分冬至一丈三尺劉向洪範傳夏至影一尺五寸八分是時漢都長安而向不言測影處所若在長安則非晷影之正也夏至影長一尺五寸八分冬至一丈三尺一寸四分向又云春秋分長七尺三寸六分此即總是虛妄後漢曆志夏至影一尺五寸後漢洛陽冬至一丈三尺自梁天監巳前並同此數魏景初夏至影一尺五寸魏初都許昌與潁川相近後都洛陽又在地中之數但易緯因漢曆舊影似不别影之冬至一丈三尺晉薑岌影一尺五寸宋都建康在江表驗影之數遙取陽城冬至一丈三尺宋大明祖沖之曆夏至影一尺五寸宋都秣陵遙取影同前冬至一丈三尺後魏信都芳注周髀四術云按永平元年戊子是梁天監之七年也見洛陽測影又見公孫崇集諸朝士共觀祕書影同是夏至之日以八尺之表測日中影皆長一尺五寸八分雖無六寸近六寸梁武帝大同十年太史令虞鄺以九尺表於江左建康測夏至日中影長一尺三寸二分以八尺表測之影長一尺一寸七分強冬至一丈三尺七分八尺表影長一丈一尺六寸二分弱隋開皇元年冬至影長一丈二尺七寸二分開皇二年夏至影一尺四寸八分冬至長安測夏至洛陽測及王邵隋靈感志冬至一丈二尺七寸二分長安測也開皇四年夏至一尺四寸八分洛陽測也冬至一丈二尺八寸八分洛陽測也大唐貞觀二年己丑五月二十三日癸亥夏至中影一尺四寸六分長安測也十一月二十九日丙寅冬至中影一丈二尺六寸三分長安測也按漢魏及隋所記夏至中影或長或短齊其盈縮之中則夏至之影尺有五寸為近定實矣以周官推之洛陽為所交會則冬至一丈二尺五寸亦為近矣按梁武帝都金陵去洛陽南北大較千里以尺表令其有九尺影則大同十年江左八尺表夏至中影長一尺一寸七分若是為夏至八尺表千里而差三寸強矣此推驗即是夏至影差升降不同南北遠近數亦有異若以一等永定恐皆乖理之實日高圖黃甲與黃乙其實正等以表高乘兩表相去為黃甲之實以影差為黃乙之廣而一所得則變得黃乙之袤上與日齊按圖當加表高今言八萬里者從表以上復加之青丙與青已其實亦等黃甲與青丙相連黃乙與青已相連其實亦等臣鸞曰求日高法先置表高八尺為八萬里為袤以兩表相去二千里為廣乘袤八萬里得一億六千萬里為黃甲之實以影差二寸為二千里為法除之得黃乙之袤八萬里即上與日齊此言王城去天名曰甲日底地上至日名曰乙上天名青丙下地名青戊據影六尺王城上天南至日六萬里王城南至日底地亦六萬里是上下等數日夏至南萬六千里者立表八尺於王城影一尺六寸影寸千里故王城去夏至日底地萬六千里也法曰周髀長八尺句之損益寸千里句謂影也言懸天之影薄地之儀皆千里而差一寸故曰極者天廣袤也言極之遠近有定則天廣長可知今立表高八尺以望極其句一丈三寸由此觀之則從周北十萬三千里而至極下謂冬至日加卯酉之時若春秋分之夜半極南兩旁與天中齊故以為周去天中之數榮方曰周髀者何陳子曰古時天子治周古時天子謂周成王時以治周居王城故曰昔先王之經邑奄觀九隩靡地不營土圭測影不縮不盈當風雨之所交然後可以建王城此之謂也此數望之從周故曰周髀言周都河南為四方之中故以為望主也髀者表也因其行事故曰髀由此捕望故曰表影為句故曰句股也日夏至南萬六千里日冬至南十三萬五千里日中無影以此觀之從極南至夏至之日中十一萬九千里諸言極者斥天之中極去周十萬三千里亦謂極與天中齊時更加南萬六千里是也北至其夜半亦然日極在極北正等也凡徑二十三萬八千里並南北之數也此夏至日道之徑也其徑者圓中之直者也其周七十一萬四千里周匝也謂夫戴日行其數以三乘徑臣鸞曰求夏至日道徑法列夏至日去天中心十一萬九千里夏至夜半日亦去天中心十一萬九千里並之得夏至日道徑二十三萬八千里三乘徑得周七十一萬四千里也從夏至之日中至冬至之日中十一萬九千里冬至日中去周十三萬五千里除夏至日中去周一萬六千里是也北至極下亦然則從極南至冬至之日中二十三萬八千里從極北至其夜半亦然凡徑四十七萬六千里此冬至日道徑也其周百四十二萬八千里從春秋分之日中北至極下十七萬八千五百里春秋之日影七尺五寸五分加望極之句一丈三寸臣鸞曰求冬至日道徑法列夏至去冬至日中十一萬九千里從夏至日道北徑亦十一萬九千里併之得冬至日中北極下二十三萬八千里從極至夜半亦二十三萬八千里並之得冬至日道徑四十七萬六千里以三乘徑即冬至日道周一百四十二萬八千里從極下北至其夜半亦然凡徑三十五萬七千里周一百七萬一千里故日月之道常緣宿日道亦與宿正內衡之南外衡之北圓而成規以為黃道二十八宿列焉月之行也一出一入或表或裏五月二十三分月之二十而一道一交謂之合朔交會及月蝕相去之數故曰緣宿也日行黃道以宿為正故曰宿正於中衡之數與黃道等臣鸞曰求春秋分日道法列春秋分日中北至極下十七萬八千五百里從北極北至其夜半亦然並之得春秋分日道徑三十五萬七千里以三乘徑即日道周一百七萬一千里求黃道徑法列從北極南至夏至日中一十一萬九千里以從極北至冬至夜半二十三萬八千里並之得黃道三十五萬七千里從極南至冬至日中北至夏至夜半亦黃道徑也以三乘徑周得一百七萬一千里也南至夏至之日中北至冬至之夜半南至冬至之日中北至夏至之夜半亦徑三十五萬七千里周一百七萬一千里此皆黃道之數與中衡等春分之日夜分以至秋分之日夜分極下常有日光春秋分者晝夜等春分至秋分日內近極故日光照及也秋分之日夜分以至春分之日夜分極下常無日光秋分至春分日外遠極故日光照不及也故春秋分之日夜分之時日光所照適至極陰陽之分等也冬至夏至者日道發斂之所至晝夜長短之所極發猶往也斂猶還也極終也春秋分者陰陽之修晝夜之象修長也言陰陽長短之等晝者陽夜者陰以明暗之差為陰陽之象春分以至秋分晝之象北極下見日光也日永主物生故象晝也秋分以至春分夜之象北極下不見日光也日短主物死故象夜也故春秋分之日中光之所照北至極下夜半日光之所照亦南至極此日夜分之時也故曰日照四旁各十六萬七千里至極者謂璇璣之際為陽絶陰障以日夜分之時而日光有所不逮故知日旁照十六萬七千里不及天中一萬一千五百里也人所望見遠近宜如日光所照日近我一十六萬七千里之內及我我目見日故為日出日遠我十六萬七千里之外日則不見我我亦不見日故為日入是為日與目見於十六萬七千里之中故曰遠近宜如日光之所照也從周所望見北過極六萬四千里自此已下諸言過者皆置日光之所照若人目之所見十六萬七千里以除之此除極至周十萬三千里臣鸞曰求從周所望見北過極六萬四千里法列人目所極十六萬七千里以王城周去極十萬三千里減之餘六萬四千里即人望過極之數也南過冬至之日中三萬二千里除冬至日中去周十三萬五千里臣鸞曰求冬至日中三萬二千里法列人目所極十六萬七千里以冬至日中去王城十三萬五千里減之餘即過冬至日中三萬二千里也夏至之日中光南過冬至之日中四萬八千里除冬至之日中相去十一萬九千里臣鸞曰求夏至日中光南過冬至日中四萬八千里法列日高照十六萬七千里以冬夏至日中相去一十一萬九千里減之餘即南過冬至之日中四萬八千里南過人所望見萬六千里夏至日中去周一萬六千里臣鸞曰求夏至日中光南過人所望見萬六千里法列王城去夏至日中光南過人所望見萬六千里加日光所及十六萬七千里得十八萬三千里以人目所極十六萬七千里減之餘即南過人目所望見一萬六千里也北過周十五萬一千里除周夏至之日中一萬六千里臣鸞曰求夏至日中光北過周十五萬一千里法列日光所及十六萬七千里以王城去夏至日中一萬六千里減之餘即北過周十五萬一千里北過極四萬八千里除極去夏至之日十一萬九千里臣鸞曰求夏至日中光北過極四萬八千里法列日光所及十六萬七千里以北極去夏至夜半十一萬九千里減之餘即北過極四萬八千里也冬至之夜半日光南不至人目所見七千里倍日光所照里數以減冬至日道徑四十七萬六千里又除冬至日中去周十三萬五千里臣鸞曰求冬至夜半日光南不至人目所見七千里法列日光十六萬七千里倍之得三十三萬四千里以減冬至日道徑四十七萬六千里餘十四萬二千里復以冬至日中去周十三萬五千里減之餘即不至人目所見七千里不至極下七萬一千里從極至夜半除所照十六萬七千里臣鸞曰求冬至日光不至極下七萬一千里法列冬至夜半去極二十三萬八千里以日光一十六萬七千里減之餘即不至極下七萬一千里夏至之日中與夜半日光九萬六千里過極相接倍日光所照以夏至日道徑減之餘即相接之數臣鸞曰求夏至日中日光與夜半相接九萬六千里法列倍日光所照十六萬七千里得徑三十三萬四千里以夏至日道徑二十三萬八千里減之餘即日光相接九萬六千里也冬至之日中與夜半日光不相及十四萬二千里不至極下七萬一千里倍日光所照以減冬至日道徑餘即不相及之數半之即各不至極下臣鸞曰求冬至日中與夜半日不及十四萬二千里不至極下七萬一千里法列冬至日道徑四十七萬六千里以倍日光所照三十三萬四千里減之餘即日光不相及十四萬二千里半之即不至極下七萬一千里也夏至之日正東西望直周東西日下至周五萬九千五百九十八里半求之術以夏至日道徑二十三萬八千里為弦倍極去周十萬三千里得二十萬六千里為股為之求句以股自乘減弦自乘其餘開方除之得句一十一萬九千一百九十七里有奇半之各得東西數臣鸞曰求夏至日正東西去周法列夏至日道徑二十三萬八千里為弦自相乘得五百六十六億四千四百萬為弦實更置極去周十萬三千里倍之為二十萬六千里為股重張自相乘得四百二十四億三千六百萬為股實以減弦實餘一百四十二億八百萬即句實以開方除之得正東西一十一萬九千一百九十七里二十三萬八千三百九十五分里之七萬五千一百九十一半之即周東西各五萬九千五百九十八里半經曰奇者分也若求分者倍分母得四十七萬六千七百九十即一方得五萬九千五百九十八里半四十七萬六千七百九十分里之七萬五千一百九十一本經無所餘算之次因而演之也冬至之日正東西方不見日正東西方者周之卯酉日在十六萬七千里之外故不見日以算求之日下至周二十一萬四千五百五十七里半求之術以冬至日道徑四十七萬六千里為弦倍極去周十萬三千里得二十萬六千里為句為之求股句自乘減弦之自乘其餘開方除之得四十二萬九千一百一十五里有奇半之各得東西數臣鸞曰求冬至正東西方不見日法列冬至日道徑四十七萬六千里為弦重張相乘得二千二百六十五億七千六百萬為弦實更列極去周十萬三千里倍之得二十萬六千里為句重張相乘得四百二十四億三千六百萬以減弦實餘一千八百四十一億四千萬即股實開方除之得周直東西四十二萬九千一百一十五里八十五萬八千二百三十一分里之三十一萬六千七百七十五半之即周一方去日二十一萬四千五百五十七里半亦倍分母得一百七十一萬六千四百六十二分里之三十一萬六千七百七十五凡此數者日道之發斂凡此上周徑之數者日道往還之所至晝夜長短之所極冬至夏至觀律之數聽鍾之音觀律數之生聽鍾音之變知寒暑之極明代序之化也冬至晝夏至夜冬至晝夜日道徑半之得夏至晝夜日道徑法置冬至日道徑四十七萬六千里半之得夏至日中去夏至夜半二十三萬八千里為四極之里也差數所及日光所遝觀之以差數之所及日光所遝以此觀之則四極之窮也四極徑八十一萬里從極南至冬至日中二十三萬八千里又日光所照十六萬七千里凡徑四十萬五千里北至其夜半亦然故日徑八十一萬里八十一者陽數之終日之所極臣鸞曰求四極徑八十一萬里法列冬至日中去極二十三萬八千里復加冬至日光所及十六萬七千里得四十萬五千里北至其夜半亦然並南北即是大徑八十一萬里周二百四十三萬里三乘徑即周臣鸞曰以三乘八十一萬里得周二百四十三萬里自此以外日所不及也從周南至日照處三十萬二千里半徑除周去極十萬三千里臣鸞曰求周南三十萬二千里法列半徑四十萬五千里以王城去極十萬三千里減之餘即周南至日照處三十萬二千里周北至日照處五十萬八千里半徑加周去極十萬三千里臣鸞曰求周去冬至夜半日北極照處五十萬八千里法列半道徑四十萬五千里加周夜半去極十萬三千里得冬至夜半北極照去周五十萬八千里東西各三十九萬一千六百八十三里半求之術以徑八十一萬里為弦倍去周十萬三千里得二十萬六千里為句為之求股得七十八萬三千三百六十七里有奇半之各得東西之數臣鸞曰求東西各三十九萬一千六百八十三里半法列徑八十一萬里重張自乘得六千五百六十一億為弦實更置倍周去北極二十萬六千里為句重張自乘得四百二十四億三千六百萬以減弦實餘六千一百三十六億六千四百萬即股實開方除之得股七十八萬三千三百六十七里一百五十六萬六千七百三十五分里之十四萬三千三百一十一半之即得去周三十九萬一千六百八十三里半分母亦倍之得三百一十三萬三千四百七十分里之十四萬三千三百一十一也周在天中南十萬三千里故東西矩中徑二萬六千六百三十二里有奇臣鸞日求矩中徑二萬六千六百三十二里有奇法列八十一萬里以周東西七十八萬三千三百六十七里有奇減之餘二萬六千六百三十三里取一里破為一百五十六萬六千七百三十五分減一十四萬三千三百一十一餘一百四十二萬三千四百二十四即徑東西短二萬六千六百三十二里一百五十六萬六千七百三十五分里之一百四十二萬三千四百二十四周北五十萬八千里冬至日十三萬五千里冬至日道徑四十七萬六千里周百四十二萬八千里日光四極當周東西各三十九萬一千六百八十三里有奇此方圓之法此言求圓於方之法萬物周事而圓方用焉大匠造制而規矩設焉或毁方而為圓或破圓而為方方中為圓者謂之圓方圓中為方者謂之方圓也七衡圖靑圖畫者天地合際人目所遠者也天至高地至卑非合也人目極觀而天地合也日入青圖畫內謂之日出出青圖畫外謂之日入青圖畫之內外皆天也北辰正居天之中央人所謂東西南北者非有常處各以日出之處為東日中為南日入為西日沒為北北辰之下六月見日六月不見日從春分至秋分六月常見日從秋分至春分六月常不見日見日為晝不見日為夜所謂一歲者即北辰之下一晝一夜黃圖畫者黃道也二十八宿列焉日月星辰躔焉使青圖在上不動貫其極而轉之即交矣我之所在北辰之南非天地之中也我之卯酉非天地之卯酉內第一夏至日道也中第四春秋分日道也外第七冬至日道也皆隨黃道日冬至在牽牛春分在婁夏至在東井秋分在角冬至從南而北夏至從北而南終而復始也凡為此圖以丈為尺以尺為寸以寸為分分一千里凡用繒方八尺一寸今用繒方四尺五分分為二千里方為四極之圖盡七衡之意呂氏曰凡四海之內東西二萬八千里南北二萬六千里呂氏秦相呂不韋作呂氏春秋此之義在有始第一篇非周髀本文爾雅云九夷八狄七戎六蠻謂之四海言東西南北之數者將以明車轍馬迹之所至河圖括地象有君長之州九阻中國之文德及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形訓云禹使大章步自東極至于西極孺亥步自北極至于南極而數皆然或其廣闊將焉可步矣亦後學之徒未之或知也夫言億者十萬曰億也凡為日月運行之圓周春秋分冬夏至璿璣之運也七衡周而六間以當六月節六月為百八十二日八分日之五節六月者從冬至至夏至日百八十二日八分日之五為半歲六月節者謂中氣也不盡其日也此日周天通四分之一倍法四以除之即得也臣鸞曰求七衡周而六間以當六月節六月為一百八十二日八分日之五此為半歲也列周天三百六十五日四分日之一通分內子得一千四百六十一為實倍分母四為八除實得半歲一百八十二日八分日之五也故日夏至在東井極內衡日冬至在牽牛極外衡也東井牽牛為長短之限內外之極也衡復更終冬至冬至日從外衡還黃道一周年復於故衡終於冬至故曰一歲三百六十五日四分日之一歲一內極一外極從冬至一內極及一外極度終於星月窮於次是為一歲三十日十六分日之七月一外極一內極欲分一歲為十二月一衡間當一月此舉中相去之日數以此言之月行二十九日九百四十分日之四百九十九則過周天一日而與日合宿論其入內外之極大歸粗通未心得也日光言內極月光言外極日陽從冬至起月陰從夏至起往來之始易曰日往則月來月往則日來此之謂也此數置一百八十二日八分日之五通分內子五以六間乘分母以除之得三十以三約法得十六約餘得七臣鸞曰求三十日十六分日之七法列半歲一百八十二日八分日之五通分內子得一千四百六十一為實以六間乘分母八得四十八除實得三十日不盡二十一更置法實求等數平於三既以約法得十六約餘得七即是從中氣相去三十日十六分日之七也是故一衡之間萬九千八百三十三里三分里之一即為百步此數夏至冬至相去十一萬九千里以六間除之得矣法與餘分皆半之臣鸞曰求一衡之間一萬九千八百三十三里三分里之一法置冬至夏至相去十一萬九千里以六間除之即得法與餘分半之得也欲知次衡徑倍而增內衡之徑倍一衡間數以增內衡即次二衡徑二乘所倍一衡之間數以增內衡徑即得三衡徑二之以增內衡徑得三衡徑次衡放此次至皆如數內一衡徑二十三萬八千里周七十一萬四千里分為三百六十五度四分度之一度得一千九百五十四里二百四十七步千四百六十一分步之九百三十三通周天四分之一為法又以四乘衡周為實實如法得一百步不滿法者十之如法得十步不滿法者十之如法得一步不滿者以法命之至七衡皆如此臣鸞曰求內衡度法置夏至徑二十三萬八千里以三乘之得內衡周七十一萬四千里以周天分母四乘內衡周得二百八十五萬六千里為實以周天分一千四百六十一為法除之得一千九百五十四里不盡一千二百六即因而三之為三千六百一十八以法除之得二百步不盡六百九十六步上十之如法而一得四十步不盡一千一百一十六復上十之如法而一得七步不盡九百三十三即是一千九百五十四里二百四十七步一千四百六十一分步之九百三十三次二衡徑二十七萬七千六百六十六里二百步周八十三萬三千里分里為度度得二千二百八十里百八十八步千四百六十一分步之千三百三十二通周天四分之一為法四乘衡周為實實如法得里數不滿者求步數不盡者命分臣鸞曰求第二衡法列一衡間一萬九千八百三十三里少半里倍之得三萬九千六百六十六里太半里增內衡徑二十三萬八千里得第二衡徑二十七萬七千六百六十六里二百步是三分里之二又以三乘之步滿三百成一里得二衡周八十三萬三千里以周天分母四乘周得三百三十三萬二千為實更置周天三百六十五度四分度之一通分內子得一千四百六十一為法除之得二千二百八十里不盡九百二十以三百乘之得二十七萬六千復以前法除之得一百八十八步不盡一千三百三十二即是度得二千二百八十里一百八十八步一千四百六十一分步之一千三百三十二次三衡徑三十一萬七千三百三十三里一百步周九十五萬二千里分為度度得二千六百六里百三十步千四百六十一分步之二百七十通周天四分之一為法四乘衡周為實實如法得里數不滿法者求步數不盡者命分臣鸞曰求第三衡法列倍一衡間得三萬九千六百六十六里三分里之二增第二衡徑二十七萬七千六百六十六里二百步即三分里之二得第三衡徑三十一萬七千三百三十三里一百步以三乘徑步步滿三百成里得周九十五萬二千里又以分母四乘周得三百八十萬八千為實以周天分一千四百六十一為法以除實得二千六百六里不盡六百三十四以三百乘之以法除之得一百三十步不盡二百七十即是度得二千六百六里一百三十步一千四百六十一分步之二百七十次四衡徑三十五萬七千里周一百七萬一千里分為度度得二千九百三十二里七十一步千四百六十一分步之六百六十九通周天四分之一為法四乘衡周為實實如法得里數不滿法者求步數不盡者命分臣鸞曰求第四衡法列倍一衡間三萬九千六百六十六里三分里之二增第三衡徑三十一萬七千三百三十三里一百步步滿三百成里得徑三十五萬七千里以三乘之得周一百七萬一千里以分母乘之得四百二十八萬四千為實以周天分一千四百六十一除之得二千九百三十二里不盡三百四十八以三百乘之以法除之得七十一步不盡六百六十九即是度得二千九百三十二里七十一步一千四百六十一分步之六百六十九次五衡徑三十九萬六千六百六十六里二百步周一百一十九萬里分為度度得三千二百五十八里十二步千四百六十一分步之千六十八通周天四分之一為法四乘衡周為實實如法得里數不滿法者求步數不盡者命分臣鸞曰求第五衡法列倍一衡間三萬九千六百六十六里三分里之二增第四衡徑三十五萬七千里得第五衡徑三十九萬六千六百六十六里二百步以三乘徑得周一百一十九萬里又以分母四乘周得四百七十六萬為實以周天分一千四百六十一為法除之得三千二百五十八里不盡六十二以三百乘之以法除之得十二步不盡一千六十八即是度得三千二百五十八里十二步一千四百六十一分步之一千六十八次六衡徑四十三萬六千三百三十三里一百步周一百三十萬九千里分為度度得三千五百八十三里二百五十四步千四百六十一分步之六通周天四分之一為法四乘衡周為實實如法得一里不滿法者求步不盡者命分臣鸞曰求第六衡法列倍一衡間三萬九千六百六十六里三分里之二以增第五衡徑三十九萬六千六百六十六里二百步步滿三百成里得徑四十三萬六千三百三十三里一百步得徑四十三萬六千三百三十三里一百步又三乘徑得周一百三十萬九千里又以分母四乘周得五百二十三萬六千為實以周天分一千四百六十一為法除之得三千五百八十三里不盡一千二百三十七以三百乘之以法除之得二百五十四步不盡六即是度得三千五百八十三里二百五十四步一千四百六十一分步之六次七衡徑四十七萬六千里周百四十二萬八千里分為度度得三千九百九里一百九十五步千四百六十一分步之四百五通周天四分之一為法四乘衡周為實實如法得里數不滿法者求步數不盡者命分臣鸞曰求第七衡法列倍一衡間三萬九千六百六十六里三分里之二增第六衡徑四十三萬六千三百三十三里一百步得第七衡徑四十七萬六千里以三乘之得周一百四十二萬八千里以分母四乘之得五百七十一萬二千為實以周天分一千四百六十一為法除之得三千九百九里不盡九百五十一又以三百乘之所得以法一千四百六十一除之得一百九十五步不盡四百五即是度得三千九百九里一百九十五步一千四百六十一分步之四百五其次曰冬至所照過北衡十六萬七千里冬至十一月日在牽牛徑在北方因其在北故言照過北衡為徑八十一萬里倍所照增七衡徑周二百四十三萬里三乘倍增七衡周分為三百六十五度四分度之一度得六千六百五十二里二百九十三步千四百六十一分步之三百二十七過此而往者未之或知過八十一萬里之外或知者或疑其可知或疑其難知此言上聖不學而知之上聖者智無不至明無不見考靈曜曰微式出冥唯審其形此之謂也故冬至日晷丈三尺五寸夏至日晷尺六寸冬至日晷長夏至日晷短日晷損益寸差千里故冬至夏至之日南北遊十一萬九千里四極徑八十一萬里周二百四十三萬里分為度度得六千六百五十二里二百九十三步千四百六十一分步之三百二十七此度之相去也臣鸞曰求冬至日所北照十六萬七千里並南北日光得三十三萬四千里增冬至日道徑四十七萬六千里得八十一萬里三之得周二百四十三萬里以周天分母四乘之得九百七十二萬里為實以周天分一千四百六十一為法除之得六千六百五十二里不盡一千四百二十八以三百乘之得四十二萬八千四百復以法除之得二百九十三步不盡三百二十七即是度得六千六百五十二里二百九十三步一千四百六十一分步之三百二十七其南北遊日六百五十一里一百八十二步一千四百六十一分步之七百九十八術曰置十一萬九千里為實以半歲一百八十二日八分日之五為法半歲者從外衡去內衡以為法除相去之數得一日所行也而通之通之者數不合齊常以法等得相通入以八乘也得九十五萬二千為實通十一萬九千里所得一千四百六十一為法除之通百八十二日八分日之五也實如法得一里不滿法者三之如法得百步一里三百步當以三百乘而言三之者不欲轉法便以一位為百實故從一位命為百不滿法者十之如法得十步上下用三百乘故此十之便以一位為十實故從一位命為十不滿法者十之如法得一步復十之者但以一位為實故從一位命為一不滿法者以法命之位盡於一步故以法命其餘分為殘步臣鸞曰求南北遊法置冬至十一萬九千里以半歲日分母八乘之得九十五萬二千為實通半歲一百八十二日八分日之五得一千四百六十一以除得六百五十一里不盡八百八十九以三百乘之得二十六萬六千七百復以法除之得一百八十二步不盡七百九十八即得日南北遊日六百五十一里一百八十二步一千四百六十一分步之七百九十八
