  - {type: variant, offset: 0, length: 7325, content: 周髀算經卷下漢趙君卿注北周漢中郡守前司隸臣甄鸞重述唐朝議大夫行太史令上輕車都尉臣李淳風等奉勑臣釋明毛晉挍凡日月運行四極之道運周也極至也謂外衡也日月周行四方至外衡而還故曰四極也極下者其地高人所居六萬里滂沲四隤而下游北極從外衡主極下乃高六萬里而言人所居蓋復盡外衡滂四隤而下如覆槃也天之中央亦高四旁六萬里四旁猶四極也隨地穹窿而高如蓋笠故日光外所照徑八十一萬里周二百四十三萬里日至外衡而還出其光十六萬七千里故云照故日運行處極北北方日中南方夜半日在極東東方日中西方夜半日在極南南方日中北方夜半日在極西西方日中東方夜半凡此四方者天地四極四和四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所會隂陽之所和然則百物阜安草木蕃庻故曰四和晝夜易處南方爲晝北方爲夜加時相反南方日中北方夜半然其隂陽所終冬至所極皆若一也隂陽之數齊冬夏之節同寒暑之氣均長短之晷等周回無差運變不二天象葢笠地法覆槃見乃謂之象形乃謂之法在上故準葢在下故擬槃象法義同葢槃形等互文異器以别尊卑仰象俯法名號殊矣天離地八萬里然其隆高相從其相去八萬里冬至之日雖在外衡常出極下地上二萬里天地隆高高於外衡六萬里冬至之日雖在外衡其相望爲平地直常出地北極下地上二萬里言日月不相障蔽故能揚光於晝納明於夜故日兆月日者陽之精譬猶火光月者隂之精譬猶水光水則含影故月光生於日之所照魄生於日之所蔽當日卽光盈就日卽眀盡月禀日光而成形兆故云日兆月也月光乃出故成明月待日然後能舒其光以成其眀星辰乃得行列靈憲曰衆星被曜因水火轉光故能成其行列是故秋分以往到冬至三光之精微以成其道遠日從中衡往至外衡其徑日遠以其相遠故光微不言從冬至到春分者俱在中衡之外其同可知此天地隂陽之性自然也自然如此故曰性也欲知北極樞璿璣四極極中不動動者璿璣也言北極璿璣周旋四至極至也常以夏至夜半時北極南游所極游在樞南之所至冬至夜半時北游所極游在樞北之所至冬至日加酉之時西游所極游在樞西之所至日加卯之時東游所極游在樞東之所至此北極璿璣四游北極游常近冬至而言夏至夜半者夏至夜半極見冬至夜半極不見也正北極樞璿璣之中正北天之中極處璿璣之中天心之正故曰璿璣也正極之所游冬至日加酉之時立八尺表以繩繫表顚希望北極中大星引繩致地而識之顚首希仰致至也識之者所望大星表首及繩至地參相直而識之也又到旦明日加卯之時復引繩希望之首及繩致地而識其兩端相去二尺三寸日加卯酉之時望至地之相去也故東西極二萬三千里影寸千里故爲東西所致之里數也其兩端相去正東西以繩至地所謂兩端相直爲東西之正也中折之以指表正南北所識兩端之中與表爲南北之正加此時者皆以漏揆度之此東西南北之時冬至日加卯酉者北極之正東西日不見矣以漏度之者一日一夜百刻從夜半至日中從日中至夜半無冬夏常各五十刻中分之得二十五刻加極卯酉之時揆亦度也其繩致地所識去表丈三寸故天之中去周十萬三千里北極東西之時與天中齊故以所望表句爲天中去周之里數何以知其南北極之時也以冬至夜半北游所極北過天中萬一千五百里以夏至南游所極不及天中萬一千五百里此皆以繩繫表顚而希望之北極至地所識丈一尺四寸半故去周十一萬四千五百里過天中萬一千五百里其南極至地所識九尺一寸半故去周九萬一千五百里不及天中萬一千五百里此璿璣四極南北過不及之法東西南北之正句以表爲股以影爲句影言正句者四方之影皆正而定也璿璣徑二萬三千里周六萬九千里此陽絶隂彰故不生萬物春秋分謂之隂陽之中而日光所照適至璿璣之徑爲陽絶隂彰故萬物不復生也其術曰立正句定之正四方之法也以日始出立表而識其晷日入復識其晷晷之兩端相直者正東西也中折之指表者正南北也極下不生萬物何以知之以何法知之也冬至之日去夏至十一萬九千里萬物盡死夏至之日去北極十一萬九千里是以知極下不生萬物北極左右夏有不釋之冰水凍不解是以推之夏至之日外衡之下爲冬矣萬物當死此日遠近爲冬夏非隂陽之氣爽或疑焉春分秋分日在中衡春分以往日益北五萬九千五百里而夏至秋分以往日益南五萬九千五百里而冬至并冬至夏至相去十一萬九千里冬至以往日益北近中衡夏至以往日益南近中衡中衡去周七萬五千五百里影七尺五寸五分中衡左右冬有不死之草夏長之類此欲以内衡之外外衡之內常爲夏也然其脩廣爽未之前聞此陽彰隂微故萬物不死五穀一歳再熟近日陽多農再熟凡北極之左右物有朝生暮獲冬生之類獲疑作穫謂葶藶薺麥冬生之類北極之下從春分至秋分爲晝從秋分至春分爲夜物有朝生暮獲者亦有春芻而秋熟然其所育皆是周地冬生之類薺麥之属言左右者不在璿璣二萬三千里之內也此陽微隂彰故無夏長之類立二十八宿以周天曆度之法以用也列二十八宿之度用周天術曰倍正南方倍猶背也正南方者二極之正南北也以正句定之正句之法日出入識其晷晷兩端相直者正東西中折之以指表正南北卽平地徑二十一歩周六十三歩令其平矩以水正如定水之平故曰平矩以水正也則位徑一百二十一尺七寸五分因而三之爲三百六十五尺四分尺之一徑一百二十一尺七寸五分周三百六十五尺二寸五分者四分之一而或言一百二十六尺舉其全數以應周天三百六十五度四分度之一審定分之無令有纎微所分平地周一尺爲一度二寸五分爲四分度之一其令審定不欲使有細小之差也纎微細分也臣鸞曰求一百二十一尺七寸五分因而三之爲三百六十五度四分度之一法列徑一百二十一尺七寸五分以三乘得三百六十五尺二寸五分二寸五分者卽四分之一此卽周天三百六十五度四分度之一分度以定則正督經緯而四分之一合各九十一度十六分度之五南北爲經東西爲緯督亦通正周天四分之一又以四乘分母為法除之臣鸞曰求分度以定四分之一合各九十一度十六分度之五法列周天三百六十五度以四分度之一而通分内子一得一千四百六十一爲實更以四乘分母得十六爲法除之得九十一不盡五卽是各九十一度十六分度之五也於是圓定而正分所圓爲天度又四分之皆定而正則立表正南北之中央以繩繫顛希望牽牛中央星之中引繩至經緯之交以望之星與表繩參相直也則復候須女之星先至者復候須女中則當以繩望之如復以表繩希望須女先至定中須女之先至者又復如上引繩至經緯之交以望之卽以一游儀希望牽牛中央星出中正表西幾何度游儀亦表也游儀移望星爲正知星出中正之表西幾何度故曰游儀各如游儀所至之尺爲度數所游分圓周一尺應天一度故以游儀所至尺數爲度游在於八尺之上故知牽牛八度須女中而望牽牛游在八尺之上故牽牛爲八度其次星放此以盡二十八宿度則定矣皆如此上法定立周度者周天之度各以其所先至游儀度上二十八宿不以一星爲體皆以先至之星爲正之度車輻引繩就中央之正以爲轂則正矣以經緯之交爲轂以圓度爲輻知一宿得㡬何度則引繩如輻湊轂爲正望星定度皆以方爲正南知二十八宿爲幾何度然後環分而布之也日所以入亦以周定之亦同望星之周欲知日之出入出入二十八宿東西南北面之宿列置各應其方立表望之知日出入何宿從出入徑幾何度卽以三百六十五度四分度之一而各置二十八宿以二十八宿列置地所圓周之度使四面之宿各應其方以東井夜半中牽牛之初臨子之中東井牽牛相對之宿也東井臨午則牽牛臨於子也東井出中正表西三十度十六分度之七而臨未之中牽牛初亦當臨丑之中分周天之度爲十二位而十二辰各當其一所應十二月從午至未三十度十六分度之七未與丑相對而東井牽牛之所居分之法巳陳於上矣臣鸞曰求東井出中正表西三十度十六分度之七法先通周天得一千四百六十一爲實以位法十二乘周天分母四得四十八爲法除實得三十度不盡二十一更副置法實等數平於三約不盡二十一得七約法四十八得十六卽位三十度一十六分度之七於是天與地恊恊合也置東井牽牛使居丑未相對則天之列宿與地所爲圖周相應合得之矣乃以置周二十八宿從東井牽牛所居以置十二位焉置以定乃復置周度之中央立正表置周度之中央者經緯之交也以冬至夏至之日以望日始出也立一游儀於度上以望中央表之晷從日所出度上立一游儀皆望中表之晷所以然者當矅不復當日得以視之也晷參正則日所出之宿度游儀與中央表及晷參相直游儀之下卽所出合宿度日入放此此日出法求之牽牛去北極百一十五度千六百九十五里二十一歩千四百六十一分歩之八百一十九牽牛冬至日所在之宿於外衡者與極相去之度數術曰置外衡去北極樞二十三萬八千里除璿璣萬一千五百里北極常近牽牛爲樞過極萬一千五百里此求去極故以除之其不除者二十二萬六千五百里以爲實以三百乘之里爲歩以周天分一千四百六十一乘歩為分內衡之度以周天分爲法法有分故以周天乘實齊同之得九百九十二億七千四百九十五萬以内衡一度數千九百五十四里二百四十七歩千四百六十一分歩之九百三十三以爲法如上乘里為歩歩爲分通分内子得八億五千六百八十萬實如法得一度以八億五千六百八十萬爲一度法不滿法求里歩上求度故以此次求里次求歩約之合三百得一以爲實上以三百乘里爲歩而求里故以三百約餘分爲里之實以千四百六十一分爲法得一里里歩皆以周天之分爲母求度當齊同法實等故乘以散之度已定當次求里故還爲法不滿法者三之如法得百歩上以三百約之爲里之實此當以三百乘之爲歩之實而言三之者不欲轉法便以一位爲百實故從一位命爲百也不滿法者上十之如法得十歩上不用三百乘故此十之便以一位爲十實故從一位命爲十不滿法者又上十之如法得一步又復上之者便以一位爲一實故從一位命爲一不滿法者以法命之位盡於一歩故以法命其餘爲殘分次放此次婁與角及東井皆如此也臣鸞曰求牽牛星去極法先列衡去極樞二十三萬八千里减極去樞心一萬一千五百里餘二十二萬六千五百里以三百乘里得六千七百九十五萬歩又以周天分一千四百六十一乘之得九百九十二億七千四百九十五萬歩爲實更副置内衡一度數一千九百五十四里二百四十七歩一千四百六十一分歩之九百三十三亦以三百乘一千九百五十四里爲歩内二百四十七歩得五十八萬六千四百四十七歩又以周天分母千四百六十一乘歩内子九百三十三得八億五千六百八十萬爲法以除實得一百一十五度不盡七億四千二百九十五萬去下法不用更以三百約餘分七億四千二百九十五萬得二百四十七萬六千五百爲實更以周天分千四百六十一除之得一千六百九十五里不盡一百五以三百乗之得三萬一千五百復以前法除之得二十一歩不盡八百一十九卽牽牛去北極一百一十五度千六百九十五里二十一歩千四百六十一分歩之八百一十九婁與角去北極九十一度六百一十里二百六十四歩千四百六十一分歩之千二百九十六婁春分日所在之宿也角秋分日所在之宿也爲中衡也術曰置中衡去北極樞十七萬八千五百里以爲實不言加除者婁與角準北極在樞兩旁正與樞齊以婁角無差故便以去樞之數爲實如上乗里爲歩歩爲分得七百八十二億三千六百五十五萬以內衡一度數爲法實如法得一度不滿法者求里歩不滿法者以法命之臣鸞曰求婁與角去極法列中衡去極樞十七萬八千五百里以三百乗之得五千三百五十五萬歩又以周天分千四百六十一分乘之得七百八十二億三千六百五十五萬爲實以内衡一度數千九百五十四里二百四十七歩千四百六十一分歩之九百三十三亦以三百乘里内歩二百四十七得五十八萬六千四百四十七歩又以分母千四百六十一分乗之内子得八億五千六百八十萬爲法以除實得九十一度不盡二億六千七百七十五萬以三百約之得八十九萬二千五百下法不用以周天分千四百六十一除之得六百一十里不盡千二百九十以三百乗之得三十八萬七千如前法除之得二百六十四歩不盡一千二百九十六卽是婁與角去極九十一度六百一十里二百六十四歩千四百六十一分歩之千二百九十六東井去北極六十六度千四百八十一里一百五十五歩千四百六十一分歩之千二百四十五東井夏至日所在之宿爲內衡術曰置內衡去北極樞十一萬九千里加璿璣萬一千五百里北極游常近東井爲樞不及極萬一千五百里此求去極故加之得十三萬五百里以爲實如上乘里爲歩歩爲分得五百七十一億九千八百一十五萬分以內衡一度數爲法實如法得一度不滿法者求里歩不滿法者以法命之臣鸞曰求東井去極法列内衡去極樞十一萬九千里加璿璣萬一千五百里得十三萬五百里以三百乘里爲歩復以分母千四百六十一乘之得五百七十一億九千八百一十五萬爲實通分内衡一度數爲歩歩爲分得八億五千六百八十萬爲法以除實得六十六度不盡六億四千九百三十五萬以三百約之得二百一十六萬四千五百下法不用更以周天千四百六十一爲法除之得千四百八十一里不盡七百五十九以三百乘之得二十二萬七千七百復以周天分除之得一百五十五歩不盡一千二百四十五卽是東井去北極六十六度千四百八十一里一百五十五歩千四百六十一分歩之一千二百四十五凡八節二十四氣氣損益九寸九分六分分之一冬至晷長一丈三尺五寸夏至晷長一尺六寸問次節損益寸數長短各幾何冬至晷長丈三尺五寸小寒丈二尺五寸小分五大寒丈一尺五寸一分小分四立春丈五寸二分小分三雨水九尺五寸三分小分二啓蟄八尺五寸四分小分一春分七尺五寸五分清明六尺五寸五分小分五榖雨五尺五寸六分小分四立夏四尺五寸七分小分三小滿三尺五寸八分小分二芒種二尺五寸九分小分一夏至一尺六寸小暑二尺五寸九分小分一大暑三尺五寸八分小分二立秋四尺五寸七分小分三處暑五尺五寸六分小分四白露六尺五寸五分小分五秋分七尺五寸五分寒露八尺五寸四分小分一霜降九尺五寸三分小分二立冬丈五寸二分小分三小雪丈一尺五寸一分小分四大雪丈二尺五寸小分五凡爲八節二十四氣二至者寒暑之極二分者隂陽之和四立者生長收藏之始是爲八節節三氣三而八之故爲二十四氣損益九寸六分六分分之一損者减也破一分爲六分然後减之益者加也以小分滿六得一從分冬至夏至爲損益之始冬至晷長極當反短故爲損之始夏至晷短極當反長故爲益之始此爽之新術術曰置冬至晷以夏至晷减之餘爲實以十二爲法十二者半歳十二氣也爲法者一節損益之法實如法得一寸不滿法者十之以法除之得一分求分故十之也不滿法者以法命之法與餘分皆半之也舊晷之術於理未當謂春秋分者隂陽晷等各七尺五寸五分故中衡去周七萬五千五百里按春分之影七尺五寸七百二十三分秋分之影七尺四寸二百六十二分差一寸四百六十一分以此準之是爲不等冬至至小寒多半日之影夏至至小暑少半日之影芒種至夏至多二日之影大雪至冬至多三日之影又半歳一百八十二日八分日之五而此用四分日之二率故一日得七百三十分寸之四百七十六非也節候不正十五日有三十二分日之七以一日之率十五日爲一節至令差錯不通尤甚易曰舊井無禽時舍也言法三十日實當改而舍之於是爽更爲新術以一氣率之使言約法易上下相通周而復始除其紕繆臣鸞曰求二十四氣損益之法先置冬至影長丈三尺五寸以夏至影一尺六寸减之餘一丈一尺九寸上十之爲實以半歳十二氣爲法除之得九寸不盡十一復上十之如法而一得九分不盡二與法十二皆半之得六分之一卽是氣損益法先置冬至影長丈三尺五寸以氣損益九寸九分六分分之一其破一分以爲六分减其餘卽是小寒影長丈二尺五寸小分五餘悉依此法求益法置夏至影一尺六寸以九寸九分六分分之一増之小分滿六從大分一卽是小暑二尺五寸九分小分一次氣放此臣淳風等謹按此術本文趙君卿注求二十四氣影列損益九寸九分六分分之一以爲定率檢勘術注有所未通又按宋書曆志所載何承天元嘉曆影冬至一丈三尺小寒一丈二尺四寸八分大寒一丈一尺三寸四分立春九尺九寸一分雨水八尺二寸八分啓蟄六尺七寸二分春分五尺三寸九分清明四尺二寸五分穀雨三尺二寸五分立夏二尺五寸小滿一尺九寸七分芒種一尺六寸九分夏至一尺五寸小暑一尺六寸九分大暑一尺九寸七分立秋二尺五寸處暑三尺三寸五分白露四尺二寸五分秋分五尺三寸九分寒露六尺七寸二分霜降八尺二寸八分立冬九尺九寸一分小雪一丈一尺三寸四分大雪一丈二尺四寸八分司馬彪續漢志所載四分暦影亦與此相近至如祖冲之大明曆影與何承天雖有小差皆是量天實數讐校三曆足驗君卿所立率虚誕且周髀本文外衡下於天中六萬里而二十四氣率乃是平遷所以知者按望影之法日近影短日遠影長又以高下言之日高影短日卑影長夏至之日最近北又最高其影尺有五寸自此以後曰行漸遠向南天體又漸向下以及冬至冬至之日最近南居於外衡日最近下故日影一丈三尺此當毎氣差降有别不可均爲一概設其升降之理今此文自冬至畢芒種自夏至畢于大雪均差毎氣損九寸有奇是爲天體正平無高卑之異而日但南北均行又無升降之殊卽無內衡高於外衡六萬里自相矛楯又按尚書考靈曜所陳格上格下里數及鄭注升降逺近雖有成規亦未臻理實欲求至當皆依天體高下遠近修規以定差數自霜降畢於立春升降差多南北差少自雨水畢於寒露南北差多升降差少依此推步乃得其實既事渉渾儀與盖天相反月後天十三度十九分度之七月後天者月東行也此見日月與天俱西南遊一日一夜天一周而月在昨宿之東故曰後天又曰章歳除章月加日周一日作率以一日所行爲一度周天之日爲天度術曰置章月二百三十五以章歳十九除之加日行一度得十三度十九分度之七此月一日行之數卽後天之度及分臣鸞曰月後天十三度十九分度之七法列章月二百三十五以章歳十九除之得十二度加日行一度得十三度餘十九分度之七卽月後天之度分小歳月不及故舍三百五十四度萬七千八百六十分度之六千六百一十二小歳者十二月爲一歳一歳之月十二月則有餘十三月復不足而言大小歳通閠月焉不及故舍亦猶後天也假令十一月朔旦冬至日月俱起牽牛之初而月十二與日會此數月發牽牛所行之度也術曰置小歳三百五十四日九百四十分日之三百四十八小歳者除經歲十九分月之七以七乘周天分千四百六十一得萬二百二十七以减經歳之積分餘三十三萬三千一百八則小歳之積分也以九百四十分除之卽得小歳之積日及分以月後天十三度十九分度之七乘之爲實通分内子爲二百五十四乘之者乘小歳積分也又以度分母乘日分母爲法實如法得積後天四千七百三十七度萬七千八百六十分度之六千六百一十二以月後天分乘小歳積分得八千四百六十萬九千四百三十二則積後天分也以度分母十九乘日分母九百四十得萬七千八百六十除之卽得以周天三百六十五度萬七千八百六十分度之四千四百六十五除之此猶四分之一也約之卽得當於齊同故細言之通分內子爲六百五十二萬三千三百六十五除積後天分得十二周天卽去之其不足除者不足除者不及故舍之六百三十二萬九千五十二是也寅曰三百五十四度萬七千八百六十分度之六千六百一十二以萬七千八百六十除不及故舎之分得此分矣三百五十四度萬七千八百六十分度之六千六百一十二以萬七千八百六十除不及故舍之分得此分矣此月不及故舍之分度數佗皆放此次至經月皆如此臣鸞曰求小歳月不及故舍法列經歳三百六十五日九百四十分日之二百三十五通分内子得三十四萬三千三百三十五是爲經歳之積分以十九分月之七以七乘周天分一千四百六十一得萬二百二十七以减經歳積分不盡三十三萬三千一百八小歳積分也以九百四十除之得三百五十四日不盡三百四十八還通分內子復得本積分三十三萬三千一百八更置月後天十三度十九分度之七通分內子得二百五十四以乘本積分得積後天分八千四百六十萬九千四百三十二爲實, WYG: ''}
