  front:
  - {type: page-break, offset: 0, content: '', id: KR3f0001_SBCK_001-1a}
  - {type: variant, offset: 0, length: 2024, content: 周髀算經卷上昔者周公問於商高曰竊聞乎大夫善數也周公姓姬名旦武王之弟商高周時賢大夫善算者也周公位居冡宰德則至聖尚卑唐寅曰此趙注也巳以自牧下學而上逹況其凡乎請問古者包犧立周天曆度包犧三皇之一始畫八卦以商高善數能通乎微妙逹乎無方無大不綜無幽不顯聞包犧立周天曆度建章蔀之法易曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地此之謂也夫天不可階而升地不可得尺寸而度邈乎懸廣無階可升蕩乎遐遠無度可量請問數從安出心昧其機請問其目商高曰數之法出於圓方圓徑一而周三方徑一而匝四伸圓之周而爲句展方之匝而爲股共結一角邪適弦五此圓方邪徑相通之率故曰數之法出於圓方圓方者天地之形陰陽之數然則周公之所問天地也是以商高陳圓方之形以見其象因奇耦之數以制其法所謂言約旨遠微妙幽通矣圓出於方方出於矩圓規之數理之以方方周匝也方正之物出之以矩矩廣長也矩出於九九八十一推圓方之率通廣長之數當須乘除以計之九九者乘除之原也故折矩故者申事之辭也將爲句股之率故曰折矩也以爲句廣三應圓之周横者謂之廣句亦廣廣短也股修四應方之匝從者謂之脩股亦脩脩長也徑隅五自然相應之率徑直隅角也亦謂之弦旣方其外半之一矩句股之法先知二數然後推一見句股然後求弦先各自乘成其實實成勢化爾乃變通故曰旣方其外或幷句股之實以求弦弦實之中乃求句股之分幷實不正等更相取與互有所得故曰半其一矩其術句股各自乘三三如九四四一十六幷爲弦自乘之實二十五減句於弦爲股之實一十六減股於弦爲句之實九環而共盤得成三四五盤讀如盤桓之盤言取其幷減之積環屈而共盤之開方除之得其一面故曰得成三四五也兩矩共長二十有五是謂積矩兩矩者句股各自乘之實共長者幷實之數將以施於萬事而此先陳其率也故禹之所以治天下者此數之所生也禹治洪水決流江河望山川之形定高下之勢除滔天之災釋昏垫之厄使東注於海而無浸逆乃句股之所由生也句股圓方圖句股各自乘幷之爲弦實開方除之卽弦案弦圖又可以句股相乘爲朱實二倍之爲朱實四以句股之差自相乘爲中黃實加差實一亦成弦實以差實減弦實半其餘以差爲從法開方除之復得句矣加差於句即股凡幷句股之實卽成弦實或方於内或矩於外形詭而量均體殊而數齊句實之矩以股弦差爲廣股弦幷爲袤而股實方其裏減矩句之實於弦實開其餘卽股倍股在兩邊爲從法開矩句之角卽股弦差加股爲弦以差除句實得股弦幷以幷除句實亦得股弦差令幷自乘與句實爲實倍幷爲法所得亦弦句實減幷自乘如法爲股股實之矩以句弦差爲廣句弦幷爲袤而句實方其裏減矩股之實於弦實開其餘卽句倍句在兩邉爲從法開矩股之角卽句弦差加句爲弦以差除股實得句弦幷以幷除股實亦得句弦差令幷自乘與股實爲實倍并爲法所得亦弦股實減幷自乘如法爲句兩差相乘倍而開之所得以股弦差增之爲句以句弦差增之爲股兩差增之爲弦倍弦實列句股差實見幷實者以圖考之倍弦實滿外大方而多黃實黃實之多卽句股差實以差實減之開其餘得外大方大方之面卽句股幷也令幷自乘倍弦實乃減之開其餘得中黃方黃方之面卽句股差以差減幷而半之爲句加差於幷而半之爲股其倍弦爲廣袤合令句股見者自乘爲其實四實以減之開其餘所得爲差以差減合半其餘爲廣减廣於弦卽所求也觀其迭相規矩共爲返覆互與通分各有所得然則統敍羣倫宏紀衆宏理貫幽入微鉤深致逺故曰其裁制萬物唯所爲之也臣鸞釋日按君卿注云句股各自乘幷之爲弦實開方除之卽弦臣鸞日假令句三自乘得九股四自乘得十六幷之得二十五開方除之得五爲弦也注云按弦圖又可以句股相乘爲朱實二倍之爲朱實四以句股之差自相乘爲中黃實臣鸞曰以句弦差二倍之爲四自乘得十六爲左圖中黃實也臣淳風等謹按注云以句股之差自乘爲中黃實鸞云倍句弦差自乘者苟求異端雖合其數於率不通注云加差實一亦成弦實臣鸞日加差實一幷外矩青八并外矩青八得九幷中黃十六得二十五亦成弦實也臣淳風等謹按注云加差實一亦成弦實鸞云加差實幷外矩及中黃者雖合其數於率不通注云以差實減弦實半其餘以差爲從法開方除之復得句矣臣鸞曰以差實九減弦實二十五餘十六半之得八以差一加之得九開之得句三也臣淳風等謹按注宜云以差實一減弦實二十五餘二十四半之爲十二以差一爲從開方除之得句三鸞云以差實九减弦實者雖合其數於率不通注云加差於句卽股臣鸞曰加差一於句三得股四也注云凡幷句股之實卽成弦實臣鸞曰句實九股實十六幷之得二十五也注云或方內或矩於外形詭而量均體殊而數齊句實之矩以股弦差爲廣股弦幷爲袤臣鸞曰以股弦差一爲廣股四幷弦五得九爲袤左圖外青也注云而股實方其裏臣鸞曰爲左圖中黃十六注云減矩句之實於弦實開其餘卽股臣鸞曰減矩句之實九於弦實二十五餘一十六開之得四股也注云倍股在兩邊爲從法開矩句之角卽股弦差臣鸞曰倍股四得八在圖兩邊以爲從法開矩句之角九得一也注云加股爲弦臣鸞曰加差一於股四則弦五也注云以差除勾實得股弦幷臣鸞曰以差一除句實九得九卽股四弦五幷爲九也注云以幷除句實亦得股弦差臣鸞曰以九除句實九得股弦差一注云令幷自乘與句實爲實臣鸞曰令幷股弦得九自乘爲八十一又與句實九加之得九十爲實注云倍幷爲法臣鸞曰倍股弦幷九得十八爲法注云所得亦弦臣鸞曰除之得五爲弦注云句實減幷自乘如法爲股臣鸞曰以句實九減幷自乘八十一餘, WYG: ''}
