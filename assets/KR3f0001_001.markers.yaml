  - {type: variant, offset: 16259, length: 0, content: '', krp: 周􅙼算經卷上周􅙼音義假承務郞秘書省鈞考算經文字臣李籍撰序周􅙼步米切周􅙼算經者以九數勾股重差算日月周天行度遠近之數皆得於股表卽推步盖天之法也􅙼者股也以表爲股周天曆度本包犧氏立法其傳自周公受之於大夫商高周人志之故曰周􅙼趙君卿撰雛免切述也君卿趙爽字也不詳何代人恢苦回切大也廓落上枯郭切下歷各切晷儀居洧切日影也度量上達各切下録章切探賾上吐南切下上革切賾者含蓄含蓄者探之可及故易中有曰探𦣱索隱上色白切下於謹切隱者隱匿隱匿者索之可得故易曰索隱詭異上居委切下於冀切詭譎怪也渾天胡昆切渾天者言天地之體譬如鳥卵天包地外猶殼之褁黄也周旋無端其形渾渾然故曰渾天史官候臺所用銅儀則其法也立八尺圓體具天地之形以正黄道古察發歛以行日月以歩五緯精微深妙不代百易之道也官有其器而無其書蓋天居大切盖天之說即周􅙼是也其言天似蓋笠地似覆槃天地各中高外下北極之下爲天地之中其地最高而滂沱四隤三光隱映以爲晝夜天中高於外衡冬至日之所在六萬里北極下地二萬里天地隆高相從日去地常八萬里日麗天而平轉分冬夏之間日前行道爲七衡六間毎衡周徑里數各依算術用勾股重差推晷影極游以爲逺近之數皆得於表股者也故曰周􅙼又周􅙼家云天圓如張盖地方如棋局天旁轉如推磨而左行日月右行隨天左轉故日月實東行而天牽之以西没譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左廻焉天形南高而北下日出高故見日入下故不見天之形如倚盖故極在人北是其證也極在天之中而今在人北所以知天之形如倚盖也靈憲詐建切靈憲張衡所述其說主於渾天重仞上直龍切下音刅八尺曰仞奥於到切迥戸頂切逺也卷上甄鸞上之人切下歷官切甄鸞北周司隷校尉重述上直龍切下時律切趙爽旣加注釋甄鸞又從而發明故曰重述善數色具切數算也包犧上蒲交切下虚宜切曆度徒箇切而度大各切量也勾股圓方圖勾古侯切股公土切圓徑一而周三方徑一而匝四伸圓之周而爲勾展方之匝而爲股共結一角邪適五乃圓方邪徑相通之率也勾股圓方圖盖以此設學者觀之思過半矣弦胡田切共結一角也率朔律切數相與也又音律竒耦上居宜切下烏口切矩俱雨切折之列切更相上古衡切下息羊切共盤上渠用切下蒲官切昏墊都念切下也書曰下民昏墊并卑政切勾股之差楚佳切不齊也勾股之差其數差一謂勾三股四也量均力仗切爲袤莫候切長也偃矩覆矩偃於憲切仰也覆敷目切俯也矩表也仰表所以望高俯表所以測深方属地殊玉切下同滂沲上普郎切下唐何切四隤徒回切列星之宿思救切二十八宿之度也禮記月令宿離不忒是也不省息井切省窹也不省言不窹也猶言不敏也累思魯水切累重也直能切才單德寒青戊極者竭憶切諸言極者斥天中極去周十萬三千里奄衣檢切覆也九隩於到切土可居也靡地母被切無也斥昌石切指也緣宿息救切二十八宿也蝕乘力切日月虧曰蝕稍小侵虧如蠧食草木之葉也適至施直切恰也發歛力冉切發徃歛還也璿璣上音璇下音機逮音迨及也有竒居宜切數之餘也易曰歸竒於扐冬至夏至觀律之數聽鍾之音律吕戍切聽陀定切此謂冬夏二至合八能之士以觀律之數而聽鐘音之清濁也晉律曆志曰隂陽和則景至律氣應則灰除是故天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷影侯鍾律權土炭效隂陽冬至陽氣應則灰除是故樂均清影長極黄鍾通土炭輕而衡仰夏至隂氣應則樂均濁影短極㽔賓通土炭重而衡低進退於先後五日之中八能各以候狀聞太史令封丄效則和否則占七衡圖何庚切七衡者七䂓也謂䂓爲衡者取其衡運則生䂓䂓者正圓之謂也內一衡徑二十三萬八千里次二衡徑二十七萬七千六百六十六里二百歩次三衡徑三十一萬七千三百三十三里一百歩次四衡徑三十五萬七千里次五衡徑三十九萬六千六百六十六里二百歩次六衡徑四十三萬六千三百三十三里一百歩次七衡徑四十七萬六千里即其徑而三之則各得其周也凡日月運行之圖周七衡周而六間一衡之間萬九千八百三十三里一百歩以六衡乘之即夏至冬至相去十一萬九千里也青圖畫者胡卦切界也俗作畫合際上胡閤切下子例切常處昌據切所也躔呈延切次也卯酉上莫飽切下以久切皆辰名也卯正東也酉正西也牽牛上輕烟切下如字率牛北方宿也冬至日在牽牛婁盧侯切婁西方宿也春分日在婁東井子郢切南方宿也夏至日在東井角記岳切東方宿也秋分日在角用繒慈陵切帛也呂氏兩舉切呂氏者呂氏春秋也呂不韋爲秦相國集當世儒士使著所聞爲十二紀八覽六論合十餘萬言備古今之事名爲呂氏春秋四海呼改切吕氏春秋曰几四海之内東西二萬八千里南北二萬六千里爾雅云九夷八狄七戎六蠻謂之四海言東西南北之數者将明車轍馬跡之所至河圖括地象亦云里數而有君長之州九阻中國之文德及而不治又云八極之廣東西二億二萬三千五百里南北二億三萬三千五百里淮南子地形訓云禹使大章歩自東極至于西極孺亥歩自北極至于南極而數皆然河圖括地象括音䀨河圖括地象緯書名也淮南子並如字漢淮南王安所著之書也大章音泰人名六間古閑切兩衡相去之間也粗通徂五切略也放此甫兩切效也下同卷下四和戶戈切調也四和者謂之極子午卯酉得東西南北之中天地之所合四時之所交風雨之所會隂陽之所和然則百物阜安草木蕃庻故曰四和阜安房缶切盛也蕃庻符袁切茂也易處夷益切交也蓋笠上居大切下音立覆槃上方六切下蒲官切離地力智切去也障蔽上之亮切隔也下必䄃切奄也日兆月直紹切日者陽之精譬猶火光月者隂之精譬猶水光月含影故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡月禀日光而成形兆故云日兆月也魄匹陌切月之明消也康誥曰惟三月哉生魄孔安國曰三月始生魄月十六日眀消而魄生楊子曰旣望則終魄於東亦此意也行列胡剛切極樞春朱切爾雅曰樞謂之棖郭璞云門戸扉樞也此言極樞者取其居中而臨制四方也繩繫古詣切結也表顛多年切頂也中折之列切屈也漏盧候切漏以銅受水刻節晝夜百刻晷漏中星畧例曰日行有南北晷漏有長短然二十四氣晷差遲疾不同勾股使然也直䂓中則差遲與勾股數齊則差急隨辰極高下所遇不同如黄道刻漏此乃數之淺者近代且猶未曉今推黄道去極與晷影漏刻昏距中星四術反覆相求消息同率施相爲中以合九股之變揆度上巨癸切下大各切釋施隻切散也朝生陟遥切旦也暮獲胡麥切穫胡郭切収也葶藶上音亭下音歷薺麥在禮切正勾上音政下音鈎無令離呈切使也纎微思廉切細也督音篤察也分度徒固切數也經緯上堅丁切下子貴切南北爲經東西爲緯圓定正音政則復扶富切又也須女如字星名也游儀如字游儀所以望星也眞觀中李淳風造四游儀元樞爲軸以連結玉衡游筩而貫約䂓矩又元樞北立北辰南距地軸旁轉於内玉衡在元樞之間而南北游仰以觀天之辰宿下以識器之晷度開元九年率府兵曹叅軍梁令瓉以木爲游儀一行是之乃奏黄道游儀古有其術而無其噐昔人潜思未能得今令瓉所爲日道月交皆自然契合於推步尤要請㫖更鑄以銅十年儀成車輻方六切所以實論而凑轂者也以圓度爲輻爲轂古禄切所以受輻也以經緯之交爲轂二十八宿息救切副置敷救切别也别置算也下同地恊檄頰切合也相應於證切叅正上倉含切下音正八節並如字二至者寒暑之極二分者隂陽之和四立者生長収藏之始是爲八節二十四氣並如字一歳凡八節節三氣三而入之故爲二十四氣氣損益九寸九分六分分之一並如字損者減也破一分爲六分然後減之益者加也加以小分滿六分得一從分冬至並如字至極也冬至夏至寒暑之極啓蟄直立切藏也易曰龍蛇之蟄以存身也左氏傳曰啓蟄而郊春分府文切分之言中也春分爲陽之中秋分爲隂之中芒種上莫郎切下之用切處暑昌據切所也時舎音捨不用也虚誕音但謾也一概古代切矛楯上莫浮切下食閏切矛所以勾楯所以蔽噐不同不相爲用凡言矛楯者况其所趣異也後天並如字月後天者月東行者也此見日月與天俱西南游一日一夜天一周而月在昨夜之東故曰後天故舎式夜切舎謂二十八宿之舎也積後天資昔切以月後天分看小歲積分則積後天分也大歲徒盖切大歳者十三月爲一歳也經歲堅丁切經常也經歳者通十二月十九分之七小月並如字小月者二十九日爲一月大月徒盖切大月者三十日爲一月經月堅丁切經月者以十九乘周天分則經月之積合朔上曷閤切下色角切覆九敷救切盖也下同當音當正南方音政三十六頭並如字考靈曜曰分周天爲三十六頭頭有十度九十六分之十四長日分於寅行二十四頭入於戌行十二頭短日分於辰行十二頭入於申行二十日頭北之謂也坎苦感切正北方之卦也巽蘇困切東南隅之卦也坤苦混切西南隅之卦也離吕支切正南方之卦也乾渠焉切西北隅之卦也艮古恨切東北隅之卦也章止良切條也十九歳爲一章言餘閏盡爲暦法章條也蔀薄口切蔀之言齊同日月之分也而又衆殘齊合羣數畢滿故謂之蔀四章爲一蔀凡七十六歳也遂徐醉切遂者終也言五行之德一終盡極日月辰終也二十蔀爲一遂凡千五百二十歳首始九切始也言日月五星終而復始也三遂爲一首凡四千五百六十歳也極如字終也言日月星辰弦望晦朔寒暑推移萬物生育終而復始故謂之極七首爲一極凡三萬一千九百二十歳也乾鑿度徒固切乾鑿度易緯書也周􅙼音義終附算學源流晉書律曆志黄帝紀三綱而闡書契乃使羲龢常儀占月車區占星氣伶倫造律吕大撓造甲子隷首作算數容成緫斯六術攷定氣象建行察發飮起消息正閏餘述而著焉謂之調歷漢書律曆志一曰律數二曰和聲三曰審度四曰嘉五曰權衡數者一十百千萬也所以算數事物順性命之理也其算法用竹徑一分長六寸二百七十一枚而成六觚爲一握度長短者不失毫釐量多少者不失圭撮權輕重者不失黍叅紀於一協於十長於百大於千衍於萬其法在算術乎附算法歌訣開平方法少人通起手先呼九數重百與萬同并百萬二三隔位一相從千同十萬和千萬三四連身九九終除盡虚加一倍回還折半復原宗}
